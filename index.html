function buildPriceBottoms(){
  if(!hasPriceData){
    document.getElementById("p9").innerHTML='<div class="info" style="margin-top:40px;text-align:center;color:#a89fc4">Price data is required for this panel.</div>';
    return;
  }
  var s=STATS;

  function median(arr){
    if(!arr.length)return null;
    var sorted=arr.slice().sort(function(a,b){return a-b});
    var mid=Math.floor(sorted.length/2);
    return sorted.length%2?sorted[mid]:(sorted[mid-1]+sorted[mid])/2;
  }
  function isOutlier(val,arr){
    if(arr.length<4)return false;
    var sorted=arr.slice().sort(function(a,b){return a-b});
    var q1=sorted[Math.floor(sorted.length*0.25)];
    var q3=sorted[Math.floor(sorted.length*0.75)];
    var iqr=q3-q1;
    return val<q1-1.5*iqr||val>q3+1.5*iqr;
  }

  // --- Compute price bottoms per cycle ---
  var priceBottoms=[];
  s.availCycles.forEach(function(c){
    var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.price;});
    if(!sub.length)return;
    // Price bottom = lowest price in cycle
    var worst=sub.reduce(function(a,b){return b.price<a.price?b:a});
    var mvrvTrough=s.cycleData.find(function(cd){return cd.cycle===c;});
    var mvrvTroughDate=mvrvTrough?mvrvTrough.troughDate:null;
    var mvrvTroughMvrv=mvrvTrough?mvrvTrough.trough:null;
    var daysDiff=null;
    if(mvrvTroughDate){
      var d1=new Date(mvrvTroughDate),d2=new Date(worst.dateStr);
      daysDiff=Math.round((d2-d1)/(1000*60*60*24));
    }
    var mvrvOnBottomDay=worst.mvrv||null;
    var divergencePct=mvrvOnBottomDay&&mvrvTroughMvrv?((mvrvOnBottomDay-mvrvTroughMvrv)/mvrvTroughMvrv)*100:null;
    var priceAtMvrvTrough=mvrvTroughDate?PRICE_MAP[mvrvTroughDate]:null;
    // Further downside: how much lower did price go after MVRV bottomed
    var furtherDownside=priceAtMvrvTrough&&worst.price?((worst.price-priceAtMvrvTrough)/priceAtMvrvTrough)*100:null;
    priceBottoms.push({
      cycle:c,price:worst.price,date:worst.dateStr,
      mvrvOnDay:mvrvOnBottomDay,
      mvrvTroughDate:mvrvTroughDate,mvrvTroughMvrv:mvrvTroughMvrv,
      daysDiff:daysDiff,divergencePct:divergencePct,
      priceAtMvrvTrough:priceAtMvrvTrough,furtherDownside:furtherDownside
    });
  });

  // --- Outlier detection ---
  var allDays=priceBottoms.filter(function(p){return p.daysDiff!==null;}).map(function(p){return p.daysDiff;});
  var allDiv=priceBottoms.filter(function(p){return p.divergencePct!==null;}).map(function(p){return p.divergencePct;});
  var allDown=priceBottoms.filter(function(p){return p.furtherDownside!==null;}).map(function(p){return p.furtherDownside;});
  priceBottoms.forEach(function(p){
    p.isOutlierDays=p.daysDiff!==null&&isOutlier(p.daysDiff,allDays);
    p.isOutlierDiv=p.divergencePct!==null&&isOutlier(p.divergencePct,allDiv);
    p.isOutlierDown=p.furtherDownside!==null&&isOutlier(p.furtherDownside,allDown);
  });

  var cleanDays=priceBottoms.filter(function(p){return p.daysDiff!==null&&!p.isOutlierDays;}).map(function(p){return p.daysDiff;});
  var cleanDown=priceBottoms.filter(function(p){return p.furtherDownside!==null&&!p.isOutlierDown;}).map(function(p){return p.furtherDownside;});
  var cleanDiv=priceBottoms.filter(function(p){return p.divergencePct!==null&&!p.isOutlierDiv;}).map(function(p){return p.divergencePct;});
  var medDays=median(cleanDays);
  var medDown=median(cleanDown);
  var medDiv=median(cleanDiv);
  var outlierCount=priceBottoms.filter(function(p){return p.isOutlierDays||p.isOutlierDiv||p.isOutlierDown;}).length;

  // Trend: is lead-lag changing?
  var nonOutlierDaysPairs=priceBottoms.filter(function(p){return p.daysDiff!==null&&!p.isOutlierDays;});
  var leadLagTrend=nonOutlierDaysPairs.length>=2?linReg(nonOutlierDaysPairs.map(function(p){return p.cycle;}),nonOutlierDaysPairs.map(function(p){return p.daysDiff;})):null;
  var downTrend=cleanDown.length>=2?linReg(priceBottoms.filter(function(p){return p.furtherDownside!==null&&!p.isOutlierDown;}).map(function(p){return p.cycle;}),cleanDown):null;

  // Current cycle projection
  var curCycle=s.last.cycle;
  var curMvrvTrough=s.cycleData.find(function(c){return c.cycle===curCycle;});
  var curMvrvTroughPrice=curMvrvTrough?PRICE_MAP[curMvrvTrough.troughDate]:null;
  var projectedFloor=curMvrvTroughPrice&&medDown!==null?curMvrvTroughPrice*(1+medDown/100):null;
  var projectedLeadLag=leadLagTrend?Math.round(leadLagTrend.slope*curCycle+leadLagTrend.intercept):medDays;

  // --- Stat cards ---
  var cards=priceBottoms.map(function(p){
    return statCard("C"+p.cycle+" bottom","$"+Math.round(p.price).toLocaleString(),p.date,CYCLE_COLORS[p.cycle]||CC.muted);
  }).join("");

  var patternCards=[
    statCard("Median lead-lag",medDays!==null?medDays+"d":"—","MVRV troughs before price"+(outlierCount?" · "+outlierCount+" outlier"+(outlierCount>1?"s":"")+" excluded":""),CC.teal),
    statCard("Median further downside",medDown!==null?medDown.toFixed(0)+"%":"—","After MVRV troughs, price can still drop this much",CC.red),
    statCard("Median divergence",medDiv!==null?medDiv.toFixed(1)+"%":"—","MVRV rise from trough at price bottom",CC.accent),
    projectedFloor?statCard("Floor · MVRV downside","$"+Math.round(projectedFloor).toLocaleString(),"Price @ MVRV trough × median further downside",CC.teal):statCard("Floor · MVRV downside","—","MVRV trough not yet confirmed",CC.muted),
  ].join("");

  // --- Table rows ---
  var tableRows=priceBottoms.filter(function(p){return p.daysDiff!==null&&p.mvrvTroughDate;}).map(function(p){
    var lag=p.daysDiff>0?"Price +"+p.daysDiff+"d after MVRV":p.daysDiff<0?"Price "+Math.abs(p.daysDiff)+"d before MVRV":"Same day";
    var outlierFlag=(p.isOutlierDays||p.isOutlierDiv||p.isOutlierDown)?" ⚠":"";
    var divCell=p.divergencePct!==null?'<td style="color:'+(Math.abs(p.divergencePct)<5?CC.amber:CC.teal)+'">'+p.divergencePct.toFixed(1)+'%'+(p.isOutlierDiv?" ⚠":"")+'</td>':'<td>—</td>';
    var downCell=p.furtherDownside!==null?'<td style="color:'+CC.red+'">'+p.furtherDownside.toFixed(0)+'%'+(p.isOutlierDown?" ⚠":"")+'</td>':'<td>—</td>';
    return'<tr><td style="color:'+(CYCLE_COLORS[p.cycle]||CC.muted)+';font-weight:600">C'+p.cycle+outlierFlag+'</td>'
      +'<td>$'+Math.round(p.price).toLocaleString()+'</td>'
      +'<td>'+p.date+'</td>'
      +'<td>'+(p.mvrvOnDay?p.mvrvOnDay.toFixed(3):"—")+'</td>'
      +'<td>'+(p.priceAtMvrvTrough?"$"+Math.round(p.priceAtMvrvTrough).toLocaleString():"—")+'</td>'
      +downCell
      +'<td>'+(p.daysDiff+(p.isOutlierDays?" ⚠":""))+'d</td>'
      +divCell
      +'<td>'+lag+'</td></tr>';
  }).join("");

  document.getElementById("p9").innerHTML=
    '<div class="g4">'+cards+'</div>'+
    '<div class="chart-card"><div class="chart-title">BTC price bottom per cycle · log scale</div>'+makeCanvas("c9bot_a",220)+'</div>'+
    '<div class="chart-card"><div class="chart-title">MVRV on the day of BTC price bottom vs MVRV\'s own trough</div>'+makeCanvas("c9bot_b",200)+'</div>'+
    '<div class="g4" style="margin-top:0">'+[
      statCard("Median lead-lag",medDays!==null?medDays+"d":"—","MVRV troughs before price"+(outlierCount?" · "+outlierCount+" outlier"+(outlierCount>1?"s":"")+" excl.":""),CC.teal),
      statCard("Median further downside",medDown!==null?medDown.toFixed(0)+"%":"—","After MVRV troughs, price can still drop this much",CC.red),
      statCard("Median divergence",medDiv!==null?medDiv.toFixed(1)+"%":"—","MVRV rise from trough at price bottom",CC.accent),
    ].join("")+'</div>'+
    '<div class="chart-card"><div class="chart-title">Further price downside after MVRV troughed · % drop from MVRV trough date to price bottom</div>'+makeCanvas("c9bot_d",200)+'</div>'+
    '<div class="chart-card"><div class="chart-title">MVRV divergence at price bottom (%)</div>'+makeCanvas("c9bot_c",200)+'</div>'+
    '<div class="tbl-wrap"><table><thead><tr><th>Cycle</th><th>BTC Bottom</th><th>Bottom date</th><th>MVRV that day</th><th>Price @ MVRV trough</th><th>Further downside</th><th>Lead/lag</th><th>Divergence</th><th>Direction</th></tr></thead><tbody>'+tableRows+'</tbody></table></div>'+
    '<div class="info">⚠ = statistical outlier (IQR method), excluded from median stats. Lead/lag: MVRV troughs first, then price follows. Divergence = how far MVRV had already risen from its trough when BTC price bottomed. Further downside = % drop from price-at-MVRV-trough to actual price bottom. See Projections tab for price floor models.</div>';

  destroyChart("c9bot_a");destroyChart("c9bot_b");destroyChart("c9bot_c");destroyChart("c9bot_d");

  // Bottom price bar chart (log scale)
  CHARTS.c9bot_a=new Chart(document.getElementById("c9bot_a"),{type:"bar",data:{
    labels:priceBottoms.map(function(p){return"C"+p.cycle;}),
    datasets:[{label:"BTC Bottom (USD)",data:priceBottoms.map(function(p){return p.price;}),backgroundColor:priceBottoms.map(function(p){return CYCLE_COLORS[p.cycle]||CC.muted;}),borderRadius:6}]
  },options:withLegend(Object.assign({},chartDefs(),{scales:{x:chartDefs().scales.x,y:Object.assign({},chartDefs().scales.y,{type:"logarithmic",ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return v>=1000000?"$"+(v/1000000).toFixed(0)+"M":v>=1000?"$"+(v/1000).toFixed(0)+"k":"$"+v;}})})}}))});

  // Further downside bar chart
  var downCycles=priceBottoms.filter(function(p){return p.furtherDownside!==null;});
  CHARTS.c9bot_d=new Chart(document.getElementById("c9bot_d"),{type:"bar",data:{
    labels:downCycles.map(function(p){return"C"+p.cycle+(p.isOutlierDown?" ⚠":"");}),
    datasets:[
      {label:"Further downside %",data:downCycles.map(function(p){return p.furtherDownside;}),backgroundColor:downCycles.map(function(p){return p.isOutlierDown?"#a89fc4":(CYCLE_COLORS[p.cycle]||CC.muted)+"cc";}),borderRadius:6},
      {label:"Median (excl. outliers)",data:downCycles.map(function(){return medDown;}),borderColor:"#a89fc4",borderWidth:2,borderDash:[6,3],pointRadius:0,type:"line",fill:false}
    ]
  },options:withLegend(Object.assign({},chartDefs(),{scales:{x:chartDefs().scales.x,y:Object.assign({},chartDefs().scales.y,{title:{display:true,text:"% further drop after MVRV troughed",color:"#a89fc4",font:{size:13}},ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return v+"%"}})})}})  )});

  // MVRV compare bar chart
  var mvrvCompareCycles=priceBottoms.filter(function(p){return p.mvrvOnDay&&p.mvrvTroughMvrv;});
  CHARTS.c9bot_b=new Chart(document.getElementById("c9bot_b"),{type:"bar",data:{
    labels:mvrvCompareCycles.map(function(p){return"C"+p.cycle;}),
    datasets:[
      {label:"MVRV at price bottom",data:mvrvCompareCycles.map(function(p){return p.mvrvOnDay;}),backgroundColor:mvrvCompareCycles.map(function(p){return(CYCLE_COLORS[p.cycle]||CC.muted)+"cc";}),borderRadius:6},
      {label:"MVRV trough",data:mvrvCompareCycles.map(function(p){return p.mvrvTroughMvrv;}),backgroundColor:"#a89fc4",borderRadius:6}
    ]
  },options:withLegend(Object.assign({},chartDefs(),{scales:{x:Object.assign({},chartDefs().scales.x,{stacked:false}),y:Object.assign({},chartDefs().scales.y,{min:0,title:{display:true,text:"MVRV",color:"#a89fc4",font:{size:13}}})}}))});

  // Divergence bar chart
  var divCycles=priceBottoms.filter(function(p){return p.divergencePct!==null;});
  CHARTS.c9bot_c=new Chart(document.getElementById("c9bot_c"),{type:"bar",data:{
    labels:divCycles.map(function(p){return"C"+p.cycle+(p.isOutlierDiv?" ⚠":"");}),
    datasets:[
      {label:"Divergence %",data:divCycles.map(function(p){return p.divergencePct;}),backgroundColor:divCycles.map(function(p){return p.isOutlierDiv?"#a89fc4":(CYCLE_COLORS[p.cycle]||CC.muted)+"cc";}),borderRadius:6},
      {label:"Median (excl. outliers)",data:divCycles.map(function(){return medDiv;}),borderColor:"#a89fc4",borderWidth:2,borderDash:[6,3],pointRadius:0,type:"line",fill:false}
    ]
  },options:withLegend(Object.assign({},chartDefs(),{scales:{x:chartDefs().scales.x,y:Object.assign({},chartDefs().scales.y,{title:{display:true,text:"Divergence (%)",color:"#a89fc4",font:{size:13}},ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return v+"%"}})})}})  )});
}

function exportSummary(){
  var s=STATS, l=s.last;
  var lines=[];
  var hr=function(title){lines.push("","=== "+title+" ===");};
  var row=function(label,val){lines.push(label+": "+val);};

  hr("CURRENT STATUS");
  row("Date",l.dateStr);
  row("MVRV",l.mvrv.toFixed(3));
  row("Z-score",l.zscore.toFixed(3));
  var signal=l.zscore<CONFIG.ZSCORE_CAPITULATION?"Capitulation":l.zscore<0?"Accumulate":l.zscore<CONFIG.ZSCORE_CAUTION?"Neutral":"Caution";
  row("Signal",signal);
  row("MA20",l.ma20.toFixed(3));
  row("MA50",l.ma50.toFixed(3));
  row("MA200",l.ma200.toFixed(3));
  row("MA stack",l.ma20>l.ma50&&l.ma50>l.ma200?"Bullish (MA20>MA50>MA200)":l.ma20<l.ma50&&l.ma50<l.ma200?"Bearish (MA20<MA50<MA200)":"Mixed");
  row("ROC 30d",(l.roc30!=null?l.roc30.toFixed(1):"-")+"%");
  row("ROC 90d",(l.roc90!=null?l.roc90.toFixed(1):"-")+"%");
  if(hasPriceData&&l.price)row("BTC Price","$"+Math.round(l.price).toLocaleString());
  row("All-time MVRV peak",s.peakRow.mvrv.toFixed(3)+" on "+s.peakRow.dateStr);
  row("All-time MVRV bottom",s.botRow.mvrv.toFixed(3)+" on "+s.botRow.dateStr);
  row("Historical mean MVRV",s.mean.toFixed(3));
  row("Data range",DATA[0].dateStr+" to "+DATA[DATA.length-1].dateStr);
  row("Total data points",DATA.length.toLocaleString());

  hr("CURRENT CYCLE POSITION");
  var curCycle=l.cycle;
  var curCycleData=s.cycleData.find(function(c){return c.cycle===curCycle});
  row("Current cycle","C"+curCycle+(CYCLE_LABELS[curCycle]?" ("+CYCLE_LABELS[curCycle]+")":""));
  row("Cycle position",(l.cyclePct!=null?l.cyclePct.toFixed(1)+"%":"unknown"));
  if(curCycleData){
    row("Cycle peak so far",curCycleData.peak.toFixed(3)+" on "+curCycleData.peakDate);
    row("Current MVRV vs cycle peak",((l.mvrv/curCycleData.peak)*100).toFixed(0)+"% of cycle peak");
    row("Days in current cycle",curCycleData.days);
    row("Current drawdown from cycle peak",((l.mvrv-curCycleData.peak)/curCycleData.peak*100).toFixed(1)+"%");
  }

  hr("CYCLE SUMMARY");
  s.cycleData.forEach(function(c){
    lines.push("");
    lines.push("Cycle "+c.cycle+(CYCLE_LABELS[c.cycle]?" ("+CYCLE_LABELS[c.cycle]+")":"")+":");
    row("  Peak MVRV",c.peak.toFixed(3)+" on "+c.peakDate);
    row("  Trough MVRV",c.trough.toFixed(3)+" on "+c.troughDate);
    row("  Peak-to-trough range",((c.peak-c.trough)/c.peak*100).toFixed(0)+"% compression");
    row("  Duration",c.days+" days");
    if(hasPriceData){
      var p=PRICE_MAP[c.peakDate];if(p)row("  BTC price at MVRV peak","$"+Math.round(p).toLocaleString());
      var t=PRICE_MAP[c.troughDate];if(t)row("  BTC price at MVRV trough","$"+Math.round(t).toLocaleString());
    }
  });

  hr("DRAWDOWN — Max MVRV drawdown from cycle peak");
  s.cycleData.forEach(function(c){
    var pts=(BY_CYCLE[c.cycle]||[]).filter(function(d){return d.drawdown!=null});
    if(!pts.length)return;
    var worst=pts.reduce(function(a,b){return a.drawdown<b.drawdown?a:b});
    lines.push("");lines.push("Cycle "+c.cycle+":");
    row("  Max drawdown",worst.drawdown.toFixed(1)+"% on "+worst.dateStr);
    if(hasPriceData&&worst.price){
      var athPt=pts.filter(function(d){return d.price}).reduce(function(a,b){return b.price>a.price?b:a},worst);
      row("  BTC price at worst drawdown","$"+Math.round(worst.price).toLocaleString());

function buildProjections(){
  var s=STATS, l=s.last;
  var curCycle=l.cycle;
  var models=[];

  // --- Shared helpers ---
  function med(arr){
    if(!arr.length)return null;
    var sorted=arr.slice().sort(function(a,b){return a-b});
    var mid=Math.floor(sorted.length/2);
    return sorted.length%2?sorted[mid]:(sorted[mid-1]+sorted[mid])/2;
  }
  function iqrOutlier(val,arr){
    if(arr.length<4)return false;
    var sorted=arr.slice().sort(function(a,b){return a-b});
    var q1=sorted[Math.floor(sorted.length*0.25)];
    var q3=sorted[Math.floor(sorted.length*0.75)];
    var iqr=q3-q1;
    return val<q1-1.5*iqr||val>q3+1.5*iqr;
  }

  // Collect completed cycle price peaks
  var cyclePeakPrices={};
  var cyclePeakMVRV={};
  s.availCycles.forEach(function(c){
    var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.price});
    if(sub.length){
      var best=sub.reduce(function(a,b){return b.price>a.price?b:a});
      cyclePeakPrices[c]=best.price;
    }
    var cd=s.cycleData.find(function(x){return x.cycle===c});
    if(cd)cyclePeakMVRV[c]=cd.peak;
  });

  // --- Model 1: MVRV upside ---
  // Price at MVRV peak × median remaining upside %
  var curMvrvPeak=s.cycleData.find(function(c){return c.cycle===curCycle});
  var curMvrvPeakPrice=curMvrvPeak?PRICE_MAP[curMvrvPeak.peakDate]:null;
  var remainingUpsides=s.availCycles.map(function(c){
    var cd=s.cycleData.find(function(x){return x.cycle===c});
    if(!cd)return null;
    var peakP=PRICE_MAP[cd.peakDate];
    var ath=cyclePeakPrices[c];
    if(!peakP||!ath)return null;
    return(ath-peakP)/peakP*100;
  }).filter(function(x){return x!==null});
  var cleanUp=remainingUpsides.filter(function(v){return!iqrOutlier(v,remainingUpsides)});
  var medUp=med(cleanUp);
  var m1=curMvrvPeakPrice&&medUp!==null?curMvrvPeakPrice*(1+medUp/100):null;
  models.push({
    name:"MVRV Upside",
    price:m1,
    basis:"Price at MVRV peak × median remaining upside ("+( medUp?medUp.toFixed(0):"-")+"%) across cycles",
    confidence:m1?"Medium — depends on MVRV peak being confirmed":"Low — MVRV peak not yet in",
    color:CC.green,
    available:!!m1
  });

  // --- Model 2: Halving multiplier decay ---
  var halvData=s.availCycles.map(function(c){
    var halvingDate=HALVINGS[c-1];
    if(!halvingDate)return null;
    var hPrice=priceAtHalving(halvingDate);
    var ath=cyclePeakPrices[c];
    if(!hPrice||!ath)return null;
    return{cycle:c,mult:ath/hPrice,halvingPrice:hPrice,price:ath};
  }).filter(Boolean);
  var halvMults=halvData.map(function(p){return p.mult});
  var cleanHalvData=halvData.filter(function(p){return!iqrOutlier(p.mult,halvMults)});
  // Use log-log regression: log(mult) ~ log(cycle) — multipliers decay as a power law
  var halvLogLogR=cleanHalvData.length>=2?linReg(cleanHalvData.map(function(p){return Math.log(p.cycle)}),cleanHalvData.map(function(p){return Math.log(p.mult)})):null;
  var curHalvPrice=HALVINGS[curCycle-1]?priceAtHalving(HALVINGS[curCycle-1]):null;
  var projMult=halvLogLogR?Math.exp(halvLogLogR.slope*Math.log(curCycle)+halvLogLogR.intercept):med(cleanHalvData.map(function(p){return p.mult}));
  var m2=curHalvPrice&&projMult?curHalvPrice*projMult:null;
  models.push({
    name:"Halving Multiplier",
    price:m2,
    basis:"Price on halving date ("+( curHalvPrice?"$"+Math.round(curHalvPrice).toLocaleString():"-")+") × log-decay projected multiplier (×"+(projMult?projMult.toFixed(1):"-")+")",
    confidence:"Medium — multiplier shrinks each cycle, log regression captures this",
    color:CC.teal,
    available:!!m2
  });

  // --- Model 3: ATH multiplier decay ---
  var athMults=[];
  var cycleList=s.availCycles;
  for(var i=1;i<cycleList.length;i++){
    var c=cycleList[i], prev=cycleList[i-1];
    if(cyclePeakPrices[c]&&cyclePeakPrices[prev]){
      athMults.push({cycle:c,mult:cyclePeakPrices[c]/cyclePeakPrices[prev]});
    }
  }
  var athMultVals=athMults.map(function(p){return p.mult});
  var cleanAth=athMults.filter(function(p){return!iqrOutlier(p.mult,athMultVals)});
  var athLogLogR2=cleanAth.length>=2?linReg(cleanAth.map(function(p){return Math.log(p.cycle)}),cleanAth.map(function(p){return Math.log(p.mult)})):null;
  var prevATH=cyclePeakPrices[cycleList[cycleList.length-2]]||null;
  var projAthMult=athLogLogR2?Math.exp(athLogLogR2.slope*Math.log(curCycle)+athLogLogR2.intercept):med(cleanAth.map(function(p){return p.mult}));
  var m3=prevATH&&projAthMult?prevATH*projAthMult:null;
  models.push({
    name:"ATH Multiplier",
    price:m3,
    basis:"Previous cycle ATH ($"+(prevATH?Math.round(prevATH).toLocaleString():"-")+") × log-decay projected multiplier (×"+(projAthMult?projAthMult.toFixed(2):"-")+")",
    confidence:"Medium — fewest data points, sensitive to outliers",
    color:CC.amber,
    available:!!m3
  });

  // --- Model 4: MVRV peak regression × realized cap ---
  // Projected MVRV peak → implied market cap → implied price
  // market cap = MVRV × realized cap, realized cap ≈ market cap / MVRV
  // Estimate realized cap from current data: realizedCap = marketCap / MVRV
  // BTC supply ~19.8M coins at ~$60k avg realized price ≈ realized cap
  // We can approximate: if MVRV = mktCap/realizedCap, then price = MVRV_proj × (currentPrice / currentMVRV) × (realizedCap_growth)
  // Simpler: price_proj = currentPrice × (mvrvProj / currentMVRV)
  var mvrvProj=s.nextLogPeak; // log regression projected peak for next cycle above current
  // But for current cycle, use current cycle log projection
  var curCycleLogPeakMVRV=Math.max(0,s.logR.slope*Math.log(curCycle)+s.logR.intercept);
  var m4=l.price&&l.mvrv&&curCycleLogPeakMVRV?(l.price/l.mvrv)*curCycleLogPeakMVRV:null;
  models.push({
    name:"MVRV × Realized Cap",
    price:m4,
    basis:"Current price ÷ current MVRV × projected cycle peak MVRV ("+curCycleLogPeakMVRV.toFixed(2)+"). Assumes realized cap stays constant — conservative.",
    confidence:"Low-Medium — realized cap grows over time, so this tends to underestimate",
    color:CC.accent,
    available:!!m4
  });

  // --- Consensus ---
  var validPrices=models.filter(function(m){return m.available}).map(function(m){return m.price});
  var cleanPrices=validPrices.filter(function(v){return!iqrOutlier(v,validPrices)});
  var consensusMin=cleanPrices.length?Math.min.apply(null,cleanPrices):null;
  var consensusMax=cleanPrices.length?Math.max.apply(null,cleanPrices):null;
  var consensusMid=med(cleanPrices);
  var excluded=validPrices.length-cleanPrices.length;

  // --- Build HTML ---
  var consensusHtml='<div style="background:#2c2840;border:1px solid #3c3754;border-radius:16px;padding:24px 28px;margin-bottom:0">'
    +'<div style="font-size:0.8rem;letter-spacing:.1em;text-transform:uppercase;color:#a89fc4;margin-bottom:8px">Consensus Range · C'+curCycle+(excluded?' · '+excluded+' outlier model'+(excluded>1?'s':'')+" excluded":"")+'</div>'
    +(consensusMid?
      '<div style="font-size:2.4rem;font-weight:700;color:'+CC.accent+';letter-spacing:-.02em">$'+Math.round(consensusMid).toLocaleString()+'</div>'
      +'<div style="font-size:1rem;color:'+CC.muted+';margin-top:4px">midpoint · range $'+Math.round(consensusMin).toLocaleString()+' – $'+Math.round(consensusMax).toLocaleString()+'</div>'
      :'<div style="font-size:1.5rem;color:#a89fc4">Insufficient data</div>')
    +'<div style="font-size:0.85rem;color:#a89fc4;margin-top:10px">Based on '+cleanPrices.length+' model'+(cleanPrices.length!==1?'s':'')+' · not financial advice</div>'
    +'</div>';

  var modelCards=models.map(function(m){
    if(!m.available)return statCard(m.name,"—","No data yet",CC.muted);
    var isOutl=iqrOutlier(m.price,validPrices);
    return statCard(m.name+(isOutl?" ⚠":""),"$"+Math.round(m.price).toLocaleString(),isOutl?"outlier — excluded from consensus":m.confidence.split("—")[0].trim(),isOutl?CC.muted:m.color);
  }).join("");

  var methodRows=models.map(function(m){
    return'<tr>'
      +'<td style="color:'+m.color+';font-weight:600">'+m.name+'</td>'
      +'<td>'+(m.available?"$"+Math.round(m.price).toLocaleString():"—")+'</td>'

      +'<td style="font-size:0.85rem;white-space:normal;min-width:200px;color:'+(m.confidence.startsWith("High")?CC.green:m.confidence.startsWith("Medium")?CC.amber:CC.red)+'">'+m.confidence+'</td>'
      +'</tr>';
  }).join("");

  // --- Multiplier history table (moved from Price Peaks) ---
  var multRows=halvData.map(function(p){
    var athMult=athMults.find(function(a){return a.cycle===p.cycle});
    var hOutlier=iqrOutlier(p.mult,halvMults);

      +'<td>$'+Math.round(p.halvingPrice).toLocaleString()+'</td>'
      +'<td>$'+Math.round(p.price).toLocaleString()+'</td>'
      +'<td style="color:'+CC.teal+'">×'+p.mult.toFixed(1)+(hOutlier?" ⚠":"")+'</td>'
      +'<td style="color:'+CC.amber+'">'+(athMult?"×"+athMult.mult.toFixed(2)+(aOutlier?" ⚠":""):"—")+'</td>'
      +'</tr>';
  }).join("");

  // ---- FLOOR MODELS ----
  var floorModels=[];
  var cycleBotPrices={};
  s.availCycles.forEach(function(c){
    var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.price;});
    if(sub.length){var worst=sub.reduce(function(a,b){return b.price<a.price?b:a});cycleBotPrices[c]=worst.price;}
  });
  // Floor M1: MVRV further downside
  var curMvrvTrough2=s.cycleData.find(function(c){return c.cycle===curCycle;});
  var curMvrvTroughPrice2=curMvrvTrough2?PRICE_MAP[curMvrvTrough2.troughDate]:null;
  var furtherDownsides=s.availCycles.map(function(c){
    var cd=s.cycleData.find(function(x){return x.cycle===c;});
    if(!cd)return null;
    var troughP=PRICE_MAP[cd.troughDate];var bot=cycleBotPrices[c];
    if(!troughP||!bot)return null;
    return(bot-troughP)/troughP*100;
  }).filter(function(x){return x!==null;});
  var cleanFD=furtherDownsides.filter(function(v){return!iqrOutlier(v,furtherDownsides);});
  var medFD=med(cleanFD);
  var fm1=curMvrvTroughPrice2&&medFD!==null?curMvrvTroughPrice2*(1+medFD/100):null;
  floorModels.push({name:"MVRV Downside",price:fm1,basis:"Price at MVRV trough × median further downside ("+(medFD?medFD.toFixed(0):"\u2014")+"%) across cycles",confidence:"Medium — depends on MVRV trough being confirmed",color:CC.teal,available:!!fm1});
  // Floor M2: Halving floor ratio
  var halvFloorData=s.availCycles.map(function(c){
    var halvingDate=HALVINGS[c-1];if(!halvingDate)return null;
    var hPrice=priceAtHalving(halvingDate);var bot=cycleBotPrices[c];
    if(!hPrice||!bot)return null;
    return{cycle:c,ratio:bot/hPrice};
  }).filter(Boolean);
  var halvFloorRatios=halvFloorData.map(function(p){return p.ratio;});
  var cleanHFD=halvFloorData.filter(function(p){return!iqrOutlier(p.ratio,halvFloorRatios);});
  var halvFloorLogR=cleanHFD.length>=2?linReg(cleanHFD.map(function(p){return Math.log(p.cycle);}),cleanHFD.map(function(p){return Math.log(p.ratio);})):null;
  var projFloorRatio=halvFloorLogR?Math.exp(halvFloorLogR.slope*Math.log(curCycle)+halvFloorLogR.intercept):med(cleanHFD.map(function(p){return p.ratio;}));
  var fm2=curHalvPrice&&projFloorRatio?curHalvPrice*projFloorRatio:null;
  floorModels.push({name:"Halving Floor Ratio",price:fm2,basis:"Price on halving date ("+(curHalvPrice?"$"+Math.round(curHalvPrice).toLocaleString():"\u2014")+") × log-decay floor ratio (×"+(projFloorRatio?projFloorRatio.toFixed(2):"\u2014")+")",confidence:"Medium — ratio rises each cycle",color:CC.amber,available:!!fm2});
  // Floor M3: Previous bottom multiplier
  var botMults2=[];
  for(var bi=1;bi<cycleList.length;bi++){
    var bc=cycleList[bi],bprev=cycleList[bi-1];
    if(cycleBotPrices[bc]&&cycleBotPrices[bprev])botMults2.push({cycle:bc,mult:cycleBotPrices[bc]/cycleBotPrices[bprev]});
  }
  var botMultVals=botMults2.map(function(p){return p.mult;});
  var cleanBotMult=botMults2.filter(function(p){return!iqrOutlier(p.mult,botMultVals);});
  var botMultLogR=cleanBotMult.length>=2?linReg(cleanBotMult.map(function(p){return Math.log(p.cycle);}),cleanBotMult.map(function(p){return Math.log(p.mult);})):null;
  var prevBotPrice=cycleBotPrices[cycleList[cycleList.length-2]]||null;
  var projBotMult=botMultLogR?Math.exp(botMultLogR.slope*Math.log(curCycle)+botMultLogR.intercept):med(cleanBotMult.map(function(p){return p.mult;}));
  var fm3=prevBotPrice&&projBotMult?prevBotPrice*projBotMult:null;
  floorModels.push({name:"Bottom Multiplier",price:fm3,basis:"Previous cycle bottom ($"+(prevBotPrice?Math.round(prevBotPrice).toLocaleString():"\u2014")+") × log-decay projected mult. (×"+(projBotMult?projBotMult.toFixed(2):"\u2014")+")",confidence:"Medium — fewest data points",color:CC.red,available:!!fm3});
  // Floor M4: MVRV trough x realized cap
  var curCycleLogTroughMVRV=Math.max(0,s.troughLogR.slope*Math.log(curCycle)+s.troughLogR.intercept);
  var fm4bot=l.price&&l.mvrv&&curCycleLogTroughMVRV?(l.price/l.mvrv)*curCycleLogTroughMVRV:null;
  floorModels.push({name:"MVRV Trough × RC",price:fm4bot,basis:"Current price ÷ current MVRV × projected cycle trough MVRV ("+curCycleLogTroughMVRV.toFixed(3)+"). Realized cap assumed constant.",confidence:"Low-Medium — tends to overestimate floor",color:CC.accent,available:!!fm4bot});
  // Floor consensus
  var validFloors=floorModels.filter(function(m){return m.available;}).map(function(m){return m.price;});
  var cleanFloors=validFloors.filter(function(v){return!iqrOutlier(v,validFloors);});
  var floorMin=cleanFloors.length?Math.min.apply(null,cleanFloors):null;
  var floorMax=cleanFloors.length?Math.max.apply(null,cleanFloors):null;
  var floorMid=med(cleanFloors);
  var floorExcluded=validFloors.length-cleanFloors.length;
  var floorConsensusHtml='<div style="background:#2c2840;border:1px solid #3c3754;border-radius:16px;padding:24px 28px;margin-bottom:0">'
    +'<div style="font-size:0.8rem;letter-spacing:.1em;text-transform:uppercase;color:#a89fc4;margin-bottom:8px">Floor Range · C'+curCycle+(floorExcluded?' · '+floorExcluded+' outlier model'+(floorExcluded>1?'s':'')+' excluded':'')+'</div>'
    +(floorMid?
      '<div style="font-size:2.4rem;font-weight:700;color:'+CC.teal+';letter-spacing:-.02em">$'+Math.round(floorMid).toLocaleString()+'</div>'
      +'<div style="font-size:1rem;color:'+CC.muted+';margin-top:4px">midpoint · range $'+Math.round(floorMin).toLocaleString()+' – $'+Math.round(floorMax).toLocaleString()+'</div>'
      :'<div style="font-size:1.5rem;color:#a89fc4">Insufficient data</div>')
    +'<div style="font-size:0.85rem;color:#a89fc4;margin-top:10px">Based on '+cleanFloors.length+' model'+(cleanFloors.length!==1?'s':'')+' · not financial advice</div>'
    +'</div>';
  var floorModelCards=floorModels.map(function(m){
    if(!m.available)return statCard(m.name,"\u2014","No data yet",CC.muted);
    var isOutl=iqrOutlier(m.price,validFloors);
    return statCard(m.name+(isOutl?" ⚠":""),"$"+Math.round(m.price).toLocaleString(),isOutl?"outlier — excluded from consensus":m.confidence.split("\u2014")[0].trim(),isOutl?CC.muted:m.color);
  }).join("");
  var floorMethodRows=floorModels.map(function(m){
    return'<tr><td style="color:'+m.color+';font-weight:600">'+m.name+'</td>'
      +'<td>'+(m.available?"$"+Math.round(m.price).toLocaleString():"\u2014")+'</td>'
      +'<td style="font-size:0.85rem">'+m.basis+'</td>'
      +'<td style="font-size:0.85rem;white-space:normal;min-width:200px;color:'+(m.confidence.charAt(0)==="H"?CC.green:m.confidence.charAt(0)==="M"?CC.amber:CC.red)+'">'+m.confidence+'</td></tr>';
  }).join("");

  document.getElementById("p10").innerHTML=
    '<div style="font-size:0.85rem;font-weight:600;color:'+CC.accent+';margin-bottom:8px;letter-spacing:.08em;text-transform:uppercase">▲ Ceiling — How High</div>'+
    consensusHtml+
    '<div class="g4" style="margin-top:0">'+modelCards+'</div>'+
    '<div class="chart-card"><div class="chart-title">Ceiling model comparison · C'+curCycle+' price ceiling estimates</div>'+makeCanvas("c9a",260)+'</div>'+
    '<div class="tbl-wrap"><table><thead><tr><th>Model</th><th>Ceiling</th><th>Basis</th><th>Confidence</th></tr></thead><tbody>'+methodRows+'</tbody></table></div>'+
    '<div style="font-size:0.85rem;font-weight:600;color:'+CC.teal+';margin:24px 0 8px;letter-spacing:.08em;text-transform:uppercase">▼ Floor — How Low</div>'+
    floorConsensusHtml+
    '<div class="g4" style="margin-top:0">'+floorModelCards+'</div>'+
    '<div class="chart-card"><div class="chart-title">Floor model comparison · C'+curCycle+' price floor estimates</div>'+makeCanvas("c9b_floor",260)+'</div>'+
    '<div class="tbl-wrap"><table><thead><tr><th>Model</th><th>Floor</th><th>Basis</th><th>Confidence</th></tr></thead><tbody>'+floorMethodRows+'</tbody></table></div>'+
    '<div class="tbl-wrap"><div class="chart-title" style="padding:16px 0 10px">Historical multipliers — data behind the models</div><table><thead><tr><th>Cycle</th><th>Price @ halving</th><th>ATH</th><th>Halving mult.</th><th>ATH mult. (vs prev)</th></tr></thead><tbody>'+multRows+'</tbody></table></div>'+
    '<div class="info">⚠ = statistical outlier excluded from log-log regression. Ceiling: Halving mult. = ATH ÷ halving price. ATH mult. = this ATH ÷ previous ATH. Floor: Halving Floor Ratio = bottom ÷ halving price. Bottom Multiplier = this bottom ÷ previous bottom. All decay as power laws. Projections update automatically as new cycles are added.</div>';

  destroyChart("c9a");

  var barData=models.filter(function(m){return m.available});
  var consensusMidVal=consensusMid;
  CHARTS.c9a=new Chart(document.getElementById("c9a"),{
    type:"bar",
    data:{
      labels:barData.map(function(m){return m.name}),
      datasets:[
        {label:"Price projection",data:barData.map(function(m){return m.price}),backgroundColor:barData.map(function(m){return iqrOutlier(m.price,validPrices)?"#a89fc4":m.color+"cc"}),borderRadius:8},
        {label:"Consensus midpoint",data:barData.map(function(){return consensusMidVal}),borderColor:"#a89fc4",borderWidth:2,borderDash:[6,3],pointRadius:0,type:"line",fill:false}
      ]
    },
    options:withLegend(Object.assign({},chartDefs(),{
      scales:{
        x:chartDefs().scales.x,
        y:Object.assign({},chartDefs().scales.y,{
          ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return"$"+v.toLocaleString()}}),
          title:{display:true,text:"Price (USD)",color:"#a89fc4",font:{size:13}}
        })
      },
      plugins:Object.assign({},withLegend(chartDefs()).plugins,{
        tooltip:{callbacks:{label:function(ctx){
          if(ctx.dataset.type==="line")return"Consensus: $"+Math.round(ctx.parsed.y).toLocaleString();
          var m=barData[ctx.dataIndex];
          return[m.name+": $"+Math.round(m.price).toLocaleString(),iqrOutlier(m.price,validPrices)?"⚠ outlier — excluded":m.confidence];
        }}}
      })
    }))
  });

  // Floor chart
  destroyChart("c9b_floor");
  var floorBarData=floorModels.filter(function(m){return m.available;});
  var floorMidVal=floorMid;
  CHARTS.c9b_floor=new Chart(document.getElementById("c9b_floor"),{
    type:"bar",
    data:{
      labels:floorBarData.map(function(m){return m.name;}),
      datasets:[
        {label:"Floor projection",data:floorBarData.map(function(m){return m.price;}),backgroundColor:floorBarData.map(function(m){return iqrOutlier(m.price,validFloors)?"#a89fc4":m.color+"cc";}),borderRadius:8},
        {label:"Floor consensus midpoint",data:floorBarData.map(function(){return floorMidVal;}),borderColor:"#a89fc4",borderWidth:2,borderDash:[6,3],pointRadius:0,type:"line",fill:false}
      ]
    },
    options:withLegend(Object.assign({},chartDefs(),{
      scales:{
        x:chartDefs().scales.x,
        y:Object.assign({},chartDefs().scales.y,{
          ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return"$"+v.toLocaleString();}}),
          title:{display:true,text:"Price (USD)",color:"#a89fc4",font:{size:13}}
        })
      },
      plugins:Object.assign({},withLegend(chartDefs()).plugins,{
        tooltip:{callbacks:{label:function(ctx){
          if(ctx.dataset.type==="line")return"Floor consensus: $"+Math.round(ctx.parsed.y).toLocaleString();
          var m=floorBarData[ctx.dataIndex];
          return[m.name+": $"+Math.round(m.price).toLocaleString(),iqrOutlier(m.price,validFloors)?"⚠ outlier — excluded":m.confidence];
        }}}
      })
    }))
  });
}

// -------- runBacktest — pure data, no HTML --------
// Single source of truth for all backtest calculations.
// Called by both buildBacktest() (renders the tab) and exportSummary() (writes the text file).
function runBacktest(){
  if(!hasPriceData)return{allResults:[],completedResults:[]};

  var s=STATS;

  function med(arr){ if(!arr.length)return null; var sorted=arr.slice().sort(function(a,b){return a-b}); var mid=Math.floor(sorted.length/2); return sorted.length%2?sorted[mid]:(sorted[mid-1]+sorted[mid])/2; }
  function iqrOutlier(val,arr){ if(arr.length<4)return false; var sorted=arr.slice().sort(function(a,b){return a-b}); var q1=sorted[Math.floor(sorted.length*0.25)]; var q3=sorted[Math.floor(sorted.length*0.75)]; var iqr=q3-q1; return val<q1-1.5*iqr||val>q3+1.5*iqr; }

  var cyclePeakPrices={};
  var cycleBotPricesRbt={};
  s.availCycles.forEach(function(c){
    var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.price;});
    if(sub.length){
      var best=sub.reduce(function(a,b){return b.price>a.price?b:a;}); cyclePeakPrices[c]=best.price;
      var worst=sub.reduce(function(a,b){return b.price<a.price?b:a;}); cycleBotPricesRbt[c]=worst.price;
    }
  });

  var backtestCycles=s.availCycles.filter(function(c){ return c>=2&&cyclePeakPrices[c]; });

  var allResults=[];
  backtestCycles.forEach(function(targetCycle){
    var priorCycles=s.availCycles.filter(function(c){return c<targetCycle;});
    var priorData=DATA.filter(function(d){return d.cycle>0&&d.cycle<targetCycle;});
    if(!priorData.length)return;

    var actualATH=cyclePeakPrices[targetCycle];
    var targetHalving=HALVINGS[targetCycle-1];

    var priorPeakPrices={};
    priorCycles.forEach(function(c){
      var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.price;});
      if(sub.length){var best=sub.reduce(function(a,b){return b.price>a.price?b:a;}); priorPeakPrices[c]=best.price;}
    });

    var priorCycleData=s.cycleData.filter(function(c){return c.cycle<targetCycle;});

    // M1: MVRV Upside
    var priorRemainingUpsides=priorCycles.map(function(c){
      var cd=s.cycleData.find(function(x){return x.cycle===c;});
      if(!cd)return null;
      var peakP=PRICE_MAP[cd.peakDate];
      var ath=priorPeakPrices[c];
      if(!peakP||!ath)return null;
      return(ath-peakP)/peakP*100;
    }).filter(function(x){return x!==null;});
    var cleanUp=priorRemainingUpsides.filter(function(v){return!iqrOutlier(v,priorRemainingUpsides);});
    var medUp=med(cleanUp);
    var targetCycleData=s.cycleData.find(function(c){return c.cycle===targetCycle;});
    var targetMvrvPeakPrice=targetCycleData?PRICE_MAP[targetCycleData.peakDate]:null;
    var m1Pred=targetMvrvPeakPrice&&medUp!==null?targetMvrvPeakPrice*(1+medUp/100):null;

    // M2: Halving Multiplier
    var halvData=priorCycles.map(function(c){
      var halvingDate=HALVINGS[c-1]; if(!halvingDate)return null;
      var hPrice=priceAtHalving(halvingDate); var ath=priorPeakPrices[c];
      if(!hPrice||!ath)return null;
      return{cycle:c,mult:ath/hPrice,halvingPrice:hPrice,price:ath};
    }).filter(Boolean);
    var halvMults=halvData.map(function(p){return p.mult;});
    var cleanHalvData=halvData.filter(function(p){return!iqrOutlier(p.mult,halvMults);});
    var halvLogLogR=cleanHalvData.length>=2?linReg(cleanHalvData.map(function(p){return Math.log(p.cycle);}),cleanHalvData.map(function(p){return Math.log(p.mult);})):null;
    var curHalvPrice=targetHalving?priceAtHalving(targetHalving):null;
    var projMult=halvLogLogR?Math.exp(halvLogLogR.slope*Math.log(targetCycle)+halvLogLogR.intercept):med(cleanHalvData.map(function(p){return p.mult;}));
    var m2Pred=curHalvPrice&&projMult?curHalvPrice*projMult:null;

    // M3: ATH Multiplier
    var athMults=[];
    for(var i=1;i<priorCycles.length;i++){
      var c=priorCycles[i],prev=priorCycles[i-1];
      if(priorPeakPrices[c]&&priorPeakPrices[prev]){ athMults.push({cycle:c,mult:priorPeakPrices[c]/priorPeakPrices[prev]}); }
    }
    var athMultVals=athMults.map(function(p){return p.mult;});
    var cleanAth=athMults.filter(function(p){return!iqrOutlier(p.mult,athMultVals);});
    var athLogLogR2=cleanAth.length>=2?linReg(cleanAth.map(function(p){return Math.log(p.cycle);}),cleanAth.map(function(p){return Math.log(p.mult);})):null;
    var prevATH=priorPeakPrices[priorCycles[priorCycles.length-1]]||null;
    var projAthMult=athLogLogR2?Math.exp(athLogLogR2.slope*Math.log(targetCycle)+athLogLogR2.intercept):med(cleanAth.map(function(p){return p.mult;}));
    var m3Pred=prevATH&&projAthMult?prevATH*projAthMult:null;

    // M4: MVRV × Realized Cap
    var lastPrior=priorData[priorData.length-1];
    var priorLogR=priorCycleData.length>=2?logReg(priorCycleData.map(function(c){return c.cycle;}),priorCycleData.map(function(c){return c.peak;})):null;
    var curCycleLogPeakMVRV=priorLogR?Math.max(0,priorLogR.slope*Math.log(targetCycle)+priorLogR.intercept):null;
    var m4Pred=(lastPrior&&lastPrior.price&&lastPrior.mvrv&&curCycleLogPeakMVRV)?(lastPrior.price/lastPrior.mvrv)*curCycleLogPeakMVRV:null;

    // Consensus (IQR) — peaks
    var preds=[m1Pred,m2Pred,m3Pred,m4Pred].filter(function(x){return x!==null;});
    var cleanPreds=preds.filter(function(v){return!iqrOutlier(v,preds);});
    var consensusPred=med(cleanPreds);

    // --- Bottom models (backtested) ---
    var actualBottom=cycleBotPricesRbt[targetCycle]||null;

    // BM1: MVRV further downside
    var priorFurtherDownsides=priorCycles.map(function(c){
      var cd=s.cycleData.find(function(x){return x.cycle===c;});if(!cd)return null;
      var trP=PRICE_MAP[cd.troughDate];var bot=priorPeakPrices[c]?null:null;
      // use actual bottom from prior cycles (not peak prices)
      var priorSub=(BY_CYCLE[c]||[]).filter(function(d){return d.price;});
      if(!priorSub.length)return null;
      var priorBot=priorSub.reduce(function(a,b){return b.price<a.price?b:a;}).price;
      if(!trP||!priorBot)return null;
      return(priorBot-trP)/trP*100;
    }).filter(function(x){return x!==null;});
    var cleanPFD=priorFurtherDownsides.filter(function(v){return!iqrOutlier(v,priorFurtherDownsides);});
    var medPFD=med(cleanPFD);
    var targetCycleDataB=s.cycleData.find(function(c){return c.cycle===targetCycle;});
    var targetMvrvTroughPrice=targetCycleDataB?PRICE_MAP[targetCycleDataB.troughDate]:null;
    var bm1Pred=targetMvrvTroughPrice&&medPFD!==null?targetMvrvTroughPrice*(1+medPFD/100):null;

    // BM2: Halving floor ratio
    var halvFloorRbtData=priorCycles.map(function(c){
      var halvingDate=HALVINGS[c-1];if(!halvingDate)return null;
      var hPrice=priceAtHalving(halvingDate);
      var priorSub2=(BY_CYCLE[c]||[]).filter(function(d){return d.price;});
      if(!priorSub2.length)return null;
      var priorBot2=priorSub2.reduce(function(a,b){return b.price<a.price?b:a;}).price;
      if(!hPrice||!priorBot2)return null;
      return{cycle:c,ratio:priorBot2/hPrice};
    }).filter(Boolean);
    var hfrRatios=halvFloorRbtData.map(function(p){return p.ratio;});
    var cleanHFR=halvFloorRbtData.filter(function(p){return!iqrOutlier(p.ratio,hfrRatios);});
    var hfrLogR=cleanHFR.length>=2?linReg(cleanHFR.map(function(p){return Math.log(p.cycle);}),cleanHFR.map(function(p){return Math.log(p.ratio);})):null;
    var projHFR=hfrLogR?Math.exp(hfrLogR.slope*Math.log(targetCycle)+hfrLogR.intercept):med(cleanHFR.map(function(p){return p.ratio;}));
    var bm2Pred=curHalvPrice&&projHFR?curHalvPrice*projHFR:null;

    // BM3: Previous bottom multiplier
    var priorBotMults=[];
    for(var bmi=1;bmi<priorCycles.length;bmi++){
      var bmc=priorCycles[bmi],bmprev=priorCycles[bmi-1];
      var sub1=(BY_CYCLE[bmc]||[]).filter(function(d){return d.price;});
      var sub2=(BY_CYCLE[bmprev]||[]).filter(function(d){return d.price;});
      if(sub1.length&&sub2.length){
        var b1=sub1.reduce(function(a,b){return b.price<a.price?b:a;}).price;
        var b2=sub2.reduce(function(a,b){return b.price<a.price?b:a;}).price;
        priorBotMults.push({cycle:bmc,mult:b1/b2});
      }
    }
    var pbmVals=priorBotMults.map(function(p){return p.mult;});
    var cleanPBM=priorBotMults.filter(function(p){return!iqrOutlier(p.mult,pbmVals);});
    var pbmLogR=cleanPBM.length>=2?linReg(cleanPBM.map(function(p){return Math.log(p.cycle);}),cleanPBM.map(function(p){return Math.log(p.mult);})):null;
    var lastPriorCycle=priorCycles[priorCycles.length-1];
    var lastPriorBotSub=(BY_CYCLE[lastPriorCycle]||[]).filter(function(d){return d.price;});
    var lastPriorBot=lastPriorBotSub.length?lastPriorBotSub.reduce(function(a,b){return b.price<a.price?b:a;}).price:null;
    var projPBM=pbmLogR?Math.exp(pbmLogR.slope*Math.log(targetCycle)+pbmLogR.intercept):med(cleanPBM.map(function(p){return p.mult;}));
    var bm3Pred=lastPriorBot&&projPBM?lastPriorBot*projPBM:null;

    // Bottom consensus
    var botPreds=[bm1Pred,bm2Pred,bm3Pred].filter(function(x){return x!==null;});
    var cleanBotPreds=botPreds.filter(function(v){return!iqrOutlier(v,botPreds);});
    var consensusBotPred=med(cleanBotPreds);

    allResults.push({
      cycle:targetCycle,
      actualATH:actualATH,
      actualBottom:actualBottom,
      m1:m1Pred, m2:m2Pred, m3:m3Pred, m4:m4Pred,
      consensus:consensusPred,
      bm1:bm1Pred, bm2:bm2Pred, bm3:bm3Pred,
      consensusBot:consensusBotPred,
      halvingPrice:curHalvPrice,
      isCurrent:targetCycle===s.last.cycle
    });
  });

  var completedResults=allResults.filter(function(r){return !r.isCurrent;});
  return{allResults:allResults,completedResults:completedResults};
}

function buildBacktest(){
  if(!hasPriceData){
    document.getElementById("p11").innerHTML='<div class="info" style="margin-top:24px">⚠ Price data is required for backtest analysis. Please wait for price data to load and try again.</div>';
    return;
  }

  var s=STATS;
  var bt=runBacktest();
  var allResults=bt.allResults;
  var completedResults=bt.completedResults;

  function pctErr(pred,actual){ return pred&&actual?((pred-actual)/actual*100):null; }
  function errLabel(err){
    if(err===null)return'<span class="bt-pill bt-pill-gray">N/A</span>';
    var abs=Math.abs(err);
    var cls=abs<20?"bt-pill-green":abs<50?"bt-pill-amber":"bt-pill-red";
    var sign=err>0?"+":"";
    return'<span class="bt-pill '+cls+'">'+sign+err.toFixed(0)+"% "+(err>0?"overshot":"undershot")+'</span>';
  }
  function fmtPred(v){ return v?"$"+Math.round(v).toLocaleString():'<span style="color:#a89fc4">N/A</span>'; }

  // Average absolute error per model
  function avgErr(key){
    var errs=completedResults.map(function(r){var e=pctErr(r[key],r.actualATH);return e!==null?e:null;}).filter(function(x){return x!==null;});
    if(!errs.length)return null;
    return errs.reduce(function(a,b){return a+b;},0)/errs.length;
  }
  var m1Avg=avgErr("m1"), m2Avg=avgErr("m2"), m3Avg=avgErr("m3"), m4Avg=avgErr("m4"), cAvg=avgErr("consensus");

  function avgCard(label,avg,sub){
    if(avg===null)return'<div class="stat"><div class="stat-label">'+label+'</div><div class="stat-val" style="color:#a89fc4">N/A</div></div>';
    var abs=Math.abs(avg);
    var color=abs<20?CC.green:abs<50?CC.amber:CC.red;
    var sign=avg>0?"+":"";
    return'<div class="stat"><div class="stat-label">'+label+'</div><div class="stat-val" style="color:'+color+'">'+sign+avg.toFixed(0)+'%</div><div class="stat-sub">'+sub+'</div></div>';
  }

  // -------- Chart data: predictions vs actuals grouped by cycle --------
  var cycleLabels=allResults.map(function(r){return"C"+r.cycle+(r.isCurrent?" (ongoing)":"");});
  var actualData=allResults.map(function(r){return r.actualATH;});
  var m1Data=allResults.map(function(r){return r.m1;});
  var m2Data=allResults.map(function(r){return r.m2;});
  var m3Data=allResults.map(function(r){return r.m3;});
  var m4Data=allResults.map(function(r){return r.m4;});
  var consData=allResults.map(function(r){return r.consensus;});

  // -------- Per-model detail rows --------
  function modelDetailBlock(modelKey,modelLabel,color,desc,actualKey){
    var aKey=actualKey||"actualATH";
    var rows=allResults.map(function(r){
      var pred=r[modelKey];
      var actual=r[aKey];

      var maxVal=Math.max(pred||0,actual||1);
      var predW=pred?Math.round((pred/maxVal)*100):0;
      var actW=actual?Math.round((actual/maxVal)*100):0;

      if(pred===null){

          '<div class="bt-bar-row">'+

            '<span class="bt-bar-val" style="color:'+(aKey==="actualBottom"?CC.teal:CC.green)+'">$'+Math.round(actual).toLocaleString()+(r.isCurrent?' <span style="font-size:0.75rem;color:#a89fc4">(so far)</span>':'')+' </span>'+

      },
      plugins:Object.assign({},withLegend(chartDefs()).plugins,{
        tooltip:{callbacks:{label:function(ctx){
          var v=ctx.parsed.y;
          if(v==null)return ctx.dataset.label+": N/A";
          return ctx.dataset.label+": $"+Math.round(v).toLocaleString();
        }}}
      })
    }))
  });
}

function wmean365(data, i) {
  var start = Math.max(0, i - CONFIG.ZSCORE_WINDOW + 1);
  var sum = 0, n = 0;
  for (var k = start; k <= i; k++) { sum += data[k].mvrv; n++; }
  return n ? sum / n : 0;
}

function priceAtDate(dateStr){
  if(!hasPriceData)return"—";
  var p=PRICE_MAP[dateStr];
  return p?"$"+Math.round(p).toLocaleString():"—";
}

<script>
/* ---- mobile UX polish only — does not read/modify any dashboard state ----
   When a tab is tapped, the sticky topbar stays put but the freshly-built
   panel below it may start mid-scroll if the user was deep in the previous
   tab. This just brings the viewport back to the top of the page so the
   new panel is visible from its first stat card. */
document.getElementById('tabs').addEventListener('click', function(e){
  if(e.target && e.target.classList && e.target.classList.contains('tab')){
    window.scrollTo({top:0,behavior:'smooth'});
  }
});
