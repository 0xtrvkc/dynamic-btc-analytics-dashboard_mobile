<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#1b1924"/>
<meta name="color-scheme" content="dark"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>MVRV Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
/* ====================================================================
   MVRV Analytics — vertical mobile, pastel terminal theme
   Single mono typeface throughout; soft dark canvas; pastel signal hues.
   ==================================================================== */

:root{
  --bg:#1b1924;
  --surface:#242131;
  --surface2:#2c2840;
  --border:#3c3754;
  --text:#ece7f7;
  --muted:#a89fc4;
  --faint:#322d47;
  --accent:#b9a6f5;
  --teal:#7fd9c4;
  --amber:#f0bd80;
  --red:#f29bab;
  --green:#9bdb9e;
  --radius-lg:16px;
  --radius:14px;
  --radius-sm:10px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono','Fira Mono','Courier New',monospace;
  font-size:0.95rem;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  min-height:100vh;
}
#upload-screen,#app{max-width:560px;margin:0 auto;width:100%}

button,input{font-family:inherit;color:inherit}
a{color:var(--accent)}
code{background:var(--faint);color:var(--accent);font-family:inherit;font-size:.85em;padding:1px 6px;border-radius:5px}

button:focus-visible,input:focus-visible,a:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

/* ---------- keyframes ---------- */
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes pulse{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes progressShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms !important;animation-iteration-count:1 !important;scroll-behavior:auto !important}
}

/* ---------- loading overlay (modal, shown while parsing/enriching) ---------- */
#loading-overlay{
  display:none;position:fixed;inset:0;z-index:9999;
  align-items:center;justify-content:center;padding:24px;
  background:rgba(12,11,17,.74);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
#loading-overlay.active{display:flex}
.loading-card{
  width:100%;max-width:320px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:22px 22px 20px;
  box-shadow:0 24px 60px -12px rgba(0,0,0,.55);
}
.loading-kicker{
  font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}
.loading-msg{font-size:.9rem;color:var(--text);margin-bottom:14px;min-height:1.3em}
.loading-progress-wrap{width:100%;height:7px;background:var(--faint);border-radius:99px;overflow:hidden;margin-bottom:10px}
.loading-progress-bar{height:100%;border-radius:99px;width:0%;transition:width .25s ease;background:linear-gradient(90deg,var(--accent),var(--teal))}
.loading-sub{font-size:.76rem;color:var(--muted)}

/* ---------- upload / boot screen ---------- */
#upload-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:48px 22px calc(40px + env(safe-area-inset-bottom));
  gap:26px;text-align:center;
}
.upload-label{font-size:.74rem;color:var(--accent);letter-spacing:.16em;text-transform:uppercase}
.upload-title{font-size:1.85rem;font-weight:700;letter-spacing:-.02em;color:var(--text);margin-top:7px}

.boot-card{
  width:100%;max-width:340px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:20px 20px 18px;
}
.boot-label{
  font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
}
.boot-status{font-size:.86rem;color:var(--text);min-height:1.3em}

.progress-wrap{width:100%;background:var(--faint);border-radius:99px;height:6px;margin-top:10px;overflow:hidden;display:none}
.progress-wrap.active{display:block}
.progress-bar{
  height:100%;border-radius:99px;width:0%;transition:width .3s;
  background:linear-gradient(90deg,var(--teal),var(--accent),var(--teal));
  background-size:200% 100%;animation:progressShimmer 1.6s infinite linear;
}

.upload-error{
  background:rgba(242,155,171,.1);border:1px solid var(--red);border-radius:12px;
  padding:12px 16px;font-size:.8rem;color:var(--red);line-height:1.5;
  max-width:340px;width:100%;display:none;
}

.manual-upload{display:flex;flex-direction:column;align-items:center;gap:9px;max-width:340px}
.manual-upload-label{font-size:.76rem;color:var(--muted)}
.manual-hint{font-size:.72rem;color:var(--muted)}
#drop-zone{
  font-size:.78rem;background:transparent;border:1px dashed var(--border);
  color:var(--muted);padding:9px 18px;border-radius:99px;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;transition:all .15s;
}
#drop-zone:hover,#drop-zone.dragging{border-color:var(--accent);color:var(--accent);background:var(--faint)}
.source-link{font-size:.72rem;color:var(--muted);text-decoration:none;border-bottom:1px dotted var(--border)}
.source-link:hover{color:var(--accent);border-color:var(--accent)}

/* ---------- app shell ---------- */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{
  position:sticky;top:0;z-index:40;background:var(--bg);
  padding-top:env(safe-area-inset-top);
}
.header{
  background:var(--surface2);border-bottom:1px solid var(--border);
  padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between;
  gap:10px;flex-wrap:wrap;
}
.header-left{display:flex;flex-direction:column;gap:4px;min-width:0}
.header-badge{
  font-size:.84rem;font-weight:600;color:var(--text);letter-spacing:.01em;
  display:flex;align-items:center;gap:2px;white-space:nowrap;
}
.header-badge::before{content:'▍';color:var(--accent);animation:blink 1.1s steps(1) infinite;margin-right:6px}
.header-meta{font-size:.7rem;color:var(--muted);letter-spacing:.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-right{display:flex;gap:7px;flex-shrink:0}

.btn{
  font-size:.72rem;padding:7px 11px;border-radius:9px;cursor:pointer;
  border:1px solid var(--border);background:var(--surface);color:var(--muted);
  display:flex;align-items:center;gap:5px;transition:border-color .15s,color .15s,background .15s;
  white-space:nowrap;
}
.btn:hover{color:var(--text);border-color:var(--accent)}
.btn.active{background:var(--accent);border-color:var(--accent);color:var(--bg)}

.tabs{
  display:flex;gap:6px;overflow-x:auto;padding:10px 14px 11px;
  background:var(--bg);border-bottom:1px solid var(--border);
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  font-size:.77rem;padding:8px 13px;border-radius:99px;cursor:pointer;
  background:transparent;border:1px solid transparent;color:var(--muted);
  white-space:nowrap;flex-shrink:0;scroll-snap-align:start;
  transition:background .15s,color .15s,border-color .15s;
}
.tab.active{background:var(--surface2);border-color:var(--border);color:var(--accent);font-weight:600}

.content{padding:18px 14px calc(40px + env(safe-area-inset-bottom));width:100%}

.g4,.g3{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(max-width:336px){.g4,.g3{grid-template-columns:1fr}}

.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;min-width:0}
.stat-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;display:block}
.stat-label::before{content:'$ ';color:var(--border)}
.stat-val{font-size:1.26rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em;word-break:break-word}
.stat-sub{font-size:.71rem;color:var(--muted);margin-top:5px;line-height:1.4}

.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 13px 14px;margin-bottom:16px}
.chart-title{font-size:.81rem;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.4;display:flex;align-items:flex-start;gap:7px}
.chart-title::before{content:'▸';color:var(--accent);flex-shrink:0;line-height:1.5}
.chart-wrap{position:relative;width:100%}

.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:.8rem;min-width:540px}
th{padding:10px 12px;text-align:left;color:var(--muted);font-weight:600;font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);white-space:normal;word-break:break-word}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:rgba(236,231,247,.025)}

.info{
  background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:var(--radius-sm);padding:14px 16px;font-size:.81rem;color:var(--muted);
  line-height:1.65;margin-bottom:16px;
}
.info::before{content:'# ';color:var(--accent);font-weight:700}
.info strong{color:var(--text);font-weight:600}
.info em{color:var(--text);font-style:normal;font-weight:500}

.panel{display:none}
.panel.active{display:block}

/* progress bars used inside the Backtest tab's per-model rows — the
   injected stylesheet (built in JS) sets size/layout; fill colour lives
   here so it follows the page theme without duplicating those rules. */
.bt-track .progress-indicator{background:var(--faint);border-radius:6px;overflow:hidden}
.bt-track .progress-indicator>span{background:linear-gradient(90deg,var(--accent),var(--teal))}
.bt-bars>.bt-bar-row:nth-of-type(2) .progress-indicator>span{background:linear-gradient(90deg,var(--teal),var(--green))}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-card">
    <div class="loading-kicker"><span class="dot"></span>booting dashboard</div>
    <div class="loading-msg" id="loading-msg">Parsing data...</div>
    <div class="loading-progress-wrap"><div class="loading-progress-bar" id="loading-bar"></div></div>
    <div class="loading-sub" id="loading-sub">This may take a few seconds</div>
  </div>
</div>

<div id="upload-screen">
  <div>
    <div class="upload-label">BTC Analytics</div>
    <div class="upload-title">MVRV Dashboard</div>
  </div>

  <div class="boot-card">
    <div class="boot-label"><span class="dot"></span>initializing</div>
    <div class="boot-status" id="price-fetch-status">⏳ Fetching BTC price data…</div>
    <div class="progress-wrap" id="price-progress-wrap"><div class="progress-bar" id="price-progress-bar"></div></div>
  </div>

  <div class="upload-error" id="upload-error"></div>

  <div class="manual-upload">
    <span class="manual-upload-label">data loads automatically — having trouble?</span>
    <button id="drop-zone" onclick="document.getElementById('file-input').click()">⌁ Upload <code>.json</code> manually</button>
    <span class="manual-hint">auto-detects the <code>mvrv</code> array · converts timestamps</span>
    <a class="source-link" href="https://www.blockchain.com/explorer/charts/mvrv" target="_blank" rel="noopener noreferrer">source: blockchain.com/explorer/charts/mvrv</a>
    <input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFile(this.files[0])"/>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="header">
      <div class="header-left">
        <span class="header-badge">mvrv@analytics</span>
        <span class="header-meta" id="hdr-meta">—</span>
      </div>
      <div class="header-right">
        <button class="btn" onclick="exportSummary()">⤓ Export</button>
        <button class="btn" onclick="resetApp()">↻ New file</button>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="content" id="content">
    <div class="panel active" id="p0"></div>
    <div class="panel" id="p1"></div>
    <div class="panel" id="p2"></div>
    <div class="panel" id="p3"></div>
    <div class="panel" id="p4"></div>
    <div class="panel" id="p5"></div>
    <div class="panel" id="p6"></div>
    <div class="panel" id="p7"></div>
    <div class="panel" id="p8"></div>
    <div class="panel" id="p9"></div>
    <div class="panel" id="p10"></div>
    <div class="panel" id="p11"></div>
  </div>
</div>

<script>
const TAB_NAMES = ["Overview","Z-Score","Momentum","Cycle Overlay","Drawdown","MA Crossovers","Zone Days","Cycle Extremes","Price Peaks","Price Bottoms","Projections","Backtest"];
const CC = {bg:"#1b1924",surface:"#242131",surface2:"#2c2840",border:"#3c3754",text:"#ece7f7",muted:"#a89fc4",faint:"#322d47",accent:"#b9a6f5",teal:"#7fd9c4",amber:"#f0bd80",red:"#f29bab",green:"#9bdb9e"};
const HALVINGS = [
    new Date("2012-11-28"), // 1st
    new Date("2016-07-09"), // 2nd
    new Date("2020-05-11"), // 3rd
    new Date("2024-04-20"), // 4th
    new Date("2028-03-26"), // 5th (Current Estimate)
    new Date("2032-02-15"), // 6th (New entry)
    new Date("2036-01-10")  // 7th (New entry)
  ];
const CYCLE_COLORS = {
  1: CC.red, 
  2: CC.amber, 
  3: CC.teal, 
  4: CC.accent, 
  5: CC.green,  // Cycle 5 (2028-2032)
  6: "#e8a6d8", // Cycle 6 (2032-2036) - Pink
  7: "#8fc9f0", // Cycle 7 (2036-2040) - Sky Blue
  8: "#f5ad8e"  // Cycle 8 (2040-2044) - Rose
};
const CYCLE_LABELS = {
  1: "2012-15",
  2: "2016-19",
  3: "2020-23",
  4: "2024-27",
  5: "2028-31", // Add this
  6: "2032-35"  // Add this
};

// --- Named constants (edit here, not scattered through the code) ---
const CONFIG = {
  AVG_CYCLE_DAYS: 1422,   // used for open-ended last cycle % progress
  SAMPLE_SIZE: 300,        // chart data points (downsampled)
  ZSCORE_CAPITULATION: -1.5,
  ZSCORE_CAUTION: 1.0,
  ZSCORE_WINDOW: 365,      // rolling window (days) for z-score calculation
  ROC_SHORT: 30,
  ROC_LONG: 90,
  HALVING_DATE_TOLERANCE_DAYS: 3, // ± days to search for price when exact date missing
};

let DATA=[], STATS={}, CHARTS={}, activeTab=0;
let BY_CYCLE={};  // pre-built lookup: BY_CYCLE[cycleNum] = filtered DATA rows
let PRICE_MAP={}, hasPriceData=false;
const built = new Set();

function parseDateFlexible(raw){
  if(!raw)return null;
  const s=String(raw).trim();
  const dmy=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  if(dmy)return new Date(dmy[3]+"-"+dmy[2].padStart(2,"0")+"-"+dmy[1].padStart(2,"0"));
  const d=new Date(s);return isNaN(d)?null:d;
}
function fmtDate(d){return d?new Date(d).toISOString().slice(0,10):""}
function assignCycle(y){return y<2012?0:Math.floor((y-2012)/4)+1}

// O(n) running-sum moving average — replaces the O(n*w) slice version
function movingAvg(arr,w){
  var out=new Array(arr.length);
  var sum=0;
  for(var i=0;i<arr.length;i++){
    sum+=arr[i];
    if(i>=w)sum-=arr[i-w];
    out[i]=sum/Math.min(i+1,w);
  }
  return out;
}

// Price lookup with +-HALVING_DATE_TOLERANCE_DAYS fallback
function priceAtHalving(halvingDate){
  if(!halvingDate||!hasPriceData)return null;
  var exact=PRICE_MAP[halvingDate.toISOString().slice(0,10)];
  if(exact)return exact;
  var tol=CONFIG.HALVING_DATE_TOLERANCE_DAYS*86400000;
  var best=null,bestDist=Infinity;
  var t=halvingDate.getTime();
  for(var dateStr in PRICE_MAP){
    var dt=new Date(dateStr).getTime();
    var dist=Math.abs(dt-t);
    if(dist<=tol&&dist<bestDist){bestDist=dist;best=PRICE_MAP[dateStr];}
  }
  return best;
}

// Shared halving annotation builder — pass the sampled data array for any chart
function buildHalvingAnnotations(sampledData){
  var annotations={};
  if(!sampledData||!sampledData.length)return annotations;
  var first=new Date(sampledData[0].dateStr),last=new Date(sampledData[sampledData.length-1].dateStr);
  HALVINGS.forEach(function(h,i){
    if(h<first||h>last)return;
    var nearest=sampledData.reduce(function(a,b){
      return Math.abs(new Date(b.dateStr)-h)<Math.abs(new Date(a.dateStr)-h)?b:a;
    });
    annotations["halving"+i]={
      type:"line",xMin:nearest.dateStr,xMax:nearest.dateStr,
      borderColor:(CYCLE_COLORS[i+1]||CC.muted)+"ff",borderWidth:1.5,borderDash:[4,3],
      label:{display:true,content:"C"+(i+1),position:"start",
        backgroundColor:"transparent",color:CYCLE_COLORS[i+1]||CC.muted,
        font:{size:11,family:"JetBrains Mono"}}
    };
  });
  return annotations;
}
// Linear regression — returns { slope, intercept }
function linReg(xs, ys) {
  const n = xs.length;
  const mx = xs.reduce((a, b) => a + b, 0) / n;
  const my = ys.reduce((a, b) => a + b, 0) / n;
  const num = xs.reduce((s, x, i) => s + (x - mx) * (ys[i] - my), 0);
  const den = xs.reduce((s, x) => s + (x - mx) ** 2, 0);
  const slope = num / den;
  return { slope, intercept: my - slope * mx };
}

// Log regression — fits y = a*ln(x) + b by linearising x
function logReg(xs, ys) {
  return linReg(xs.map(Math.log), ys);
}

// Downsample arr to at most n evenly-spaced points, always keeping the last
function sample(arr, n) {
  if (!n) n = CONFIG.SAMPLE_SIZE;
  if (arr.length <= n) return arr;
  const step = Math.ceil(arr.length / n);
  return arr.filter((_, i) => i % step === 0 || i === arr.length - 1);
}

// Base Chart.js options shared by all charts — defined once, not recreated per call.
// Deep-clone with structuredClone() before mutating (e.g. adding scales or plugins).
const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: CC.surface2,
      borderColor: CC.border,
      borderWidth: 1,
      titleColor: "#a89fc4",
      bodyColor: CC.text,
      padding: 12,
      titleFont: { size: 13 },
      bodyFont: { size: 14 }
    }
  },
  scales: {
    x: {
      grid: { color: "#3c375488" },
      ticks: { color: "#a89fc4", font: { size: 13 }, maxTicksLimit: 8 },
      border: { display: false }
    },
    y: {
      grid: { color: "#3c375488" },
      ticks: { color: "#a89fc4", font: { size: 13 } },
      border: { display: false }
    }
  }
};

// Returns a fresh deep clone of CHART_DEFAULTS safe to mutate per chart
function chartDefs() { return structuredClone(CHART_DEFAULTS); }

// Extends chartDefs with legend enabled
function withLegend(opts) {
  return Object.assign({}, opts, {
    plugins: Object.assign({}, opts.plugins, {
      legend: { display: true, labels: { color: "#a89fc4", font: { size: 13 }, boxWidth: 24, boxHeight: 2 } }
    })
  });
}

function destroyChart(id) { if (CHARTS[id]) { CHARTS[id].destroy(); delete CHARTS[id]; } }

function makeCanvas(id, h) {
  return `<div class="chart-wrap" style="height:${h}px"><canvas id="${id}"></canvas></div>`;
}

function statCard(label, val, sub, color) {
  return `<div class="stat">
    <div class="stat-label">${label}</div>
    <div class="stat-val" style="color:${color || CC.text}">${val}</div>
    ${sub ? `<div class="stat-sub">${sub}</div>` : ""}
  </div>`;
}

var PRICE_JSON_URL="https://raw.githubusercontent.com/0xtrvkc/dynamic-btc-analytics-dashboard/main/btc_daily_price.json";
var MVRV_JSON_URL="https://raw.githubusercontent.com/0xtrvkc/dynamic-btc-analytics-dashboard/main/mvrv.json";

function autoLoadMVRV(){
  var errEl=document.getElementById("upload-error");
  fetch(MVRV_JSON_URL+"?t="+Date.now())
    .then(function(res){
      if(!res.ok)throw new Error("HTTP "+res.status);
      return res.json();
    })
    .then(function(json){
      var arr=json.mvrv||json.values||null;
      if(!arr||!arr.length)throw new Error("Couldn't find mvrv data array in JSON.");
      var rows=arr.map(function(pt){
        var ts=+pt.x,v=+pt.y;
        if(!ts||isNaN(v)||v<=0)return null;
        return{date:new Date(ts>1e10?ts:ts*1000),mvrv:v};
      }).filter(Boolean).sort(function(a,b){return a.date-b.date});
      if(rows.length<10)throw new Error("Not enough valid data points.");
      if(priceFetchDone){loadData(rows);}else{pendingRows=rows;}
    })
    .catch(function(err){

      errEl.style.display="block";
    });
}

function enrichData(rows) {
  var mvrvs = rows.map(function(r) { return r.mvrv });
  var ma20  = movingAvg(mvrvs, 20);
  var ma50  = movingAvg(mvrvs, 50);
  var ma200 = movingAvg(mvrvs, 200);

  // Pre-compute true cycle peaks (two-pass) so drawdown is correct for
  // every historical point, not just the running-max-so-far.
  var cyclePeaks = {};
  rows.forEach(function(r) {
    var c = 0;
    for (var j = 0; j < HALVINGS.length - 1; j++) {
      if (r.date >= HALVINGS[j] && r.date < HALVINGS[j + 1]) { c = j + 1; break; }
    }
    if (r.date >= HALVINGS[HALVINGS.length - 1]) c = HALVINGS.length;
    if (c > 0) cyclePeaks[c] = Math.max(cyclePeaks[c] || 0, r.mvrv);
  });

  // Welford state is now local to each iteration (rolling window) — no outer vars needed.

  return rows.map(function(r, i) {
    var cycle = 0;
    var cyclePct = null;

    // Assign cycle from HALVINGS array — auto-extends with new halvings
    for (var j = 0; j < HALVINGS.length - 1; j++) {
      if (r.date >= HALVINGS[j] && r.date < HALVINGS[j + 1]) {
        cycle = j + 1;
        var totalDays = (HALVINGS[j + 1] - HALVINGS[j]) / 86400000;
        var daysIn = (r.date - HALVINGS[j]) / 86400000;
        cyclePct = (daysIn / totalDays) * 100;
        break;
      }
    }
    var lastHalving = HALVINGS[HALVINGS.length - 1];
    if (r.date >= lastHalving) {
      cycle = HALVINGS.length;
      var daysIn = (r.date - lastHalving) / 86400000;
      cyclePct = (daysIn / CONFIG.AVG_CYCLE_DAYS) * 100;
    }
    if (r.date < HALVINGS[0]) cycle = 0;

    // Z-score — rolling 365-day window (causal: only past + current values).
    // Warm-up: window grows from 1 → 365 days, then stays fixed at 365.
    // This avoids early 2012-2013 data permanently anchoring mean/std for
    // every subsequent year — making the signal cycle-relevant, not all-time.
    var winStart = Math.max(0, i - CONFIG.ZSCORE_WINDOW + 1);
    var wn = 0, wmean = 0, wM2 = 0;
    for (var wi = winStart; wi <= i; wi++) {
      wn++; var delta = mvrvs[wi] - wmean;
      wmean += delta / wn; wM2 += delta * (mvrvs[wi] - wmean);
    }
    var wstd = wn < 3 ? 1 : Math.sqrt(wM2 / wn);
    var zscore = wstd > 0 ? (r.mvrv - wmean) / wstd : 0;

    // ROC — null for warm-up period (not 0, which is a false flat reading)
    var roc30 = i >= CONFIG.ROC_SHORT ? ((r.mvrv - mvrvs[i-CONFIG.ROC_SHORT]) / mvrvs[i-CONFIG.ROC_SHORT]) * 100 : null;
    var roc90 = i >= CONFIG.ROC_LONG  ? ((r.mvrv - mvrvs[i-CONFIG.ROC_LONG])  / mvrvs[i-CONFIG.ROC_LONG])  * 100 : null;

    // Drawdown from true cycle peak (pre-computed above — two-pass)
    var peak = (cycle > 0 && cyclePeaks[cycle]) ? cyclePeaks[cycle] : r.mvrv;
    var drawdown = cycle > 0 ? ((r.mvrv - peak) / peak) * 100 : null;

    return Object.assign({}, r, {
      cycle: cycle,
      zscore: +zscore.toFixed(3),
      ma20: +ma20[i].toFixed(3),
      ma50: +ma50[i].toFixed(3),
      ma200: +ma200[i].toFixed(3),
      roc30: roc30 !== null ? +roc30.toFixed(2) : null,
      roc90: roc90 !== null ? +roc90.toFixed(2) : null,
      momentum: roc30 !== null ? +roc30.toFixed(2) : null,
      cyclePct: cyclePct != null ? +cyclePct.toFixed(1) : null,
      drawdown: drawdown != null ? +drawdown.toFixed(2) : null,
      dateStr: fmtDate(r.date)
    });
  });
}

function computeStats(data){
  var mvrvs=data.map(function(d){return d.mvrv}),last=data[data.length-1];
  var peakRow=data.reduce(function(a,b){return a.mvrv>b.mvrv?a:b}),botRow=data.reduce(function(a,b){return a.mvrv<b.mvrv?a:b});
  // Derive available cycles from data — no hardcoding
  var cycleSet={};data.forEach(function(d){if(d.cycle>0)cycleSet[d.cycle]=true});
  var availCycles=Object.keys(cycleSet).map(Number).sort(function(a,b){return a-b});
  var cycleData=availCycles.map(function(c){
    var sub=data.filter(function(d){return d.cycle===c});if(!sub.length)return null;
    var pk=sub.reduce(function(a,b){return a.mvrv>b.mvrv?a:b}),tr=sub.reduce(function(a,b){return a.mvrv<b.mvrv?a:b});
    return{cycle:c,peak:pk.mvrv,peakDate:pk.dateStr,trough:tr.mvrv,troughDate:tr.dateStr,days:sub.length,below1:sub.filter(function(d){return d.mvrv<1}).length,below1_5:sub.filter(function(d){return d.mvrv<1.5}).length,above2:sub.filter(function(d){return d.mvrv>2}).length,above3:sub.filter(function(d){return d.mvrv>3}).length};
  }).filter(Boolean);
  var logR=logReg(cycleData.map(function(c){return c.cycle}),cycleData.map(function(c){return c.peak}));
  var linR=linReg(cycleData.map(function(c){return c.cycle}),cycleData.map(function(c){return c.peak}));
  var troughLogR=logReg(cycleData.map(function(c){return c.cycle}),cycleData.map(function(c){return c.trough}));
  var troughLinR=linReg(cycleData.map(function(c){return c.cycle}),cycleData.map(function(c){return c.trough}));
  var nextCycle=availCycles[availCycles.length-1]+1;
  return{
    last:last,peakRow:peakRow,botRow:botRow,
    mean:mvrvs.reduce(function(a,b){return a+b},0)/mvrvs.length,
    cycleData:cycleData,availCycles:availCycles,
    logR:logR,linR:linR,troughLogR:troughLogR,troughLinR:troughLinR,
    nextCycle:nextCycle,
    nextLogPeak:Math.max(0,logR.slope*Math.log(nextCycle)+logR.intercept),
    nextLinPeak:linR.slope*nextCycle+linR.intercept,
    nextLogTrough:Math.max(0,troughLogR.slope*Math.log(nextCycle)+troughLogR.intercept),
    nextLinTrough:Math.max(0,troughLinR.slope*nextCycle+troughLinR.intercept)
  };
}

function buildOverview(){
  var s=STATS,l=s.last;
  var now=new Date();

  // --- Stat cards ---
  var priceCard=hasPriceData&&l.price?statCard("BTC Price","$"+Math.round(l.price).toLocaleString(),fmtDate(l.date),CC.amber):"";
  var cards=[
    statCard("Current MVRV",l.mvrv.toFixed(3),fmtDate(l.date),l.mvrv<1.5?CC.teal:l.mvrv>3?CC.red:CC.text),
    statCard("Z-score",l.zscore.toFixed(2),l.zscore<0?"Undervalued (365d rolling)":"Elevated (365d rolling)",l.zscore<-1?CC.teal:l.zscore>1.5?CC.red:CC.text),
    statCard("All-time peak",s.peakRow.mvrv.toFixed(2),s.peakRow.dateStr,CC.amber),
    statCard("All-time bottom",s.botRow.mvrv.toFixed(2),s.botRow.dateStr,CC.teal),
  ];
  if(priceCard)cards.push(priceCard);

  // Compression teaser — shows narrowing band
  var compCards=s.cycleData.map(function(c){
    var range=((c.peak-c.trough)/c.peak*100).toFixed(0);
    return statCard("C"+c.cycle+" range",range+"%","peak "+c.peak.toFixed(2)+" → floor "+c.trough.toFixed(2),CYCLE_COLORS[c.cycle]||CC.muted);
  }).join("");

  // --- Cycle summary table ---
  var rows=s.cycleData.map(function(c){
    var priceCol=hasPriceData?"<td>"+priceAtDate(c.peakDate)+"</td>":"";
    var color=CYCLE_COLORS[c.cycle]||CC.muted;
    return'<tr><td style="color:'+color+';font-weight:600">C'+c.cycle+'</td><td>'+(CYCLE_LABELS[c.cycle]||"—")+'</td><td style="color:'+CC.green+';font-weight:500">'+c.peak.toFixed(2)+'</td><td>'+c.peakDate+'</td>'+priceCol+'<td style="color:'+CC.red+'">'+c.trough.toFixed(2)+'</td><td>'+c.troughDate+'</td><td>'+c.days+'</td></tr>';
  }).join("");
  var priceHeader=hasPriceData?"<th>BTC @ Peak</th>":"";

  // --- Halving timeline (bottom) ---
  var halvingRows=HALVINGS.map(function(h,i){
    var cycleNum=i+1;
    var nextH=HALVINGS[i+1];
    var isPast=h<now&&(!nextH||nextH<now);
    var isCurrent=h<=now&&nextH&&nextH>now;
    var dot=isPast?"●":isCurrent?"◉":"○";
    var dotColor=isPast?CC.muted:isCurrent?CC.accent:CC.faint;
    var dateStr=h.toISOString().slice(0,10);
    var status="",progressBar="",projNote="";
    if(isPast){
      var cd=s.cycleData.find(function(c){return c.cycle===cycleNum});
      status='<span style="color:'+CC.muted+'">completed</span>';
      if(cd)projNote='<span style="color:'+(CYCLE_COLORS[cycleNum]||CC.muted)+'">peak MVRV '+cd.peak.toFixed(2)+'</span>';
    } else if(isCurrent){
      var elapsed=now-h,total=nextH-h;
      var pct=Math.min(100,(elapsed/total)*100);
      var daysLeft=Math.round((nextH-now)/(1000*60*60*24));
      var barColor=pct<50?CC.green:pct<75?CC.amber:CC.red;
      status='<span style="color:'+CC.accent+'">← you are here</span>';
      progressBar='<div style="margin-top:6px;display:flex;align-items:center;gap:10px">'
        +'<div style="flex:1;height:5px;background:var(--faint);border-radius:99px;overflow:hidden">'
        +'<div style="width:'+pct.toFixed(1)+'%;height:100%;background:'+barColor+';border-radius:99px"></div>'
        +'</div>'
        +'<span style="font-size:0.8rem;color:'+barColor+';white-space:nowrap">'+pct.toFixed(0)+'% · '+daysLeft.toLocaleString()+'d to next</span>'
        +'</div>';
      var lp=s.logR?Math.max(0,s.logR.slope*Math.log(cycleNum)+s.logR.intercept):null;
      if(lp)projNote='<span style="color:'+CC.amber+'">proj. peak '+lp.toFixed(2)+'</span>';
    } else {
      var daysAway=Math.round((h-now)/(1000*60*60*24));
      status='<span style="color:#a89fc4">upcoming · '+daysAway.toLocaleString()+'d away</span>';
      var lp=s.logR?Math.max(0,s.logR.slope*Math.log(cycleNum)+s.logR.intercept):null;
      if(lp)projNote='<span style="color:#a89fc4">proj. peak '+lp.toFixed(2)+'</span>';
    }
    return'<div style="display:flex;flex-direction:column;padding:10px 0;border-bottom:.5px solid var(--border)">'
      +'<div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">'
      +'<span style="font-size:1.1rem;color:'+dotColor+'">'+dot+'</span>'
      +'<span style="font-weight:600;color:'+(isCurrent?CC.accent:isPast?CC.muted:"var(--faint)")+'">C'+cycleNum+' Halving</span>'
      +'<span style="font-size:0.9rem;color:#a89fc4">'+dateStr+'</span>'
      +'<span style="font-size:0.85rem">'+status+'</span>'
      +(projNote?'<span style="font-size:0.82rem;margin-left:auto">'+projNote+'</span>':"")
      +'</div>'+progressBar+'</div>';
  }).join("");

  var halvingTimeline='<div class="chart-card"><div class="chart-title">Halving timeline</div>'
    +'<div style="padding:4px 0">'+halvingRows+'</div>'
    +'<div style="font-size:0.8rem;color:#a89fc4;margin-top:10px">Future halvings are estimates. Log model projections shown for upcoming cycles.</div>'
    +'</div>';

  var priceChartHtml=hasPriceData?'<div class="chart-card"><div class="chart-title">BTC Price (USD) over time · vertical lines = halvings</div>'+makeCanvas("c0b",200)+'</div>':"";

  document.getElementById("p0").innerHTML=
    '<div class="g4">'+cards.join("")+'</div>'
    +'<div class="chart-card"><div class="chart-title">MVRV with MA20 / MA50 / MA200 · vertical lines = halvings</div>'+makeCanvas("c0",300)+'</div>'
    +priceChartHtml
    +'<div class="chart-card" style="padding:20px 24px"><div class="chart-title" style="margin-bottom:12px">Volatility compression — peak-to-trough range per cycle (see Cycle Extremes for full analysis)</div><div class="g4">'+compCards+'</div></div>'
    +'<div class="tbl-wrap"><table><thead><tr><th>Cycle</th><th>Period</th><th>Peak</th><th>Peak date</th>'+priceHeader+'<th>Trough</th><th>Trough date</th><th>Days</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
    +halvingTimeline;

  destroyChart("c0");destroyChart("c0b");

  var cd=sample(DATA,CONFIG.SAMPLE_SIZE);
  CHARTS.c0=new Chart(document.getElementById("c0"),{type:"line",data:{labels:cd.map(function(d){return d.dateStr}),datasets:[
    {label:"MVRV",data:cd.map(function(d){return d.mvrv}),borderColor:CC.accent,borderWidth:2,pointRadius:0,tension:.3},
    {label:"MA20",data:cd.map(function(d){return d.ma20}),borderColor:CC.amber,borderWidth:1.5,pointRadius:0,tension:.3},
    {label:"MA50",data:cd.map(function(d){return d.ma50}),borderColor:CC.teal,borderWidth:1.5,pointRadius:0,tension:.3},
    {label:"MA200",data:cd.map(function(d){return d.ma200}),borderColor:CC.red,borderWidth:1.5,pointRadius:0,tension:.3}
  ]},options:withLegend(Object.assign({},chartDefs(),{plugins:Object.assign({},withLegend(chartDefs()).plugins,{annotation:{annotations:buildHalvingAnnotations(cd)}})}))});

  if(hasPriceData){
    var cdp=sample(DATA.filter(function(d){return d.price}),CONFIG.SAMPLE_SIZE);
    var priceOpts=withLegend(Object.assign({},chartDefs(),{
      scales:{x:chartDefs().scales.x,y:Object.assign({},chartDefs().scales.y,{ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return"$"+v.toLocaleString()}})})},
      plugins:Object.assign({},withLegend(chartDefs()).plugins,{annotation:{annotations:buildHalvingAnnotations(cdp)}})
    }));
    CHARTS.c0b=new Chart(document.getElementById("c0b"),{type:"line",data:{labels:cdp.map(function(d){return d.dateStr}),datasets:[
      {label:"BTC Price (USD)",data:cdp.map(function(d){return d.price}),borderColor:CC.amber,borderWidth:2,pointRadius:0,tension:.3,fill:{target:"origin",above:CC.amber+"ff"}}
    ]},options:priceOpts});
  }
}

function buildZScore(){
  var s=STATS,l=s.last;
  var signal=l.zscore<CONFIG.ZSCORE_CAPITULATION?"Capitulation":l.zscore<0?"Accumulate":l.zscore<CONFIG.ZSCORE_CAUTION?"Neutral":"Caution";
  document.getElementById("p1").innerHTML='<div class="g3">'+[statCard("Current Z-score",l.zscore.toFixed(2),"",l.zscore<-1?CC.teal:l.zscore>1.5?CC.red:CC.text),statCard("Rolling mean MVRV",wmean365(DATA,DATA.length-1).toFixed(3),"365-day window baseline"),statCard("Signal",signal,"",l.zscore<0?CC.teal:CC.amber)].join("")+'</div><div class="chart-card"><div class="chart-title">Z-score — rolling 365-day window</div>'+makeCanvas("c1",300)+'</div><div class="info">Z-score is calculated over a rolling 365-day window, so recent cycles are compared against the past year of data rather than all-time history. This makes the signal cycle-relevant and avoids early 2012-2013 data anchoring the baseline permanently. Z &gt; +2 has marked every major top. Z &lt; -1 = historical buy zone. Z &lt; '+CONFIG.ZSCORE_CAPITULATION+' = capitulation — every case preceded a major recovery.</div>';

function buildMomentum(){
  var l=STATS.last;

  // --- Dynamic interpretation helpers ---
  function roc30Signal(v){
    if(v==null)return{label:"No data",color:CC.muted,detail:"Rate of change data is unavailable."};
    if(v> 60)return{label:"Overheating",color:CC.red,detail:"30-day momentum is extremely elevated — historically this pace has often preceded short-term pullbacks."};
    if(v> 25)return{label:"Strong",color:CC.green,detail:"30-day momentum is well above average, indicating broad buying pressure over the past month."};
    if(v>  5)return{label:"Positive",color:CC.green,detail:"Moderate positive momentum over 30 days. Price is trending upward at a measured pace."};
    if(v>  -5)return{label:"Neutral",color:CC.amber,detail:"30-day momentum is close to zero — price has moved sideways. No clear short-term direction."};
    if(v>-25)return{label:"Weak",color:CC.red,detail:"30-day momentum is negative. Selling pressure has dominated over the past month."};
    return{label:"Sharply down",color:CC.red,detail:"30-day momentum is deeply negative. This pace of decline has historically been a stress event."};
  }
  function roc90Signal(v){
    if(v==null)return{label:"No data",color:CC.muted,detail:"90-day rate of change data unavailable."};
    if(v>100)return{label:"Parabolic",color:CC.red,detail:"90-day momentum is parabolic. Historically, moves of this scale have resolved with sharp corrections."};
    if(v> 40)return{label:"Strong trend",color:CC.green,detail:"A strong 3-month trend is in place. Sustained upward momentum over 90 days points to a maturing bull run."};
    if(v>  5)return{label:"Positive trend",color:CC.green,detail:"Gradual positive trend over 90 days. The longer-term bias is upward but not extreme."};
    if(v>  -5)return{label:"Sideways",color:CC.amber,detail:"3-month momentum is roughly flat. No dominant trend has established itself over the medium term."};
    if(v>-40)return{label:"Downtrend",color:CC.red,detail:"Negative 90-day momentum points to a sustained downtrend. Bulls have not been able to reclaim control."};
    return{label:"Severe downtrend",color:CC.red,detail:"90-day momentum is severely negative, consistent with deep bear market phases."};
  }
  function maSignal(ma20,ma50){
    if(!ma20||!ma50)return{label:"No data",color:CC.muted,detail:"Moving average data unavailable."};
    var spread=((ma20-ma50)/ma50*100).toFixed(1);
    var dir=ma20>ma50?"above":"below";
    var tone=ma20>ma50?CC.green:CC.red;
    return{
      label:ma20>ma50?"Bullish":"Bearish",
      color:tone,
      detail:"The 20-day MA is "+Math.abs(spread)+"% "+dir+" the 50-day MA. "+
        (ma20>ma50
          ? "A bullish golden-cross alignment — short-term average is leading, confirming upward price momentum."
          : "A bearish dead-cross alignment — the shorter average is lagging behind, confirming that recent price action is weaker than the medium-term trend.")
    };
  }

  var r30=roc30Signal(l.roc30);
  var r90=roc90Signal(l.roc90);
  var ma=maSignal(l.ma20,l.ma50);

  // Build rich stat cards with inline interpretation badges
  function richStatCard(title,val,sig){
    return'<div class="stat" style="position:relative">'+
      '<div class="stat-label">'+title+'</div>'+
      '<div class="stat-val" style="color:'+sig.color+'">'+val+'</div>'+
      '<div style="margin-top:6px;display:inline-block;font-size:0.75rem;padding:2px 10px;border-radius:99px;background:'+sig.color+'22;color:'+sig.color+';border:1px solid '+sig.color+'55;font-weight:600;letter-spacing:.04em">'+sig.label+'</div>'+
      '<div style="font-size:0.82rem;color:#a89fc4;margin-top:8px;line-height:1.5">'+sig.detail+'</div>'+
    '</div>';
  }

  // Momentum summary sentence
  var trend;
  var roc30v=l.roc30||0, roc90v=l.roc90||0;
  if(roc30v>15&&roc90v>15) trend="short and medium-term momentum are both positive — the trend is broadly intact";
  else if(roc30v>15&&roc90v<0) trend="short-term momentum has recovered but the 3-month trend is still negative — a potential early reversal signal";
  else if(roc30v<0&&roc90v>15) trend="recent momentum has faded while the 3-month trend remains positive — a possible cooling-off period within a larger uptrend";
  else if(roc30v<0&&roc90v<0) trend="both short and medium-term momentum are negative — bearish pressure is broad-based";
  else trend="momentum signals are mixed — no clear directional conviction at this time";
  var summaryHtml='<div class="info" style="margin-bottom:18px">'+
    '<strong>Momentum overview:</strong> As of the latest data point, '+trend+'. '+
    'Rate of change (ROC) measures how much MVRV has moved over a rolling window. '+
    'The MA signal compares the 20-day and 50-day moving averages of MVRV as a trend-direction filter. '+
    'These are short-to-medium term signals — they complement, not replace, the MVRV Z-score for cycle positioning.'+
  '</div>';

  document.getElementById("p2").innerHTML=
    summaryHtml+
    '<div class="g3">'+
      richStatCard("ROC 30d",(l.roc30!=null?l.roc30.toFixed(1):"—")+"%",r30)+
      richStatCard("ROC 90d",(l.roc90!=null?l.roc90.toFixed(1):"—")+"%",r90)+
      richStatCard("MA Signal",ma.label,ma)+
    '</div>'+
    '<div class="chart-card"><div class="chart-title">30-day and 90-day rate of change (%)'+(hasPriceData?" · BTC price on right axis":"")+'</div>'+makeCanvas("c2",300)+'</div>'+
    '<div class="info" style="margin-top:4px;font-size:0.85rem">'+
      '<strong>How to read this chart:</strong> '+
      'ROC 30d (teal) captures near-term momentum — spikes above ~50% have historically marked local tops. '+
      'ROC 90d (amber) smooths out noise and shows the broader trend — sustained readings above 40% have coincided with late-cycle acceleration. '+
      'The zero line (muted) is the key threshold: sustained moves below it indicate a loss of momentum. '+
      (hasPriceData?"The BTC price overlay (right axis, green) lets you cross-reference momentum with actual price levels.":"")+
    '</div>';
  destroyChart("c2");
  var cd=sample(DATA.filter(function(d){return d.roc30!==null&&d.roc90!==null}),CONFIG.SAMPLE_SIZE);
  var datasets=[{label:"ROC 30d",data:cd.map(function(d){return d.roc30}),borderColor:CC.teal,borderWidth:2,pointRadius:0,tension:.2,yAxisID:"y"},{label:"ROC 90d",data:cd.map(function(d){return d.roc90}),borderColor:CC.amber,borderWidth:2,pointRadius:0,tension:.2,yAxisID:"y"},{label:"0",data:cd.map(function(){return 0}),borderColor:"#a89fc4",borderWidth:1,pointRadius:0,yAxisID:"y"}];
  var scales={x:chartDefs().scales.x,y:Object.assign({},chartDefs().scales.y,{min:-100,max:150,position:"left"})};
  if(hasPriceData){
    datasets.push({label:"BTC Price",data:cd.map(function(d){return d.price||null}),borderColor:CC.green+"99",borderWidth:1.5,pointRadius:0,tension:.3,yAxisID:"yPrice"});
    scales.yPrice={position:"right",grid:{drawOnChartArea:false},ticks:{color:CC.green,font:{size:12},callback:function(v){return"$"+v.toLocaleString()}},border:{display:false}};
  }
  var opts=withLegend(Object.assign({},chartDefs(),{scales:scales}));
  CHARTS.c2=new Chart(document.getElementById("c2"),{type:"line",data:{labels:cd.map(function(d){return d.dateStr}),datasets:datasets},options:opts});
}

function buildCycleOverlay(){

 var availableCycles = [...new Set(DATA.map(d => d.cycle))].filter(c => c > 0).sort((a,b) => a-b);

      showLine: true,

  // Calculate "You are here" position

          },

        })
      }),

      legend:{display:true,labels:{
        color:"#a89fc4",font:{size:13},boxWidth:24,boxHeight:2,
        filter:function(item){ return item.text.indexOf("M")===-1||item.text==="MVRV"; }
      }},
      tooltip:{

        callbacks:{
          label:function(ctx){

              var cycleIdx=ctx.datasetIndex-monthDatasets.length;

                if(sub.length){
                  var closest=sub.reduce(function(a,b){return Math.abs((b.cyclePct||0)-ctx.parsed.x)<Math.abs((a.cyclePct||0)-ctx.parsed.x)?b:a},sub[0]);
                  if(closest&&closest.price)base+=" · $"+Math.round(closest.price).toLocaleString();
                }
              }
            }
            return base;
          }
        }
      },
      annotation: {
        annotations: {
          youAreHereArrow: {
            type: 'line',
            xMin: lastPoint.x,
            xMax: lastPoint.x,
            yMin: lastPoint.y * 3,
            yMax: lastPoint.y,
            borderColor: '#b9a6f5',

        }

  CHARTS.c3 = new Chart(document.getElementById("c3"),{

  });

  // Price cycle overlay

    var priceCycleDatasets=availableCycles.map(function(c){
      var sub=BY_CYCLE[c]?BY_CYCLE[c].filter(function(d){return d.cyclePct!=null&&d.price}):[];
      if(!sub.length)return null;
      // Base price = first available price in the cycle (closest to halving)
      var basePrice=sub[0].price;
      if(!basePrice)return null;
      var pts=sample(sub,120);
      var label=(CYCLE_LABELS[c])||"Cycle "+c;
      return{label:label,data:pts.map(function(d){return{x:d.cyclePct,y:+(d.price/basePrice*100).toFixed(1)}}),borderColor:CYCLE_COLORS[c]||CC.muted,backgroundColor:"transparent",borderWidth:2,pointRadius:0,showLine:true,tension:.3,order:c,_basePrice:basePrice,_cycle:c};
    }).filter(Boolean);

    var priceMonthDatasets=keyMonths.map(function(m){

    });

      id:"priceMonthLabels",

        ctx.fillStyle="#a89fc4";ctx.textAlign="center";
        keyMonths.forEach(function(m){
          var xPos=+(m*monthPct).toFixed(2);
          ctx.fillText("M"+m,xAxis.getPixelForValue(xPos),yAxis.bottom+14);
        });
        ctx.restore();
      }
    };

    var priceOpts=withLegend(Object.assign({},chartDefs(),{
      layout:{padding:{bottom:20}},
      scales:{
        x:Object.assign({},chartDefs().scales.x,{type:"linear",min:0,max:100,title:{display:true,text:"Cycle position (%)",color:"#a89fc4",font:{size:13}},ticks:Object.assign({},chartDefs().scales.x.ticks,{callback:function(v){return v%25===0?v+"%":""},maxTicksLimit:20})}),
        y:Object.assign({},chartDefs().scales.y,{
          type:"logarithmic",
          title:{display:true,text:"Indexed price (halving = 100, log scale)",color:"#a89fc4",font:{size:13}},
          ticks:{color:"#a89fc4",font:{size:12},callback:function(v){
            if(v===100)return"100 (base)";
            if(v>=1000)return(v/100).toFixed(0)+"x";
            return v+"";
          }}
        })
      },
      plugins:Object.assign({},withLegend(chartDefs()).plugins,{
        legend:{display:true,labels:{color:"#a89fc4",font:{size:13},boxWidth:24,boxHeight:2,filter:function(item){return item.text.indexOf("M")===-1;}}},
        tooltip:{backgroundColor:CC.surface2,borderColor:CC.border,borderWidth:1,titleColor:CC.muted,bodyColor:CC.text,padding:12,callbacks:{
          label:function(ctx){

    CHARTS.c3b=new Chart(document.getElementById("c3b"),{type:"scatter",data:{datasets:priceMonthDatasets.concat(priceCycleDatasets)},options:priceOpts,plugins:[priceMonthLabelPlugin]});

function buildDrawdown(){
  var s=STATS;
  var cycles=s.availCycles;
  var maxDDs=cycles.map(function(c){var pts=(BY_CYCLE[c]||[]).filter(function(d){return d.drawdown!=null});return pts.length?pts.reduce(function(a,b){return a.drawdown<b.drawdown?a:b}).drawdown:0});
  var cards=cycles.map(function(c,i){
    var sub="";
    if(hasPriceData){
      var worst=(BY_CYCLE[c]||[]).filter(function(d){return d.drawdown!=null&&d.price});
      if(worst.length){var w=worst.reduce(function(a,b){return a.drawdown<b.drawdown?a:b});sub="$"+Math.round(w.price).toLocaleString()+" @ worst";}
    }
    return statCard("C"+c+" max DD",maxDDs[i].toFixed(0)+"%",sub||(CYCLE_LABELS[c]||"—"),CYCLE_COLORS[c]||CC.muted);
  });
  var priceNote=hasPriceData?" Second chart shows price % drawdown from cycle ATH at the worst MVRV point.":"";
  document.getElementById("p4").innerHTML='<div class="g4">'+cards.join("")+'</div><div class="chart-card"><div class="chart-title">MVRV drawdown from cycle peak — by cycle position (%)</div>'+makeCanvas("c4",320)+'</div>'+(hasPriceData?'<div class="chart-card"><div class="chart-title">Price % drawdown from cycle ATH at worst MVRV point</div>'+makeCanvas("c4b",220)+'</div>':"")+'<div class="info">Drawdown = how far MVRV has fallen from that cycle\'s peak.'+priceNote+'</div>';
  destroyChart("c4");destroyChart("c4b");
  var datasets=cycles.map(function(c){
    var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.cyclePct!=null&&d.drawdown!=null});
    var pts=sample(sub,60);
    return{label:"C"+c,data:pts.map(function(d){return{x:d.cyclePct,y:d.drawdown}}),borderColor:CYCLE_COLORS[c]||CC.muted,backgroundColor:CYCLE_COLORS[c]||CC.muted,borderWidth:2,pointRadius:2,showLine:true,tension:.3};
  });
  var opts=withLegend(Object.assign({},chartDefs(),{scales:{x:Object.assign({},chartDefs().scales.x,{type:"linear",title:{display:true,text:"Cycle position (%)",color:"#a89fc4",font:{size:13}}}),y:Object.assign({},chartDefs().scales.y,{title:{display:true,text:"Drawdown %",color:"#a89fc4",font:{size:13}},ticks:{callback:function(v){return v+"%"}}})}}));
  CHARTS.c4=new Chart(document.getElementById("c4"),{type:"scatter",data:{datasets:datasets},options:opts});
  if(hasPriceData){
    var pctFromATH=cycles.map(function(c){
      var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.drawdown!=null&&d.price});
      if(!sub.length)return null;
      var worst=sub.reduce(function(a,b){return a.drawdown<b.drawdown?a:b});
      var ath=sub.reduce(function(a,b){return b.price>a.price?b:a},sub[0]);
      if(!ath||!ath.price||!worst.price)return null;
      return((worst.price-ath.price)/ath.price*100);
    });
    var validPctFromATH=pctFromATH.filter(function(v){return v!==null});
    if(validPctFromATH.length){
      CHARTS.c4b=new Chart(document.getElementById("c4b"),{type:"bar",data:{
        labels:cycles.filter(function(c,i){return pctFromATH[i]!==null}).map(function(c){return"C"+c}),
        datasets:[{
          label:"Price drawdown from cycle ATH at MVRV worst point (%)",
          data:validPctFromATH,
          backgroundColor:cycles.filter(function(c,i){return pctFromATH[i]!==null}).map(function(c){return(CYCLE_COLORS[c]||CC.muted)+"cc"}),
          borderRadius:6
        }]
      },options:withLegend(Object.assign({},chartDefs(),{scales:{x:chartDefs().scales.x,y:Object.assign({},chartDefs().scales.y,{title:{display:true,text:"% from cycle ATH",color:"#a89fc4",font:{size:13}},ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return v+"%"}})})}})  )});
    }
  }
}

function buildZoneDays(){

  var tblRows=[["Below 1.0",function(c){return c.below1+" ("+(c.below1/c.days*100).toFixed(0)+"%)"},CC.red],["1.0-1.5",function(c){return(c.below1_5-c.below1)+" ("+((c.below1_5-c.below1)/c.days*100).toFixed(0)+"%)"},CC.amber],["1.5-2.0",function(c){return(c.days-c.above2-c.below1_5)+" ("+((c.days-c.above2-c.below1_5)/c.days*100).toFixed(0)+"%)"},CC.accent],["2.0-3.0",function(c){return(c.above2-c.above3)+" ("+((c.above2-c.above3)/c.days*100).toFixed(0)+"%)"},CC.teal],["Above 3.0",function(c){return c.above3+" ("+(c.above3/c.days*100).toFixed(0)+"%)"},CC.green]].map(function(row){return'<tr><td style="color:'+row[2]+'">'+row[0]+'</td>'+s.cycleData.map(function(c){return"<td>"+row[1](c)+"</td>"}).join("")+"</tr>"}).join("");
  // Add avg price per zone per cycle if available
  var priceZoneHtml="";
  if(hasPriceData){
    var zoneThresholds=[[0,1,CC.red,"< 1.0"],[1,1.5,CC.amber,"1.0-1.5"],[1.5,2,CC.accent,"1.5-2.0"],[2,3,CC.teal,"2.0-3.0"],[3,999,CC.green,"> 3.0"]];
    var priceRows=zoneThresholds.map(function(z){
      var cells=s.cycleData.map(function(c){
        var pts=(BY_CYCLE[c.cycle]||[]).filter(function(d){return d.mvrv>=z[0]&&d.mvrv<z[1]&&d.price});
        if(!pts.length)return"<td>—</td>";
        var avg=pts.reduce(function(a,b){return a+b.price},0)/pts.length;
        return"<td>$"+Math.round(avg).toLocaleString()+"</td>";
      }).join("");
      return'<tr><td style="color:'+z[2]+'">'+z[3]+'</td>'+cells+"</tr>";
    }).join("");
    priceZoneHtml='<div class="tbl-wrap" style="margin-top:16px"><table><thead><tr><th>MVRV Zone</th>'+s.cycleData.map(function(c){return"<th>C"+c.cycle+" avg price</th>"}).join("")+'</tr></thead><tbody>'+priceRows+'</tbody></table></div>';
  }
  document.getElementById("p6").innerHTML='<div class="chart-card"><div class="chart-title">Days spent in each MVRV zone per cycle</div>'+makeCanvas("c6",300)+'</div>'
    +(hasPriceData?priceZoneHtml+'<div style="font-size:0.85rem;color:#a89fc4;margin:4px 0 12px">Avg BTC price when MVRV was in each zone — actionable accumulation/exit reference</div>':"")
    +'<div class="tbl-wrap"><table><thead><tr><th>Zone</th>'+s.cycleData.map(function(c){return"<th>C"+c.cycle+"</th>"}).join("")+'</tr></thead><tbody>'+tblRows+'</tbody></table></div>'
    +'<div class="info">Zone days show how long MVRV spent in each band per cycle. Avg price per zone is the most actionable reference — it tells you what BTC historically cost during each on-chain signal state.</div>';
  destroyChart("c6");
  var opts=withLegend(Object.assign({},chartDefs(),{scales:{x:Object.assign({},chartDefs().scales.x,{stacked:true}),y:Object.assign({},chartDefs().scales.y,{stacked:true})}}));
  CHARTS.c6=new Chart(document.getElementById("c6"),{type:"bar",data:{labels:barData.map(function(d){return d.name}),datasets:[{label:"< 1.0",data:barData.map(function(d){return d.b1}),backgroundColor:CC.red,stack:"a"},{label:"1.0-1.5",data:barData.map(function(d){return d.m1}),backgroundColor:CC.amber,stack:"a"},{label:"1.5-2.0",data:barData.map(function(d){return d.m2}),backgroundColor:CC.accent+"80",stack:"a"},{label:"2.0-3.0",data:barData.map(function(d){return d.m3}),backgroundColor:CC.teal,stack:"a"},{label:"> 3.0",data:barData.map(function(d){return d.a3}),backgroundColor:CC.green,stack:"a"}]},options:opts});
}

function buildRegression(){
  var s=STATS;
  var maxC=s.nextCycle+2;
  // Project both peaks and troughs for all future cycles
  var regPts=Array.from({length:maxC},function(_,i){
    var c=i+1;
    return{
      cycle:c,
      peakLog:Math.max(0,s.logR.slope*Math.log(c)+s.logR.intercept),
      peakLin:Math.max(0,s.linR.slope*c+s.linR.intercept),
      troughLog:Math.max(0,s.troughLogR.slope*Math.log(c)+s.troughLogR.intercept),
      troughLin:Math.max(0,s.troughLinR.slope*c+s.troughLinR.intercept)
    };
  });

  var actualPeaks=s.cycleData.map(function(c){
    var pt={x:c.cycle,y:c.peak,peakDate:c.peakDate};
    if(hasPriceData)pt.peakPrice=PRICE_MAP[c.peakDate]||null;
    return pt;
  });
  var actualTroughs=s.cycleData.map(function(c){
    var pt={x:c.cycle,y:c.trough,troughDate:c.troughDate};
    if(hasPriceData)pt.troughPrice=PRICE_MAP[c.troughDate]||null;
    return pt;
  });

  // Stat cards — peaks
  var peakCards=[
    statCard("C"+s.nextCycle+" peak (log)",s.nextLogPeak.toFixed(2),"Next cycle projection",CC.amber),
    statCard("C"+s.nextCycle+" peak (linear)",s.nextLinPeak.toFixed(2),"More conservative",CC.muted),
  ].join("");

  // Stat cards — troughs
  var troughCards=[
    statCard("C"+s.nextCycle+" bottom (log)",s.nextLogTrough.toFixed(2),"Rising floor projection",CC.teal),
    statCard("C"+s.nextCycle+" bottom (linear)",s.nextLinTrough.toFixed(2),"More conservative",CC.muted),
  ].join("");

  // Price at peaks and troughs
  var peakPriceCards="",troughPriceCards="";
  if(hasPriceData){
    peakPriceCards='<div class="g4" style="margin-top:0">'+s.cycleData.map(function(c){
      return statCard("C"+c.cycle+" peak price",priceAtDate(c.peakDate),c.peakDate,CYCLE_COLORS[c.cycle]||CC.muted);
    }).join("")+'</div>';
    troughPriceCards='<div class="g4" style="margin-top:0">'+s.cycleData.map(function(c){
      return statCard("C"+c.cycle+" bottom price",priceAtDate(c.troughDate),c.troughDate,CYCLE_COLORS[c.cycle]||CC.muted);
    }).join("")+'</div>';
  }

  // Compression ratio: (peak - trough) / peak per cycle — shows band narrowing
  var compressionCards=s.cycleData.map(function(c){
    var ratio=((c.peak-c.trough)/c.peak*100);
    return statCard("C"+c.cycle+" range",ratio.toFixed(0)+"%","peak "+c.peak.toFixed(2)+" → bottom "+c.trough.toFixed(2),CYCLE_COLORS[c.cycle]||CC.muted);
  }).join("");

  var xMax=Math.max(7,s.nextCycle+1)+0.5;

  document.getElementById("p7").innerHTML=
    '<div class="g4">'+peakCards+troughCards+'</div>'+
    '<div class="chart-card"><div class="chart-title">Volatility compression — peak-to-trough MVRV range per cycle · the band is narrowing</div>'+makeCanvas("c7b",220)+'</div>'+
    '<div class="chart-card"><div class="chart-title">Cycle extremes — peak & trough MVRV with regression · peaks declining, floors rising</div>'+makeCanvas("c7",380)+'</div>'+
    '<div class="g4" style="margin-top:0">'+compressionCards+'</div>'+
    peakPriceCards+
    troughPriceCards+
    '<div class="info">'
      +'<strong style="color:'+CC.amber+'">Peaks</strong>: declining each cycle — diminishing euphoria as market matures. '
      +'<strong style="color:'+CC.teal+'">Troughs</strong>: rising each cycle — strengthening floor as more capital treats BTC as a store of value. '
      +'The narrowing band means lower upside <em>and</em> lower downside — reduced volatility over time. '
      +'Solid lines = log model, dashed = linear. Trust log for long-term planning.'
    +'</div>';

  destroyChart("c7");destroyChart("c7b");

  var scaleOpts=Object.assign({},chartDefs(),{
    scales:{
      x:Object.assign({},chartDefs().scales.x,{
        type:"linear",min:.5,max:xMax,
        title:{display:true,text:"Cycle number",color:"#a89fc4",font:{size:13}},
        ticks:Object.assign({},chartDefs().scales.x.ticks,{callback:function(v){return Number.isInteger(v)?"C"+v:""},stepSize:1})
      }),
      y:Object.assign({},chartDefs().scales.y,{min:0,max:7,title:{display:true,text:"MVRV",color:"#a89fc4",font:{size:13}}})
    },
    plugins:Object.assign({},withLegend(chartDefs()).plugins,{
      legend:{display:true,labels:{color:"#a89fc4",font:{size:13},boxWidth:24,boxHeight:2}},
      tooltip:{backgroundColor:CC.surface2,borderColor:CC.border,borderWidth:1,titleColor:CC.muted,bodyColor:CC.text,padding:12,
        callbacks:{label:function(ctx){
          var y=ctx.parsed.y;
          var label=ctx.dataset.label+": "+y.toFixed(3);
          // Peak dots
          if(ctx.datasetIndex===0){
            var pt=actualPeaks[ctx.dataIndex];
            if(pt){label="C"+pt.x+" peak: "+pt.y.toFixed(3)+" · "+pt.peakDate;if(pt.peakPrice)label+="\n$"+Math.round(pt.peakPrice).toLocaleString();}
          }
          // Trough dots
          if(ctx.datasetIndex===1){
            var pt=actualTroughs[ctx.dataIndex];
            if(pt){label="C"+pt.x+" trough: "+pt.y.toFixed(3)+" · "+pt.troughDate;if(pt.troughPrice)label+="\n$"+Math.round(pt.troughPrice).toLocaleString();}
          }
          return label;
        }}
      }
    })
  });

  CHARTS.c7=new Chart(document.getElementById("c7"),{type:"scatter",data:{datasets:[
    // Actual peaks
    {label:"Actual peaks",data:actualPeaks,backgroundColor:s.cycleData.map(function(c){return CYCLE_COLORS[c.cycle]||CC.accent}),borderColor:s.cycleData.map(function(c){return CYCLE_COLORS[c.cycle]||CC.accent}),pointRadius:12,showLine:false},
    // Actual troughs
    {label:"Actual troughs",data:actualTroughs,backgroundColor:s.cycleData.map(function(c){return CYCLE_COLORS[c.cycle]||CC.muted}),borderColor:s.cycleData.map(function(c){return CYCLE_COLORS[c.cycle]||CC.muted}),pointRadius:10,pointStyle:"triangle",showLine:false},
    // Peak log regression
    {label:"Peak (log)",data:regPts.map(function(p){return{x:p.cycle,y:p.peakLog}}),borderColor:CC.amber,backgroundColor:"transparent",borderWidth:2,pointRadius:3,showLine:true,tension:.3},
    // Peak linear regression
    {label:"Peak (linear)",data:regPts.map(function(p){return{x:p.cycle,y:Math.max(0,p.peakLin)}}),borderColor:CC.amber+"ff",backgroundColor:"transparent",borderWidth:1.5,borderDash:[5,4],pointRadius:0,showLine:true,tension:.3},
    // Trough log regression
    {label:"Bottom (log)",data:regPts.map(function(p){return{x:p.cycle,y:p.troughLog}}),borderColor:CC.teal,backgroundColor:"transparent",borderWidth:2,pointRadius:3,showLine:true,tension:.3},
    // Trough linear regression
    {label:"Bottom (linear)",data:regPts.map(function(p){return{x:p.cycle,y:Math.max(0,p.troughLin)}}),borderColor:CC.teal+"ff",backgroundColor:"transparent",borderWidth:1.5,borderDash:[5,4],pointRadius:0,showLine:true,tension:.3},
  ]},options:scaleOpts});

  // Compression chart
  var compData=s.cycleData.map(function(c){return{cycle:c.cycle,range:((c.peak-c.trough)/c.peak*100),peak:c.peak,trough:c.trough}});
  CHARTS.c7b=new Chart(document.getElementById("c7b"),{
    type:"bar",
    data:{
      labels:compData.map(function(d){return"C"+d.cycle}),
      datasets:[{
        label:"MVRV range (peak−trough)/peak %",
        data:compData.map(function(d){return d.range}),
        backgroundColor:compData.map(function(d){return CYCLE_COLORS[d.cycle]||CC.muted}),
        borderRadius:6
      }]
    },
    options:withLegend(Object.assign({},chartDefs(),{
      scales:{
        x:chartDefs().scales.x,
        y:Object.assign({},chartDefs().scales.y,{
          title:{display:true,text:"Volatility range %",color:"#a89fc4",font:{size:13}},
          ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return v+"%"}})
        })
      }
    }))
  });
}

function buildPricePeaks(){
  if(!hasPriceData){
    document.getElementById("p8").innerHTML='<div class="info" style="margin-top:40px;text-align:center;color:#a89fc4">Load the Kaggle price CSV to unlock this panel.</div>';
    return;
  }
  var s=STATS;

  // --- Helper: median ---
  function median(arr){
    if(!arr.length)return null;
    var sorted=arr.slice().sort(function(a,b){return a-b});
    var mid=Math.floor(sorted.length/2);
    return sorted.length%2?sorted[mid]:(sorted[mid-1]+sorted[mid])/2;
  }

  // --- Helper: IQR-based outlier detection ---
  function isOutlier(val,arr){
    if(arr.length<4)return false; // not enough data to detect outliers
    var sorted=arr.slice().sort(function(a,b){return a-b});
    var q1=sorted[Math.floor(sorted.length*0.25)];
    var q3=sorted[Math.floor(sorted.length*0.75)];
    var iqr=q3-q1;
    return val<q1-1.5*iqr||val>q3+1.5*iqr;
  }

  // --- Compute price peaks per cycle ---
  var pricePeaks=[];
  STATS.availCycles.forEach(function(c){
    var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.price});
    if(!sub.length)return;
    var best=sub.reduce(function(a,b){return b.price>a.price?b:a});
    var mvrvPeak=s.cycleData.find(function(cd){return cd.cycle===c});
    var mvrvPeakDate=mvrvPeak?mvrvPeak.peakDate:null;
    var mvrvPeakMvrv=mvrvPeak?mvrvPeak.peak:null;
    var daysDiff=null;
    if(mvrvPeakDate){
      var d1=new Date(mvrvPeakDate),d2=new Date(best.dateStr);
      daysDiff=Math.round((d2-d1)/(1000*60*60*24));
    }
    var mvrvOnPriceDay=best.mvrv||null;
    var divergencePct=mvrvOnPriceDay&&mvrvPeakMvrv?((mvrvOnPriceDay-mvrvPeakMvrv)/mvrvPeakMvrv)*100:null;
    var ratio=mvrvOnPriceDay&&mvrvPeakMvrv?mvrvOnPriceDay/mvrvPeakMvrv:null;
    var priceAtMvrvPeak=mvrvPeakDate?PRICE_MAP[mvrvPeakDate]:null;
    var remainingUpside=priceAtMvrvPeak&&best.price?((best.price-priceAtMvrvPeak)/priceAtMvrvPeak)*100:null;
    pricePeaks.push({cycle:c,price:best.price,date:best.dateStr,mvrvOnDay:mvrvOnPriceDay,mvrvPeakDate:mvrvPeakDate,mvrvPeakMvrv:mvrvPeakMvrv,daysDiff:daysDiff,divergencePct:divergencePct,ratio:ratio,priceAtMvrvPeak:priceAtMvrvPeak,remainingUpside:remainingUpside});
  });

  // --- Outlier detection on key series ---
  var allDays=pricePeaks.filter(function(p){return p.daysDiff!==null}).map(function(p){return p.daysDiff});
  var allDiv=pricePeaks.filter(function(p){return p.divergencePct!==null}).map(function(p){return p.divergencePct});
  var allUpside=pricePeaks.filter(function(p){return p.remainingUpside!==null}).map(function(p){return p.remainingUpside});
  pricePeaks.forEach(function(p){
    p.isOutlierDays=p.daysDiff!==null&&isOutlier(p.daysDiff,allDays);
    p.isOutlierDiv=p.divergencePct!==null&&isOutlier(p.divergencePct,allDiv);
    p.isOutlierUpside=p.remainingUpside!==null&&isOutlier(p.remainingUpside,allUpside);
  });

  // --- Pattern stats (excluding outliers) ---
  var cleanDays=pricePeaks.filter(function(p){return p.daysDiff!==null&&!p.isOutlierDays}).map(function(p){return p.daysDiff});
  var cleanDiv=pricePeaks.filter(function(p){return p.divergencePct!==null&&!p.isOutlierDiv}).map(function(p){return p.divergencePct});
  var cleanUpside=pricePeaks.filter(function(p){return p.remainingUpside!==null&&!p.isOutlierUpside}).map(function(p){return p.remainingUpside});
  var medDays=median(cleanDays);
  var medDiv=median(cleanDiv);
  var medUpside=median(cleanUpside);
  var outlierCount=pricePeaks.filter(function(p){return p.isOutlierDays||p.isOutlierDiv||p.isOutlierUpside}).length;

  // --- Trend: is lead-lag growing? ---
  var nonOutlierDaysPairs=pricePeaks.filter(function(p){return p.daysDiff!==null&&!p.isOutlierDays});
  var leadLagTrend=nonOutlierDaysPairs.length>=2?linReg(nonOutlierDaysPairs.map(function(p){return p.cycle}),nonOutlierDaysPairs.map(function(p){return p.daysDiff})):null;
  var upsideTrend=cleanUpside.length>=2?linReg(pricePeaks.filter(function(p){return p.remainingUpside!==null&&!p.isOutlierUpside}).map(function(p){return p.cycle}),cleanUpside):null;

  // --- Current cycle projection ---
  var curCycle=s.last.cycle;
  var curMvrvPeak=s.cycleData.find(function(c){return c.cycle===curCycle});
  var curMvrvPeakPrice=curMvrvPeak?PRICE_MAP[curMvrvPeak.peakDate]:null;
  var projectedUpside=medUpside!==null?medUpside:null;
  var projectedPriceCeiling=curMvrvPeakPrice&&projectedUpside!==null?curMvrvPeakPrice*(1+projectedUpside/100):null;
  var projectedLeadLag=leadLagTrend?Math.round(leadLagTrend.slope*curCycle+leadLagTrend.intercept):medDays;

  // --- Method 1: Cycle multiplier from halving price ---
  // For each completed cycle: ATH / price at halving start
  var halvingMultipliers=pricePeaks.filter(function(p){
    var halvingDate=HALVINGS[p.cycle-1];
    if(!halvingDate)return false;
    var halvingPrice=priceAtHalving(halvingDate);
    if(!halvingPrice||!p.price)return false;
    p.halvingPrice=halvingPrice;
    p.halvingMultiplier=p.price/halvingPrice;
    return true;
  });
  var allMultipliers=halvingMultipliers.filter(function(p){return!isOutlier(p.halvingMultiplier,halvingMultipliers.map(function(x){return x.halvingMultiplier}))}).map(function(p){return p.halvingMultiplier});
  var multLogLogR=allMultipliers.length>=2?linReg(halvingMultipliers.filter(function(p){return!isOutlier(p.halvingMultiplier,halvingMultipliers.map(function(x){return x.halvingMultiplier}))}).map(function(p){return Math.log(p.cycle)}),allMultipliers.map(function(v){return Math.log(v)})):null;
  var curHalvingPrice=HALVINGS[curCycle-1]?priceAtHalving(HALVINGS[curCycle-1]):null;
  var projMultiplier=multLogLogR?Math.exp(multLogLogR.slope*Math.log(curCycle)+multLogLogR.intercept):median(allMultipliers);
  var ceilingMethod1=curHalvingPrice&&projMultiplier?curHalvingPrice*projMultiplier:null;

  // --- Method 2: Previous ATH multiplier ---
  // Each cycle ATH / previous cycle ATH
  var athMultipliers=[];
  for(var i=1;i<pricePeaks.length;i++){
    if(pricePeaks[i].price&&pricePeaks[i-1].price){
      athMultipliers.push({cycle:pricePeaks[i].cycle,mult:pricePeaks[i].price/pricePeaks[i-1].price});
    }
  }
  var cleanAth=athMultipliers.filter(function(p){return!isOutlier(p.mult,athMultipliers.map(function(x){return x.mult}))});
  var athLogLogR=cleanAth.length>=2?linReg(cleanAth.map(function(p){return Math.log(p.cycle)}),cleanAth.map(function(p){return Math.log(p.mult)})):null;
  var prevATH=pricePeaks.length?pricePeaks[pricePeaks.length-1].price:null;
  var projAthMult=athLogLogR?Math.exp(athLogLogR.slope*Math.log(curCycle)+athLogLogR.intercept):median(cleanAth.map(function(p){return p.mult}));
  var nextCycleNum=curCycle+1;
  var projAthMultNext=athLogLogR?Math.exp(athLogLogR.slope*Math.log(nextCycleNum)+athLogLogR.intercept):null;
  var ceilingMethod2=prevATH&&projAthMultNext?prevATH*projAthMultNext:null;
  var prevCycleATH=pricePeaks.length>=2?pricePeaks[pricePeaks.length-2].price:null;
  var ceilingMethod2cur=prevCycleATH&&projAthMult?prevCycleATH*projAthMult:null;

  // --- Stat cards ---
  var cards=pricePeaks.map(function(p){
    var multNote=p.halvingMultiplier?"×"+p.halvingMultiplier.toFixed(1)+" from halving":"";
    return statCard("C"+p.cycle+" ATH","$"+Math.round(p.price).toLocaleString(),p.date+" "+multNote,CYCLE_COLORS[p.cycle]||CC.muted);
  }).join("");

  // --- Pattern stat cards ---
  var patternCards=[
    statCard("Median lead-lag",medDays!==null?medDays+"d":"—","MVRV peaks before price"+(outlierCount?" · "+outlierCount+" outlier"+(outlierCount>1?"s":"")+" excluded":""),CC.amber),
    statCard("Median remaining upside",medUpside!==null?medUpside.toFixed(0)+"%":"—","After MVRV peaks, price still gains this",CC.teal),
    statCard("Median divergence",medDiv!==null?medDiv.toFixed(1)+"%":"—","MVRV drop from peak at price ATH",CC.accent),
    projectedPriceCeiling?statCard("Ceiling · MVRV upside","$"+Math.round(projectedPriceCeiling).toLocaleString(),"Price @ MVRV peak × median remaining upside",CC.green):statCard("Ceiling · MVRV upside","—","MVRV peak not yet confirmed",CC.muted),
    ceilingMethod1?statCard("Ceiling · halving mult.","$"+Math.round(ceilingMethod1).toLocaleString(),"Halving price × log-decay projected multiplier (×"+projMultiplier.toFixed(1)+")",CC.teal):statCard("Ceiling · halving mult.","—","Need halving price data",CC.muted),
    ceilingMethod2cur?statCard("Ceiling · ATH mult.","$"+Math.round(ceilingMethod2cur).toLocaleString(),"Prev cycle ATH × log-decay projected mult. (×"+projAthMult.toFixed(2)+")",CC.amber):statCard("Ceiling · ATH mult.","—","Need 2+ cycles",CC.muted),
  ].join("");

  // --- Divergence stat cards ---
  var divCards=pricePeaks.filter(function(p){return p.divergencePct!==null}).map(function(p){
    var color=p.divergencePct>-5?CC.amber:p.divergencePct>-20?CC.text:CC.teal;
    var outlierNote=p.isOutlierDiv?" ⚠ outlier":"";
    return statCard("C"+p.cycle+" divergence",p.divergencePct.toFixed(1)+"%",(p.ratio*100).toFixed(0)+"% intact"+outlierNote,color);
  }).join("");

  // --- Table rows ---
  var leadLagRows=pricePeaks.filter(function(p){return p.daysDiff!==null&&p.mvrvPeakDate}).map(function(p){
    var lag=p.daysDiff>0?"Price +"+p.daysDiff+"d after MVRV":p.daysDiff<0?"Price "+Math.abs(p.daysDiff)+"d before MVRV":"Same day";
    var outlierFlag=p.isOutlierDays||p.isOutlierDiv||p.isOutlierUpside?" ⚠":"";
    var divCell=p.divergencePct!==null?'<td style="color:'+(p.divergencePct>-5?CC.amber:p.divergencePct>-20?CC.text:CC.teal)+'">'+p.divergencePct.toFixed(1)+'%'+(p.isOutlierDiv?" ⚠":"")+'</td>':'<td>—</td>';
    var ratioCell=p.ratio!==null?'<td>'+(p.ratio*100).toFixed(0)+'%</td>':'<td>—</td>';
    var upsideCell=p.remainingUpside!==null?'<td style="color:'+CC.teal+'">+'+p.remainingUpside.toFixed(0)+'%'+(p.isOutlierUpside?" ⚠":"")+'</td>':'<td>—</td>';
    return'<tr><td style="color:'+(CYCLE_COLORS[p.cycle]||CC.muted)+';font-weight:600">C'+p.cycle+outlierFlag+'</td>'
      +'<td>$'+Math.round(p.price).toLocaleString()+'</td>'
      +'<td>'+p.date+'</td>'
      +'<td>'+(p.mvrvOnDay?p.mvrvOnDay.toFixed(3):"—")+'</td>'
      +'<td>'+(p.priceAtMvrvPeak?"$"+Math.round(p.priceAtMvrvPeak).toLocaleString():"—")+'</td>'
      +upsideCell
      +'<td>'+(p.daysDiff+(p.isOutlierDays?" ⚠":""))+'d</td>'
      +divCell+ratioCell
      +'<td>'+lag+'</td></tr>';
  }).join("");

  // Multiplier history rows for table
  var multRows=halvingMultipliers.map(function(p){
    var athMult=athMultipliers.find(function(a){return a.cycle===p.cycle});
    var outlierFlag=isOutlier(p.halvingMultiplier,halvingMultipliers.map(function(x){return x.halvingMultiplier}))?" ⚠":"";
    return'<tr><td style="color:'+(CYCLE_COLORS[p.cycle]||CC.muted)+';font-weight:600">C'+p.cycle+'</td>'
      +'<td>$'+Math.round(p.halvingPrice).toLocaleString()+'</td>'
      +'<td>$'+Math.round(p.price).toLocaleString()+'</td>'
      +'<td style="color:'+CC.teal+'">×'+p.halvingMultiplier.toFixed(1)+outlierFlag+'</td>'

    '<div class="chart-card"><div class="chart-title">MVRV divergence at price peak (%)</div>'+makeCanvas("c8c",200)+'</div>'+
    '<div class="tbl-wrap"><table><thead><tr><th>Cycle</th><th>BTC ATH</th><th>ATH date</th><th>MVRV that day</th><th>Price @ MVRV peak</th><th>Remaining upside</th><th>Lead/lag</th><th>Divergence</th><th>Ratio</th><th>Direction</th></tr></thead><tbody>'+leadLagRows+'</tbody></table></div>'+
    '<div class="info">⚠ = statistical outlier (IQR method), excluded from median stats. Lead/lag: MVRV peaks first, then price follows. Divergence = how far MVRV had already fallen from its peak when BTC price topped. See Projections tab for price ceiling models.</div>';

  destroyChart("c8a");destroyChart("c8b");destroyChart("c8c");destroyChart("c8d");

      {label:"Median (excl. outliers)",data:upsideCycles.map(function(){return medUpside}),borderColor:"#a89fc4",borderWidth:2,borderDash:[6,3],pointRadius:0,type:"line",fill:false}
    ]
  },options:withLegend(Object.assign({},chartDefs(),{scales:{x:chartDefs().scales.x,y:Object.assign({},chartDefs().scales.y,{title:{display:true,text:"% gain after MVRV peaked",color:"#a89fc4",font:{size:13}},ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return v+"%"}})})}})  )});

  // MVRV compare bar chart
