function buildZoneDays(){
  var s=STATS;
  var barData=s.cycleData.map(function(c){return{name:"C"+c.cycle,b1:c.below1,m1:c.below1_5-c.below1,m2:c.days-c.above2-c.below1_5,m3:c.above2-c.above3,a3:c.above3}});
  var tblRows=[["Below 1.0",function(c){return c.below1+" ("+(c.below1/c.days*100).toFixed(0)+"%)"},CC.red],["1.0-1.5",function(c){return(c.below1_5-c.below1)+" ("+((c.below1_5-c.below1)/c.days*100).toFixed(0)+"%)"},CC.amber],["1.5-2.0",function(c){return(c.days-c.above2-c.below1_5)+" ("+((c.days-c.above2-c.below1_5)/c.days*100).toFixed(0)+"%)"},CC.accent],["2.0-3.0",function(c){return(c.above2-c.above3)+" ("+((c.above2-c.above3)/c.days*100).toFixed(0)+"%)"},CC.teal],["Above 3.0",function(c){return c.above3+" ("+(c.above3/c.days*100).toFixed(0)+"%)"},CC.green]].map(function(row){return'<tr><td style="color:'+row[2]+'">'+row[0]+'</td>'+s.cycleData.map(function(c){return"<td>"+row[1](c)+"</td>"}).join("")+"</tr>"}).join("");
  // Add avg price per zone per cycle if available
  var priceZoneHtml="";
  if(hasPriceData){
    var zoneThresholds=[[0,1,CC.red,"< 1.0"],[1,1.5,CC.amber,"1.0-1.5"],[1.5,2,CC.accent,"1.5-2.0"],[2,3,CC.teal,"2.0-3.0"],[3,999,CC.green,"> 3.0"]];
    var priceRows=zoneThresholds.map(function(z){
      var cells=s.cycleData.map(function(c){
        var pts=(BY_CYCLE[c.cycle]||[]).filter(function(d){return d.mvrv>=z[0]&&d.mvrv<z[1]&&d.price});
        if(!pts.length)return"<td>—</td>";
        var avg=pts.reduce(function(a,b){return a+b.price},0)/pts.length;
        return"<td>$"+Math.round(avg).toLocaleString()+"</td>";
      }).join("");
      return'<tr><td style="color:'+z[2]+'">'+z[3]+'</td>'+cells+"</tr>";
    }).join("");
    priceZoneHtml='<div class="tbl-wrap" style="margin-top:16px"><table><thead><tr><th>MVRV Zone</th>'+s.cycleData.map(function(c){return"<th>C"+c.cycle+" avg price</th>"}).join("")+'</tr></thead><tbody>'+priceRows+'</tbody></table></div>';
  }
  document.getElementById("p6").innerHTML='<div class="chart-card"><div class="chart-title">Days spent in each MVRV zone per cycle</div>'+makeCanvas("c6",300)+'</div>'
    +(hasPriceData?priceZoneHtml+'<div style="font-size:0.85rem;color:#a89fc4;margin:4px 0 12px">Avg BTC price when MVRV was in each zone — actionable accumulation/exit reference</div>':"")
    +'<div class="tbl-wrap"><table><thead><tr><th>Zone</th>'+s.cycleData.map(function(c){return"<th>C"+c.cycle+"</th>"}).join("")+'</tr></thead><tbody>'+tblRows+'</tbody></table></div>'
    +'<div class="info">Zone days show how long MVRV spent in each band per cycle. Avg price per zone is the most actionable reference — it tells you what BTC historically cost during each on-chain signal state.</div>';
  destroyChart("c6");
  var opts=withLegend(Object.assign({},chartDefs(),{scales:{x:Object.assign({},chartDefs().scales.x,{stacked:true}),y:Object.assign({},chartDefs().scales.y,{stacked:true})}}));
  CHARTS.c6=new Chart(document.getElementById("c6"),{type:"bar",data:{labels:barData.map(function(d){return d.name}),datasets:[{label:"< 1.0",data:barData.map(function(d){return d.b1}),backgroundColor:CC.red,stack:"a"},{label:"1.0-1.5",data:barData.map(function(d){return d.m1}),backgroundColor:CC.amber,stack:"a"},{label:"1.5-2.0",data:barData.map(function(d){return d.m2}),backgroundColor:CC.accent+"80",stack:"a"},{label:"2.0-3.0",data:barData.map(function(d){return d.m3}),backgroundColor:CC.teal,stack:"a"},{label:"> 3.0",data:barData.map(function(d){return d.a3}),backgroundColor:CC.green,stack:"a"}]},options:opts});
}

function buildRegression(){
  var s=STATS;
  var maxC=s.nextCycle+2;
  // Project both peaks and troughs for all future cycles
  var regPts=Array.from({length:maxC},function(_,i){
    var c=i+1;
    return{
      cycle:c,
      peakLog:Math.max(0,s.logR.slope*Math.log(c)+s.logR.intercept),
      peakLin:Math.max(0,s.linR.slope*c+s.linR.intercept),
      troughLog:Math.max(0,s.troughLogR.slope*Math.log(c)+s.troughLogR.intercept),
      troughLin:Math.max(0,s.troughLinR.slope*c+s.troughLinR.intercept)
    };
  });

  var actualPeaks=s.cycleData.map(function(c){
    var pt={x:c.cycle,y:c.peak,peakDate:c.peakDate};
    if(hasPriceData)pt.peakPrice=PRICE_MAP[c.peakDate]||null;
    return pt;
  });
  var actualTroughs=s.cycleData.map(function(c){
    var pt={x:c.cycle,y:c.trough,troughDate:c.troughDate};
    if(hasPriceData)pt.troughPrice=PRICE_MAP[c.troughDate]||null;
    return pt;
  });

  // Stat cards — peaks
  var peakCards=[
    statCard("C"+s.nextCycle+" peak (log)",s.nextLogPeak.toFixed(2),"Next cycle projection",CC.amber),
    statCard("C"+s.nextCycle+" peak (linear)",s.nextLinPeak.toFixed(2),"More conservative",CC.muted),
  ].join("");

  // Stat cards — troughs
  var troughCards=[
    statCard("C"+s.nextCycle+" bottom (log)",s.nextLogTrough.toFixed(2),"Rising floor projection",CC.teal),
    statCard("C"+s.nextCycle+" bottom (linear)",s.nextLinTrough.toFixed(2),"More conservative",CC.muted),
  ].join("");

  // Price at peaks and troughs
  var peakPriceCards="",troughPriceCards="";
  if(hasPriceData){
    peakPriceCards='<div class="g4" style="margin-top:0">'+s.cycleData.map(function(c){
      return statCard("C"+c.cycle+" peak price",priceAtDate(c.peakDate),c.peakDate,CYCLE_COLORS[c.cycle]||CC.muted);
    }).join("")+'</div>';
    troughPriceCards='<div class="g4" style="margin-top:0">'+s.cycleData.map(function(c){
      return statCard("C"+c.cycle+" bottom price",priceAtDate(c.troughDate),c.troughDate,CYCLE_COLORS[c.cycle]||CC.muted);
    }).join("")+'</div>';
  }

  // Compression ratio: (peak - trough) / peak per cycle — shows band narrowing
  var compressionCards=s.cycleData.map(function(c){
    var ratio=((c.peak-c.trough)/c.peak*100);
    return statCard("C"+c.cycle+" range",ratio.toFixed(0)+"%","peak "+c.peak.toFixed(2)+" → bottom "+c.trough.toFixed(2),CYCLE_COLORS[c.cycle]||CC.muted);
  }).join("");

  var xMax=Math.max(7,s.nextCycle+1)+0.5;

  document.getElementById("p7").innerHTML=
    '<div class="g4">'+peakCards+troughCards+'</div>'+
    '<div class="chart-card"><div class="chart-title">Volatility compression — peak-to-trough MVRV range per cycle · the band is narrowing</div>'+makeCanvas("c7b",220)+'</div>'+
    '<div class="chart-card"><div class="chart-title">Cycle extremes — peak & trough MVRV with regression · peaks declining, floors rising</div>'+makeCanvas("c7",380)+'</div>'+
    '<div class="g4" style="margin-top:0">'+compressionCards+'</div>'+
    peakPriceCards+
    troughPriceCards+
    '<div class="info">'
      +'<strong style="color:'+CC.amber+'">Peaks</strong>: declining each cycle — diminishing euphoria as market matures. '
      +'<strong style="color:'+CC.teal+'">Troughs</strong>: rising each cycle — strengthening floor as more capital treats BTC as a store of value. '
      +'The narrowing band means lower upside <em>and</em> lower downside — reduced volatility over time. '
      +'Solid lines = log model, dashed = linear. Trust log for long-term planning.'
    +'</div>';

  destroyChart("c7");destroyChart("c7b");

  var scaleOpts=Object.assign({},chartDefs(),{
    scales:{
      x:Object.assign({},chartDefs().scales.x,{
        type:"linear",min:.5,max:xMax,
        title:{display:true,text:"Cycle number",color:"#a89fc4",font:{size:13}},
        ticks:Object.assign({},chartDefs().scales.x.ticks,{callback:function(v){return Number.isInteger(v)?"C"+v:""},stepSize:1})
      }),
      y:Object.assign({},chartDefs().scales.y,{min:0,max:7,title:{display:true,text:"MVRV",color:"#a89fc4",font:{size:13}}})
    },
    plugins:Object.assign({},withLegend(chartDefs()).plugins,{
      legend:{display:true,labels:{color:"#a89fc4",font:{size:13},boxWidth:24,boxHeight:2}},
      tooltip:{backgroundColor:CC.surface2,borderColor:CC.border,borderWidth:1,titleColor:CC.muted,bodyColor:CC.text,padding:12,
        callbacks:{label:function(ctx){
          var y=ctx.parsed.y;
          var label=ctx.dataset.label+": "+y.toFixed(3);
          // Peak dots
          if(ctx.datasetIndex===0){
            var pt=actualPeaks[ctx.dataIndex];
            if(pt){label="C"+pt.x+" peak: "+pt.y.toFixed(3)+" · "+pt.peakDate;if(pt.peakPrice)label+="\n$"+Math.round(pt.peakPrice).toLocaleString();}
          }
          // Trough dots
          if(ctx.datasetIndex===1){
            var pt=actualTroughs[ctx.dataIndex];
            if(pt){label="C"+pt.x+" trough: "+pt.y.toFixed(3)+" · "+pt.troughDate;if(pt.troughPrice)label+="\n$"+Math.round(pt.troughPrice).toLocaleString();}
          }
          return label;
        }}
      }
    })
  });

  CHARTS.c7=new Chart(document.getElementById("c7"),{type:"scatter",data:{datasets:[
    // Actual peaks
    {label:"Actual peaks",data:actualPeaks,backgroundColor:s.cycleData.map(function(c){return CYCLE_COLORS[c.cycle]||CC.accent}),borderColor:s.cycleData.map(function(c){return CYCLE_COLORS[c.cycle]||CC.accent}),pointRadius:12,showLine:false},
    // Actual troughs
    {label:"Actual troughs",data:actualTroughs,backgroundColor:s.cycleData.map(function(c){return CYCLE_COLORS[c.cycle]||CC.muted}),borderColor:s.cycleData.map(function(c){return CYCLE_COLORS[c.cycle]||CC.muted}),pointRadius:10,pointStyle:"triangle",showLine:false},
    // Peak log regression
    {label:"Peak (log)",data:regPts.map(function(p){return{x:p.cycle,y:p.peakLog}}),borderColor:CC.amber,backgroundColor:"transparent",borderWidth:2,pointRadius:3,showLine:true,tension:.3},
    // Peak linear regression
    {label:"Peak (linear)",data:regPts.map(function(p){return{x:p.cycle,y:Math.max(0,p.peakLin)}}),borderColor:CC.amber+"ff",backgroundColor:"transparent",borderWidth:1.5,borderDash:[5,4],pointRadius:0,showLine:true,tension:.3},
    // Trough log regression
    {label:"Bottom (log)",data:regPts.map(function(p){return{x:p.cycle,y:p.troughLog}}),borderColor:CC.teal,backgroundColor:"transparent",borderWidth:2,pointRadius:3,showLine:true,tension:.3},
    // Trough linear regression
    {label:"Bottom (linear)",data:regPts.map(function(p){return{x:p.cycle,y:Math.max(0,p.troughLin)}}),borderColor:CC.teal+"ff",backgroundColor:"transparent",borderWidth:1.5,borderDash:[5,4],pointRadius:0,showLine:true,tension:.3},
  ]},options:scaleOpts});

  // Compression chart
  var compData=s.cycleData.map(function(c){return{cycle:c.cycle,range:((c.peak-c.trough)/c.peak*100),peak:c.peak,trough:c.trough}});
  CHARTS.c7b=new Chart(document.getElementById("c7b"),{
    type:"bar",
    data:{
      labels:compData.map(function(d){return"C"+d.cycle}),
      datasets:[{
        label:"MVRV range (peak−trough)/peak %",
        data:compData.map(function(d){return d.range}),
        backgroundColor:compData.map(function(d){return CYCLE_COLORS[d.cycle]||CC.muted}),
        borderRadius:6
      }]
    },
    options:withLegend(Object.assign({},chartDefs(),{
      scales:{
        x:chartDefs().scales.x,
        y:Object.assign({},chartDefs().scales.y,{
          title:{display:true,text:"Volatility range %",color:"#a89fc4",font:{size:13}},
          ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return v+"%"}})
        })
      }
    }))
  });
}

function buildPricePeaks(){
  if(!hasPriceData){
    document.getElementById("p8").innerHTML='<div class="info" style="margin-top:40px;text-align:center;color:#a89fc4">Load the Kaggle price CSV to unlock this panel.</div>';
    return;
  }
  var s=STATS;

  // --- Helper: median ---
  function median(arr){
    if(!arr.length)return null;
    var sorted=arr.slice().sort(function(a,b){return a-b});
    var mid=Math.floor(sorted.length/2);
    return sorted.length%2?sorted[mid]:(sorted[mid-1]+sorted[mid])/2;
  }

  // --- Helper: IQR-based outlier detection ---
  function isOutlier(val,arr){
    if(arr.length<4)return false; // not enough data to detect outliers
    var sorted=arr.slice().sort(function(a,b){return a-b});
    var q1=sorted[Math.floor(sorted.length*0.25)];
    var q3=sorted[Math.floor(sorted.length*0.75)];
    var iqr=q3-q1;
    return val<q1-1.5*iqr||val>q3+1.5*iqr;
  }

  // --- Compute price peaks per cycle ---
  var pricePeaks=[];
  STATS.availCycles.forEach(function(c){
    var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.price});
    if(!sub.length)return;
    var best=sub.reduce(function(a,b){return b.price>a.price?b:a});
    var mvrvPeak=s.cycleData.find(function(cd){return cd.cycle===c});
    var mvrvPeakDate=mvrvPeak?mvrvPeak.peakDate:null;
    var mvrvPeakMvrv=mvrvPeak?mvrvPeak.peak:null;
    var daysDiff=null;
    if(mvrvPeakDate){
      var d1=new Date(mvrvPeakDate),d2=new Date(best.dateStr);
      daysDiff=Math.round((d2-d1)/(1000*60*60*24));
    }
    var mvrvOnPriceDay=best.mvrv||null;
    var divergencePct=mvrvOnPriceDay&&mvrvPeakMvrv?((mvrvOnPriceDay-mvrvPeakMvrv)/mvrvPeakMvrv)*100:null;
    var ratio=mvrvOnPriceDay&&mvrvPeakMvrv?mvrvOnPriceDay/mvrvPeakMvrv:null;
    var priceAtMvrvPeak=mvrvPeakDate?PRICE_MAP[mvrvPeakDate]:null;
    var remainingUpside=priceAtMvrvPeak&&best.price?((best.price-priceAtMvrvPeak)/priceAtMvrvPeak)*100:null;
    pricePeaks.push({cycle:c,price:best.price,date:best.dateStr,mvrvOnDay:mvrvOnPriceDay,mvrvPeakDate:mvrvPeakDate,mvrvPeakMvrv:mvrvPeakMvrv,daysDiff:daysDiff,divergencePct:divergencePct,ratio:ratio,priceAtMvrvPeak:priceAtMvrvPeak,remainingUpside:remainingUpside});
  });

  // --- Outlier detection on key series ---
  var allDays=pricePeaks.filter(function(p){return p.daysDiff!==null}).map(function(p){return p.daysDiff});
  var allDiv=pricePeaks.filter(function(p){return p.divergencePct!==null}).map(function(p){return p.divergencePct});
  var allUpside=pricePeaks.filter(function(p){return p.remainingUpside!==null}).map(function(p){return p.remainingUpside});
  pricePeaks.forEach(function(p){
    p.isOutlierDays=p.daysDiff!==null&&isOutlier(p.daysDiff,allDays);
    p.isOutlierDiv=p.divergencePct!==null&&isOutlier(p.divergencePct,allDiv);
    p.isOutlierUpside=p.remainingUpside!==null&&isOutlier(p.remainingUpside,allUpside);
  });

  // --- Pattern stats (excluding outliers) ---
  var cleanDays=pricePeaks.filter(function(p){return p.daysDiff!==null&&!p.isOutlierDays}).map(function(p){return p.daysDiff});
  var cleanDiv=pricePeaks.filter(function(p){return p.divergencePct!==null&&!p.isOutlierDiv}).map(function(p){return p.divergencePct});
  var cleanUpside=pricePeaks.filter(function(p){return p.remainingUpside!==null&&!p.isOutlierUpside}).map(function(p){return p.remainingUpside});
  var medDays=median(cleanDays);
  var medDiv=median(cleanDiv);
  var medUpside=median(cleanUpside);
  var outlierCount=pricePeaks.filter(function(p){return p.isOutlierDays||p.isOutlierDiv||p.isOutlierUpside}).length;

  // --- Trend: is lead-lag growing? ---
  var nonOutlierDaysPairs=pricePeaks.filter(function(p){return p.daysDiff!==null&&!p.isOutlierDays});
  var leadLagTrend=nonOutlierDaysPairs.length>=2?linReg(nonOutlierDaysPairs.map(function(p){return p.cycle}),nonOutlierDaysPairs.map(function(p){return p.daysDiff})):null;
  var upsideTrend=cleanUpside.length>=2?linReg(pricePeaks.filter(function(p){return p.remainingUpside!==null&&!p.isOutlierUpside}).map(function(p){return p.cycle}),cleanUpside):null;

  // --- Current cycle projection ---
  var curCycle=s.last.cycle;
  var curMvrvPeak=s.cycleData.find(function(c){return c.cycle===curCycle});
  var curMvrvPeakPrice=curMvrvPeak?PRICE_MAP[curMvrvPeak.peakDate]:null;
  var projectedUpside=medUpside!==null?medUpside:null;
  var projectedPriceCeiling=curMvrvPeakPrice&&projectedUpside!==null?curMvrvPeakPrice*(1+projectedUpside/100):null;
  var projectedLeadLag=leadLagTrend?Math.round(leadLagTrend.slope*curCycle+leadLagTrend.intercept):medDays;

  // --- Method 1: Cycle multiplier from halving price ---
  // For each completed cycle: ATH / price at halving start
  var halvingMultipliers=pricePeaks.filter(function(p){
    var halvingDate=HALVINGS[p.cycle-1];
    if(!halvingDate)return false;
    var halvingPrice=priceAtHalving(halvingDate);
    if(!halvingPrice||!p.price)return false;
    p.halvingPrice=halvingPrice;
    p.halvingMultiplier=p.price/halvingPrice;
    return true;
  });
  var allMultipliers=halvingMultipliers.filter(function(p){return!isOutlier(p.halvingMultiplier,halvingMultipliers.map(function(x){return x.halvingMultiplier}))}).map(function(p){return p.halvingMultiplier});
  var multLogLogR=allMultipliers.length>=2?linReg(halvingMultipliers.filter(function(p){return!isOutlier(p.halvingMultiplier,halvingMultipliers.map(function(x){return x.halvingMultiplier}))}).map(function(p){return Math.log(p.cycle)}),allMultipliers.map(function(v){return Math.log(v)})):null;
  var curHalvingPrice=HALVINGS[curCycle-1]?priceAtHalving(HALVINGS[curCycle-1]):null;
  var projMultiplier=multLogLogR?Math.exp(multLogLogR.slope*Math.log(curCycle)+multLogLogR.intercept):median(allMultipliers);
  var ceilingMethod1=curHalvingPrice&&projMultiplier?curHalvingPrice*projMultiplier:null;

  // --- Method 2: Previous ATH multiplier ---
  // Each cycle ATH / previous cycle ATH
  var athMultipliers=[];
  for(var i=1;i<pricePeaks.length;i++){
    if(pricePeaks[i].price&&pricePeaks[i-1].price){
      athMultipliers.push({cycle:pricePeaks[i].cycle,mult:pricePeaks[i].price/pricePeaks[i-1].price});
    }
  }
  var cleanAth=athMultipliers.filter(function(p){return!isOutlier(p.mult,athMultipliers.map(function(x){return x.mult}))});
  var athLogLogR=cleanAth.length>=2?linReg(cleanAth.map(function(p){return Math.log(p.cycle)}),cleanAth.map(function(p){return Math.log(p.mult)})):null;
  var prevATH=pricePeaks.length?pricePeaks[pricePeaks.length-1].price:null;
  var projAthMult=athLogLogR?Math.exp(athLogLogR.slope*Math.log(curCycle)+athLogLogR.intercept):median(cleanAth.map(function(p){return p.mult}));
  var nextCycleNum=curCycle+1;
  var projAthMultNext=athLogLogR?Math.exp(athLogLogR.slope*Math.log(nextCycleNum)+athLogLogR.intercept):null;
  var ceilingMethod2=prevATH&&projAthMultNext?prevATH*projAthMultNext:null;
  var prevCycleATH=pricePeaks.length>=2?pricePeaks[pricePeaks.length-2].price:null;
  var ceilingMethod2cur=prevCycleATH&&projAthMult?prevCycleATH*projAthMult:null;

  // --- Stat cards ---
  var cards=pricePeaks.map(function(p){
    var multNote=p.halvingMultiplier?"×"+p.halvingMultiplier.toFixed(1)+" from halving":"";
    return statCard("C"+p.cycle+" ATH","$"+Math.round(p.price).toLocaleString(),p.date+" "+multNote,CYCLE_COLORS[p.cycle]||CC.muted);
  }).join("");

  // --- Pattern stat cards ---
  var patternCards=[
    statCard("Median lead-lag",medDays!==null?medDays+"d":"—","MVRV peaks before price"+(outlierCount?" · "+outlierCount+" outlier"+(outlierCount>1?"s":"")+" excluded":""),CC.amber),
    statCard("Median remaining upside",medUpside!==null?medUpside.toFixed(0)+"%":"—","After MVRV peaks, price still gains this",CC.teal),
    statCard("Median divergence",medDiv!==null?medDiv.toFixed(1)+"%":"—","MVRV drop from peak at price ATH",CC.accent),
    projectedPriceCeiling?statCard("Ceiling · MVRV upside","$"+Math.round(projectedPriceCeiling).toLocaleString(),"Price @ MVRV peak × median remaining upside",CC.green):statCard("Ceiling · MVRV upside","—","MVRV peak not yet confirmed",CC.muted),
    ceilingMethod1?statCard("Ceiling · halving mult.","$"+Math.round(ceilingMethod1).toLocaleString(),"Halving price × log-decay projected multiplier (×"+projMultiplier.toFixed(1)+")",CC.teal):statCard("Ceiling · halving mult.","—","Need halving price data",CC.muted),
    ceilingMethod2cur?statCard("Ceiling · ATH mult.","$"+Math.round(ceilingMethod2cur).toLocaleString(),"Prev cycle ATH × log-decay projected mult. (×"+projAthMult.toFixed(2)+")",CC.amber):statCard("Ceiling · ATH mult.","—","Need 2+ cycles",CC.muted),
  ].join("");

  // --- Divergence stat cards ---
  var divCards=pricePeaks.filter(function(p){return p.divergencePct!==null}).map(function(p){
    var color=p.divergencePct>-5?CC.amber:p.divergencePct>-20?CC.text:CC.teal;
    var outlierNote=p.isOutlierDiv?" ⚠ outlier":"";
    return statCard("C"+p.cycle+" divergence",p.divergencePct.toFixed(1)+"%",(p.ratio*100).toFixed(0)+"% intact"+outlierNote,color);
  }).join("");

  // --- Table rows ---
  var leadLagRows=pricePeaks.filter(function(p){return p.daysDiff!==null&&p.mvrvPeakDate}).map(function(p){
    var lag=p.daysDiff>0?"Price +"+p.daysDiff+"d after MVRV":p.daysDiff<0?"Price "+Math.abs(p.daysDiff)+"d before MVRV":"Same day";
    var outlierFlag=p.isOutlierDays||p.isOutlierDiv||p.isOutlierUpside?" ⚠":"";
    var divCell=p.divergencePct!==null?'<td style="color:'+(p.divergencePct>-5?CC.amber:p.divergencePct>-20?CC.text:CC.teal)+'">'+p.divergencePct.toFixed(1)+'%'+(p.isOutlierDiv?" ⚠":"")+'</td>':'<td>—</td>';
    var ratioCell=p.ratio!==null?'<td>'+(p.ratio*100).toFixed(0)+'%</td>':'<td>—</td>';
    var upsideCell=p.remainingUpside!==null?'<td style="color:'+CC.teal+'">+'+p.remainingUpside.toFixed(0)+'%'+(p.isOutlierUpside?" ⚠":"")+'</td>':'<td>—</td>';
    return'<tr><td style="color:'+(CYCLE_COLORS[p.cycle]||CC.muted)+';font-weight:600">C'+p.cycle+outlierFlag+'</td>'
      +'<td>$'+Math.round(p.price).toLocaleString()+'</td>'
      +'<td>'+p.date+'</td>'
      +'<td>'+(p.mvrvOnDay?p.mvrvOnDay.toFixed(3):"—")+'</td>'
      +'<td>'+(p.priceAtMvrvPeak?"$"+Math.round(p.priceAtMvrvPeak).toLocaleString():"—")+'</td>'
      +upsideCell
      +'<td>'+(p.daysDiff+(p.isOutlierDays?" ⚠":""))+'d</td>'
      +divCell+ratioCell
      +'<td>'+lag+'</td></tr>';
  }).join("");

  // Multiplier history rows for table
  var multRows=halvingMultipliers.map(function(p){
    var athMult=athMultipliers.find(function(a){return a.cycle===p.cycle});
    var outlierFlag=isOutlier(p.halvingMultiplier,halvingMultipliers.map(function(x){return x.halvingMultiplier}))?" ⚠":"";
    return'<tr><td style="color:'+(CYCLE_COLORS[p.cycle]||CC.muted)+';font-weight:600">C'+p.cycle+'</td>'
      +'<td>$'+Math.round(p.halvingPrice).toLocaleString()+'</td>'
      +'<td>$'+Math.round(p.price).toLocaleString()+'</td>'
      +'<td style="color:'+CC.teal+'">×'+p.halvingMultiplier.toFixed(1)+outlierFlag+'</td>'
      +'<td style="color:'+CC.amber+'">'+(athMult?"×"+athMult.mult.toFixed(2)+(isOutlier(athMult.mult,athMultipliers.map(function(x){return x.mult}))?" ⚠":""):"—")+'</td>'
      +'</tr>';
  }).join("");

  document.getElementById("p8").innerHTML=
    '<div class="g4">'+cards+'</div>'+
    '<div class="chart-card"><div class="chart-title">BTC all-time high per cycle · log scale</div>'+makeCanvas("c8a",220)+'</div>'+
    '<div class="chart-card"><div class="chart-title">MVRV on the day of BTC price peak vs MVRV\'s own peak</div>'+makeCanvas("c8b",200)+'</div>'+
    '<div class="g4" style="margin-top:0">'+[
      statCard("Median lead-lag",medDays!==null?medDays+"d":"—","MVRV peaks before price"+(outlierCount?" · "+outlierCount+" outlier"+(outlierCount>1?"s":"")+" excl.":""),CC.amber),
      statCard("Median remaining upside",medUpside!==null?medUpside.toFixed(0)+"%":"—","After MVRV peaks, price still gains this",CC.teal),
      statCard("Median divergence",medDiv!==null?medDiv.toFixed(1)+"%":"—","MVRV drop from peak at price ATH",CC.accent),
    ].join("")+'</div>'+
    '<div class="chart-card"><div class="chart-title">Remaining price upside after MVRV peaked · % gain from MVRV peak date to price ATH</div>'+makeCanvas("c8d",200)+'</div>'+
    '<div class="chart-card"><div class="chart-title">MVRV divergence at price peak (%)</div>'+makeCanvas("c8c",200)+'</div>'+
    '<div class="tbl-wrap"><table><thead><tr><th>Cycle</th><th>BTC ATH</th><th>ATH date</th><th>MVRV that day</th><th>Price @ MVRV peak</th><th>Remaining upside</th><th>Lead/lag</th><th>Divergence</th><th>Ratio</th><th>Direction</th></tr></thead><tbody>'+leadLagRows+'</tbody></table></div>'+
    '<div class="info">⚠ = statistical outlier (IQR method), excluded from median stats. Lead/lag: MVRV peaks first, then price follows. Divergence = how far MVRV had already fallen from its peak when BTC price topped. See Projections tab for price ceiling models.</div>';

  destroyChart("c8a");destroyChart("c8b");destroyChart("c8c");destroyChart("c8d");

  // ATH bar chart
  CHARTS.c8a=new Chart(document.getElementById("c8a"),{type:"bar",data:{labels:pricePeaks.map(function(p){return"C"+p.cycle}),datasets:[{label:"BTC ATH (USD)",data:pricePeaks.map(function(p){return p.price}),backgroundColor:pricePeaks.map(function(p){return CYCLE_COLORS[p.cycle]||CC.muted}),borderRadius:6}]},options:withLegend(Object.assign({},chartDefs(),{scales:{x:chartDefs().scales.x,y:Object.assign({},chartDefs().scales.y,{type:"logarithmic",ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return v>=1000000?"$"+(v/1000000).toFixed(0)+"M":v>=1000?"$"+(v/1000).toFixed(0)+"k":"$"+v;}})})}}))});

  // Remaining upside bar chart
  var upsideCycles=pricePeaks.filter(function(p){return p.remainingUpside!==null});
  CHARTS.c8d=new Chart(document.getElementById("c8d"),{type:"bar",data:{
    labels:upsideCycles.map(function(p){return"C"+p.cycle+(p.isOutlierUpside?" ⚠":"")}),
    datasets:[
      {label:"Remaining upside %",data:upsideCycles.map(function(p){return p.remainingUpside}),backgroundColor:upsideCycles.map(function(p){return p.isOutlierUpside?"#a89fc4":(CYCLE_COLORS[p.cycle]||CC.muted)+"cc"}),borderRadius:6},
      {label:"Median (excl. outliers)",data:upsideCycles.map(function(){return medUpside}),borderColor:"#a89fc4",borderWidth:2,borderDash:[6,3],pointRadius:0,type:"line",fill:false}
    ]
  },options:withLegend(Object.assign({},chartDefs(),{scales:{x:chartDefs().scales.x,y:Object.assign({},chartDefs().scales.y,{title:{display:true,text:"% gain after MVRV peaked",color:"#a89fc4",font:{size:13}},ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return v+"%"}})})}})  )});

  // MVRV compare bar chart
  var mvrvCompareCycles=pricePeaks.filter(function(p){return p.mvrvOnDay&&p.mvrvPeakMvrv});
  CHARTS.c8b=new Chart(document.getElementById("c8b"),{type:"bar",data:{labels:mvrvCompareCycles.map(function(p){return"C"+p.cycle}),datasets:[{label:"MVRV at price ATH",data:mvrvCompareCycles.map(function(p){return p.mvrvOnDay}),backgroundColor:mvrvCompareCycles.map(function(p){return(CYCLE_COLORS[p.cycle]||CC.muted)+"cc"}),borderRadius:6},{label:"MVRV peak",data:mvrvCompareCycles.map(function(p){return p.mvrvPeakMvrv}),backgroundColor:"#a89fc4",borderRadius:6}]},options:withLegend(Object.assign({},chartDefs(),{scales:{x:Object.assign({},chartDefs().scales.x,{stacked:false}),y:Object.assign({},chartDefs().scales.y,{min:0,title:{display:true,text:"MVRV",color:"#a89fc4",font:{size:13}}})}}))});

  // Divergence bar chart
  var divCycles=pricePeaks.filter(function(p){return p.divergencePct!==null});
  CHARTS.c8c=new Chart(document.getElementById("c8c"),{type:"bar",data:{
    labels:divCycles.map(function(p){return"C"+p.cycle+(p.isOutlierDiv?" ⚠":"")}),
    datasets:[
      {label:"Divergence %",data:divCycles.map(function(p){return p.divergencePct}),backgroundColor:divCycles.map(function(p){return p.isOutlierDiv?"#a89fc4":p.divergencePct>-5?CC.amber+"cc":p.divergencePct>-20?CC.accent+"cc":CC.teal+"cc"}),borderRadius:6},
      {label:"Median (excl. outliers)",data:divCycles.map(function(){return medDiv}),borderColor:"#a89fc4",borderWidth:2,borderDash:[6,3],pointRadius:0,type:"line",fill:false}
    ]
  },options:withLegend(Object.assign({},chartDefs(),{scales:{x:chartDefs().scales.x,y:Object.assign({},chartDefs().scales.y,{title:{display:true,text:"Divergence (%)",color:"#a89fc4",font:{size:13}},ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return v+"%"}})})}})  )});
}

function buildPriceBottoms(){
  if(!hasPriceData){
    document.getElementById("p9").innerHTML='<div class="info" style="margin-top:40px;text-align:center;color:#a89fc4">Price data is required for this panel.</div>';
    return;
  }
  var s=STATS;

  function median(arr){
    if(!arr.length)return null;
    var sorted=arr.slice().sort(function(a,b){return a-b});
    var mid=Math.floor(sorted.length/2);
    return sorted.length%2?sorted[mid]:(sorted[mid-1]+sorted[mid])/2;
  }
  function isOutlier(val,arr){
    if(arr.length<4)return false;
    var sorted=arr.slice().sort(function(a,b){return a-b});
    var q1=sorted[Math.floor(sorted.length*0.25)];
    var q3=sorted[Math.floor(sorted.length*0.75)];
    var iqr=q3-q1;
    return val<q1-1.5*iqr||val>q3+1.5*iqr;
  }

  // --- Compute price bottoms per cycle ---
  var priceBottoms=[];
  s.availCycles.forEach(function(c){
    var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.price;});
    if(!sub.length)return;
    // Price bottom = lowest price in cycle
    var worst=sub.reduce(function(a,b){return b.price<a.price?b:a});
    var mvrvTrough=s.cycleData.find(function(cd){return cd.cycle===c;});
    var mvrvTroughDate=mvrvTrough?mvrvTrough.troughDate:null;
    var mvrvTroughMvrv=mvrvTrough?mvrvTrough.trough:null;
    var daysDiff=null;
    if(mvrvTroughDate){
      var d1=new Date(mvrvTroughDate),d2=new Date(worst.dateStr);
      daysDiff=Math.round((d2-d1)/(1000*60*60*24));
    }
    var mvrvOnBottomDay=worst.mvrv||null;
    var divergencePct=mvrvOnBottomDay&&mvrvTroughMvrv?((mvrvOnBottomDay-mvrvTroughMvrv)/mvrvTroughMvrv)*100:null;
    var priceAtMvrvTrough=mvrvTroughDate?PRICE_MAP[mvrvTroughDate]:null;
    // Further downside: how much lower did price go after MVRV bottomed
    var furtherDownside=priceAtMvrvTrough&&worst.price?((worst.price-priceAtMvrvTrough)/priceAtMvrvTrough)*100:null;
    priceBottoms.push({
      cycle:c,price:worst.price,date:worst.dateStr,
      mvrvOnDay:mvrvOnBottomDay,
      mvrvTroughDate:mvrvTroughDate,mvrvTroughMvrv:mvrvTroughMvrv,
      daysDiff:daysDiff,divergencePct:divergencePct,
      priceAtMvrvTrough:priceAtMvrvTrough,furtherDownside:furtherDownside
    });
  });

  // --- Outlier detection ---
  var allDays=priceBottoms.filter(function(p){return p.daysDiff!==null;}).map(function(p){return p.daysDiff;});
  var allDiv=priceBottoms.filter(function(p){return p.divergencePct!==null;}).map(function(p){return p.divergencePct;});
  var allDown=priceBottoms.filter(function(p){return p.furtherDownside!==null;}).map(function(p){return p.furtherDownside;});
  priceBottoms.forEach(function(p){
    p.isOutlierDays=p.daysDiff!==null&&isOutlier(p.daysDiff,allDays);
    p.isOutlierDiv=p.divergencePct!==null&&isOutlier(p.divergencePct,allDiv);
    p.isOutlierDown=p.furtherDownside!==null&&isOutlier(p.furtherDownside,allDown);
  });

  var cleanDays=priceBottoms.filter(function(p){return p.daysDiff!==null&&!p.isOutlierDays;}).map(function(p){return p.daysDiff;});
  var cleanDown=priceBottoms.filter(function(p){return p.furtherDownside!==null&&!p.isOutlierDown;}).map(function(p){return p.furtherDownside;});
  var cleanDiv=priceBottoms.filter(function(p){return p.divergencePct!==null&&!p.isOutlierDiv;}).map(function(p){return p.divergencePct;});
  var medDays=median(cleanDays);
  var medDown=median(cleanDown);
  var medDiv=median(cleanDiv);
  var outlierCount=priceBottoms.filter(function(p){return p.isOutlierDays||p.isOutlierDiv||p.isOutlierDown;}).length;

  // Trend: is lead-lag changing?
  var nonOutlierDaysPairs=priceBottoms.filter(function(p){return p.daysDiff!==null&&!p.isOutlierDays;});
  var leadLagTrend=nonOutlierDaysPairs.length>=2?linReg(nonOutlierDaysPairs.map(function(p){return p.cycle;}),nonOutlierDaysPairs.map(function(p){return p.daysDiff;})):null;
  var downTrend=cleanDown.length>=2?linReg(priceBottoms.filter(function(p){return p.furtherDownside!==null&&!p.isOutlierDown;}).map(function(p){return p.cycle;}),cleanDown):null;

  // Current cycle projection
  var curCycle=s.last.cycle;
  var curMvrvTrough=s.cycleData.find(function(c){return c.cycle===curCycle;});
  var curMvrvTroughPrice=curMvrvTrough?PRICE_MAP[curMvrvTrough.troughDate]:null;
  var projectedFloor=curMvrvTroughPrice&&medDown!==null?curMvrvTroughPrice*(1+medDown/100):null;
  var projectedLeadLag=leadLagTrend?Math.round(leadLagTrend.slope*curCycle+leadLagTrend.intercept):medDays;

  // --- Stat cards ---
  var cards=priceBottoms.map(function(p){
    return statCard("C"+p.cycle+" bottom","$"+Math.round(p.price).toLocaleString(),p.date,CYCLE_COLORS[p.cycle]||CC.muted);
  }).join("");

  var patternCards=[
    statCard("Median lead-lag",medDays!==null?medDays+"d":"—","MVRV troughs before price"+(outlierCount?" · "+outlierCount+" outlier"+(outlierCount>1?"s":"")+" excluded":""),CC.teal),
    statCard("Median further downside",medDown!==null?medDown.toFixed(0)+"%":"—","After MVRV troughs, price can still drop this much",CC.red),
    statCard("Median divergence",medDiv!==null?medDiv.toFixed(1)+"%":"—","MVRV rise from trough at price bottom",CC.accent),
    projectedFloor?statCard("Floor · MVRV downside","$"+Math.round(projectedFloor).toLocaleString(),"Price @ MVRV trough × median further downside",CC.teal):statCard("Floor · MVRV downside","—","MVRV trough not yet confirmed",CC.muted),
  ].join("");

  // --- Table rows ---
  var tableRows=priceBottoms.filter(function(p){return p.daysDiff!==null&&p.mvrvTroughDate;}).map(function(p){
    var lag=p.daysDiff>0?"Price +"+p.daysDiff+"d after MVRV":p.daysDiff<0?"Price "+Math.abs(p.daysDiff)+"d before MVRV":"Same day";
    var outlierFlag=(p.isOutlierDays||p.isOutlierDiv||p.isOutlierDown)?" ⚠":"";
    var divCell=p.divergencePct!==null?'<td style="color:'+(Math.abs(p.divergencePct)<5?CC.amber:CC.teal)+'">'+p.divergencePct.toFixed(1)+'%'+(p.isOutlierDiv?" ⚠":"")+'</td>':'<td>—</td>';
    var downCell=p.furtherDownside!==null?'<td style="color:'+CC.red+'">'+p.furtherDownside.toFixed(0)+'%'+(p.isOutlierDown?" ⚠":"")+'</td>':'<td>—</td>';
    return'<tr><td style="color:'+(CYCLE_COLORS[p.cycle]||CC.muted)+';font-weight:600">C'+p.cycle+outlierFlag+'</td>'
      +'<td>$'+Math.round(p.price).toLocaleString()+'</td>'
      +'<td>'+p.date+'</td>'
      +'<td>'+(p.mvrvOnDay?p.mvrvOnDay.toFixed(3):"—")+'</td>'
      +'<td>'+(p.priceAtMvrvTrough?"$"+Math.round(p.priceAtMvrvTrough).toLocaleString():"—")+'</td>'
      +downCell
      +'<td>'+(p.daysDiff+(p.isOutlierDays?" ⚠":""))+'d</td>'
      +divCell
      +'<td>'+lag+'</td></tr>';
  }).join("");

  document.getElementById("p9").innerHTML=
    '<div class="g4">'+cards+'</div>'+
    '<div class="chart-card"><div class="chart-title">BTC price bottom per cycle · log scale</div>'+makeCanvas("c9bot_a",220)+'</div>'+
    '<div class="chart-card"><div class="chart-title">MVRV on the day of BTC price bottom vs MVRV\'s own trough</div>'+makeCanvas("c9bot_b",200)+'</div>'+
    '<div class="g4" style="margin-top:0">'+[
      statCard("Median lead-lag",medDays!==null?medDays+"d":"—","MVRV troughs before price"+(outlierCount?" · "+outlierCount+" outlier"+(outlierCount>1?"s":"")+" excl.":""),CC.teal),
      statCard("Median further downside",medDown!==null?medDown.toFixed(0)+"%":"—","After MVRV troughs, price can still drop this much",CC.red),
      statCard("Median divergence",medDiv!==null?medDiv.toFixed(1)+"%":"—","MVRV rise from trough at price bottom",CC.accent),
    ].join("")+'</div>'+
    '<div class="chart-card"><div class="chart-title">Further price downside after MVRV troughed · % drop from MVRV trough date to price bottom</div>'+makeCanvas("c9bot_d",200)+'</div>'+
    '<div class="chart-card"><div class="chart-title">MVRV divergence at price bottom (%)</div>'+makeCanvas("c9bot_c",200)+'</div>'+
    '<div class="tbl-wrap"><table><thead><tr><th>Cycle</th><th>BTC Bottom</th><th>Bottom date</th><th>MVRV that day</th><th>Price @ MVRV trough</th><th>Further downside</th><th>Lead/lag</th><th>Divergence</th><th>Direction</th></tr></thead><tbody>'+tableRows+'</tbody></table></div>'+
    '<div class="info">⚠ = statistical outlier (IQR method), excluded from median stats. Lead/lag: MVRV troughs first, then price follows. Divergence = how far MVRV had already risen from its trough when BTC price bottomed. Further downside = % drop from price-at-MVRV-trough to actual price bottom. See Projections tab for price floor models.</div>';

  destroyChart("c9bot_a");destroyChart("c9bot_b");destroyChart("c9bot_c");destroyChart("c9bot_d");

  // Bottom price bar chart (log scale)
  CHARTS.c9bot_a=new Chart(document.getElementById("c9bot_a"),{type:"bar",data:{
    labels:priceBottoms.map(function(p){return"C"+p.cycle;}),
    datasets:[{label:"BTC Bottom (USD)",data:priceBottoms.map(function(p){return p.price;}),backgroundColor:priceBottoms.map(function(p){return CYCLE_COLORS[p.cycle]||CC.muted;}),borderRadius:6}]
  },options:withLegend(Object.assign({},chartDefs(),{scales:{x:chartDefs().scales.x,y:Object.assign({},chartDefs().scales.y,{type:"logarithmic",ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return v>=1000000?"$"+(v/1000000).toFixed(0)+"M":v>=1000?"$"+(v/1000).toFixed(0)+"k":"$"+v;}})})}}))});

  // Further downside bar chart
  var downCycles=priceBottoms.filter(function(p){return p.furtherDownside!==null;});
  CHARTS.c9bot_d=new Chart(document.getElementById("c9bot_d"),{type:"bar",data:{
    labels:downCycles.map(function(p){return"C"+p.cycle+(p.isOutlierDown?" ⚠":"");}),
    datasets:[
      {label:"Further downside %",data:downCycles.map(function(p){return p.furtherDownside;}),backgroundColor:downCycles.map(function(p){return p.isOutlierDown?"#a89fc4":(CYCLE_COLORS[p.cycle]||CC.muted)+"cc";}),borderRadius:6},
      {label:"Median (excl. outliers)",data:downCycles.map(function(){return medDown;}),borderColor:"#a89fc4",borderWidth:2,borderDash:[6,3],pointRadius:0,type:"line",fill:false}
    ]
  },options:withLegend(Object.assign({},chartDefs(),{scales:{x:chartDefs().scales.x,y:Object.assign({},chartDefs().scales.y,{title:{display:true,text:"% further drop after MVRV troughed",color:"#a89fc4",font:{size:13}},ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return v+"%"}})})}})  )});

  // MVRV compare bar chart
  var mvrvCompareCycles=priceBottoms.filter(function(p){return p.mvrvOnDay&&p.mvrvTroughMvrv;});
  CHARTS.c9bot_b=new Chart(document.getElementById("c9bot_b"),{type:"bar",data:{
    labels:mvrvCompareCycles.map(function(p){return"C"+p.cycle;}),
    datasets:[
      {label:"MVRV at price bottom",data:mvrvCompareCycles.map(function(p){return p.mvrvOnDay;}),backgroundColor:mvrvCompareCycles.map(function(p){return(CYCLE_COLORS[p.cycle]||CC.muted)+"cc";}),borderRadius:6},
      {label:"MVRV trough",data:mvrvCompareCycles.map(function(p){return p.mvrvTroughMvrv;}),backgroundColor:"#a89fc4",borderRadius:6}
    ]
  },options:withLegend(Object.assign({},chartDefs(),{scales:{x:Object.assign({},chartDefs().scales.x,{stacked:false}),y:Object.assign({},chartDefs().scales.y,{min:0,title:{display:true,text:"MVRV",color:"#a89fc4",font:{size:13}}})}}))});

  // Divergence bar chart
  var divCycles=priceBottoms.filter(function(p){return p.divergencePct!==null;});
  CHARTS.c9bot_c=new Chart(document.getElementById("c9bot_c"),{type:"bar",data:{
    labels:divCycles.map(function(p){return"C"+p.cycle+(p.isOutlierDiv?" ⚠":"");}),
    datasets:[
      {label:"Divergence %",data:divCycles.map(function(p){return p.divergencePct;}),backgroundColor:divCycles.map(function(p){return p.isOutlierDiv?"#a89fc4":(CYCLE_COLORS[p.cycle]||CC.muted)+"cc";}),borderRadius:6},
      {label:"Median (excl. outliers)",data:divCycles.map(function(){return medDiv;}),borderColor:"#a89fc4",borderWidth:2,borderDash:[6,3],pointRadius:0,type:"line",fill:false}
    ]
  },options:withLegend(Object.assign({},chartDefs(),{scales:{x:chartDefs().scales.x,y:Object.assign({},chartDefs().scales.y,{title:{display:true,text:"Divergence (%)",color:"#a89fc4",font:{size:13}},ticks:Object.assign({},chartDefs().scales.y.ticks,{callback:function(v){return v+"%"}})})}})  )});
}

function exportSummary(){
  var s=STATS, l=s.last;
  var lines=[];
  var hr=function(title){lines.push("","=== "+title+" ===");};
  var row=function(label,val){lines.push(label+": "+val);};

  hr("CURRENT STATUS");
  row("Date",l.dateStr);
  row("MVRV",l.mvrv.toFixed(3));
  row("Z-score",l.zscore.toFixed(3));
  var signal=l.zscore<CONFIG.ZSCORE_CAPITULATION?"Capitulation":l.zscore<0?"Accumulate":l.zscore<CONFIG.ZSCORE_CAUTION?"Neutral":"Caution";
  row("Signal",signal);
  row("MA20",l.ma20.toFixed(3));
  row("MA50",l.ma50.toFixed(3));
  row("MA200",l.ma200.toFixed(3));
  row("MA stack",l.ma20>l.ma50&&l.ma50>l.ma200?"Bullish (MA20>MA50>MA200)":l.ma20<l.ma50&&l.ma50<l.ma200?"Bearish (MA20<MA50<MA200)":"Mixed");
  row("ROC 30d",(l.roc30!=null?l.roc30.toFixed(1):"-")+"%");
  row("ROC 90d",(l.roc90!=null?l.roc90.toFixed(1):"-")+"%");
  if(hasPriceData&&l.price)row("BTC Price","$"+Math.round(l.price).toLocaleString());
  row("All-time MVRV peak",s.peakRow.mvrv.toFixed(3)+" on "+s.peakRow.dateStr);
  row("All-time MVRV bottom",s.botRow.mvrv.toFixed(3)+" on "+s.botRow.dateStr);
  row("Historical mean MVRV",s.mean.toFixed(3));
  row("Data range",DATA[0].dateStr+" to "+DATA[DATA.length-1].dateStr);
  row("Total data points",DATA.length.toLocaleString());

  hr("CURRENT CYCLE POSITION");
  var curCycle=l.cycle;
  var curCycleData=s.cycleData.find(function(c){return c.cycle===curCycle});
  row("Current cycle","C"+curCycle+(CYCLE_LABELS[curCycle]?" ("+CYCLE_LABELS[curCycle]+")":""));
  row("Cycle position",(l.cyclePct!=null?l.cyclePct.toFixed(1)+"%":"unknown"));
  if(curCycleData){
    row("Cycle peak so far",curCycleData.peak.toFixed(3)+" on "+curCycleData.peakDate);
    row("Current MVRV vs cycle peak",((l.mvrv/curCycleData.peak)*100).toFixed(0)+"% of cycle peak");
    row("Days in current cycle",curCycleData.days);
    row("Current drawdown from cycle peak",((l.mvrv-curCycleData.peak)/curCycleData.peak*100).toFixed(1)+"%");
  }

  hr("CYCLE SUMMARY");
  s.cycleData.forEach(function(c){
    lines.push("");
    lines.push("Cycle "+c.cycle+(CYCLE_LABELS[c.cycle]?" ("+CYCLE_LABELS[c.cycle]+")":"")+":");
    row("  Peak MVRV",c.peak.toFixed(3)+" on "+c.peakDate);
    row("  Trough MVRV",c.trough.toFixed(3)+" on "+c.troughDate);
    row("  Peak-to-trough range",((c.peak-c.trough)/c.peak*100).toFixed(0)+"% compression");
    row("  Duration",c.days+" days");
    if(hasPriceData){
      var p=PRICE_MAP[c.peakDate];if(p)row("  BTC price at MVRV peak","$"+Math.round(p).toLocaleString());
      var t=PRICE_MAP[c.troughDate];if(t)row("  BTC price at MVRV trough","$"+Math.round(t).toLocaleString());
    }
  });

  hr("DRAWDOWN — Max MVRV drawdown from cycle peak");
  s.cycleData.forEach(function(c){
    var pts=(BY_CYCLE[c.cycle]||[]).filter(function(d){return d.drawdown!=null});
    if(!pts.length)return;
    var worst=pts.reduce(function(a,b){return a.drawdown<b.drawdown?a:b});
    lines.push("");lines.push("Cycle "+c.cycle+":");
    row("  Max drawdown",worst.drawdown.toFixed(1)+"% on "+worst.dateStr);
    if(hasPriceData&&worst.price){
      var athPt=pts.filter(function(d){return d.price}).reduce(function(a,b){return b.price>a.price?b:a},worst);
      row("  BTC price at worst drawdown","$"+Math.round(worst.price).toLocaleString());
      if(athPt.price&&athPt.price!==worst.price)row("  Price drawdown from cycle ATH at that point",((worst.price-athPt.price)/athPt.price*100).toFixed(1)+"%");
    }
  });

  hr("MA CROSSOVERS — Golden & death cross events (MA20 vs MA50)");
  var crossovers=[];
  for(var i=1;i<DATA.length;i++){
    var prev=DATA[i-1],curr=DATA[i];
    if(prev.ma20<prev.ma50&&curr.ma20>=curr.ma50)crossovers.push({date:curr.dateStr,type:"Golden cross",cycle:curr.cycle,mvrv:curr.mvrv,price:curr.price||null});
    else if(prev.ma20>prev.ma50&&curr.ma20<=curr.ma50)crossovers.push({date:curr.dateStr,type:"Death cross",cycle:curr.cycle,mvrv:curr.mvrv,price:curr.price||null});
  }
  if(crossovers.length){
    crossovers.forEach(function(x){
      var info="C"+x.cycle+" · MVRV "+x.mvrv.toFixed(3);
      if(hasPriceData&&x.price)info+=" · $"+Math.round(x.price).toLocaleString();
      row("  "+x.date+" "+x.type,info);
    });
    var lastCross=crossovers[crossovers.length-1];
    var daysSince=Math.round((new Date(l.dateStr)-new Date(lastCross.date))/(1000*60*60*24));
    row("Last crossover",lastCross.type+" on "+lastCross.date+" ("+daysSince+"d ago)");
  } else {lines.push("  No MA20/MA50 crossovers detected.");}
  row("Current MA20 vs MA50",l.ma20>l.ma50?"MA20 above MA50 (bullish bias)":"MA20 below MA50 (bearish bias)");

  hr("ZONE ANALYSIS — Days in each MVRV zone per cycle");
  s.cycleData.forEach(function(c){
    lines.push("");lines.push("Cycle "+c.cycle+":");
    row("  Below 1.0",c.below1+"d ("+(c.below1/c.days*100).toFixed(0)+"%)");
    row("  1.0-1.5",(c.below1_5-c.below1)+"d ("+((c.below1_5-c.below1)/c.days*100).toFixed(0)+"%)");
    row("  1.5-2.0",(c.days-c.above2-c.below1_5)+"d ("+((c.days-c.above2-c.below1_5)/c.days*100).toFixed(0)+"%)");
    row("  2.0-3.0",(c.above2-c.above3)+"d ("+((c.above2-c.above3)/c.days*100).toFixed(0)+"%)");
    row("  Above 3.0",c.above3+"d ("+(c.above3/c.days*100).toFixed(0)+"%)");
    if(hasPriceData){
      [[0,1,"Below 1.0"],[1,1.5,"1.0-1.5"],[1.5,2,"1.5-2.0"],[2,3,"2.0-3.0"],[3,999,"Above 3.0"]].forEach(function(z){
        var pts=(BY_CYCLE[c.cycle]||[]).filter(function(d){return d.mvrv>=z[0]&&d.mvrv<z[1]&&d.price});
        if(pts.length){var avg=pts.reduce(function(a,b){return a+b.price},0)/pts.length;row("  Avg BTC price in "+z[2],"$"+Math.round(avg).toLocaleString());}
      });
    }
  });
  var curZone=l.mvrv<1?"Below 1.0":l.mvrv<1.5?"1.0-1.5":l.mvrv<2?"1.5-2.0":l.mvrv<3?"2.0-3.0":"Above 3.0";
  lines.push("");row("Current MVRV zone",curZone+" (MVRV "+l.mvrv.toFixed(3)+")");

  if(hasPriceData){
    hr("PRICE PEAK DIVERGENCE — MVRV lead/lag vs BTC price ATH");
    var xmedFn=function(arr){if(!arr.length)return null;var s2=arr.slice().sort(function(a,b){return a-b});var m=Math.floor(s2.length/2);return s2.length%2?s2[m]:(s2[m-1]+s2[m])/2;};
    var allRemainingUpsides=[],allPeakDaysDiffs=[];
    s.availCycles.forEach(function(c){
      var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.price});
      if(!sub.length)return;
      var best=sub.reduce(function(a,b){return b.price>a.price?b:a});
      var mvrvPeak=s.cycleData.find(function(cd){return cd.cycle===c});
      if(!mvrvPeak)return;
      var daysDiff=Math.round((new Date(best.dateStr)-new Date(mvrvPeak.peakDate))/(1000*60*60*24));
      var divPct=((best.mvrv-mvrvPeak.peak)/mvrvPeak.peak*100);
      var priceAtMvrvPeak=PRICE_MAP[mvrvPeak.peakDate];
      var remainingUpside=priceAtMvrvPeak&&best.price?((best.price-priceAtMvrvPeak)/priceAtMvrvPeak*100):null;
      allPeakDaysDiffs.push(daysDiff);
      if(remainingUpside!==null)allRemainingUpsides.push(remainingUpside);
      lines.push("");lines.push("Cycle "+c+":");
      row("  BTC ATH","$"+Math.round(best.price).toLocaleString()+" on "+best.dateStr);
      row("  MVRV at price ATH",best.mvrv.toFixed(3));
      row("  MVRV own peak",mvrvPeak.peak.toFixed(3)+" on "+mvrvPeak.peakDate);
      row("  MVRV drawdown at price ATH",divPct.toFixed(1)+"%");
      if(priceAtMvrvPeak)row("  Price at MVRV peak","$"+Math.round(priceAtMvrvPeak).toLocaleString());
      if(remainingUpside!==null)row("  Remaining upside after MVRV peaked","+"+remainingUpside.toFixed(0)+"%");
      row("  Lead/lag",daysDiff>0?"Price peaked "+daysDiff+"d AFTER MVRV":daysDiff<0?"Price peaked "+Math.abs(daysDiff)+"d BEFORE MVRV":"Same day");
    });
    if(allPeakDaysDiffs.length){
      lines.push("");
      row("  Median lead-lag (all cycles)",xmedFn(allPeakDaysDiffs)+"d");
      if(allRemainingUpsides.length)row("  Median remaining upside after MVRV peaked","+"+xmedFn(allRemainingUpsides).toFixed(0)+"%");
    }

    hr("PRICE BOTTOM DIVERGENCE — MVRV lead/lag vs BTC price low");
    var allFurtherDownsides=[],allBotDaysDiffs=[];
    s.availCycles.forEach(function(c){
      var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.price});
      if(!sub.length)return;
      var worst=sub.reduce(function(a,b){return b.price<a.price?b:a});
      var mvrvTrough=s.cycleData.find(function(cd){return cd.cycle===c});
      if(!mvrvTrough)return;
      var daysDiff=Math.round((new Date(worst.dateStr)-new Date(mvrvTrough.troughDate))/(1000*60*60*24));
      var divPct=((worst.mvrv-mvrvTrough.trough)/mvrvTrough.trough*100);
      var priceAtMvrvTrough=PRICE_MAP[mvrvTrough.troughDate];
      var furtherDownside=priceAtMvrvTrough&&worst.price?((worst.price-priceAtMvrvTrough)/priceAtMvrvTrough*100):null;
      allBotDaysDiffs.push(daysDiff);
      if(furtherDownside!==null)allFurtherDownsides.push(furtherDownside);
      lines.push("");lines.push("Cycle "+c+":");
      row("  BTC price low","$"+Math.round(worst.price).toLocaleString()+" on "+worst.dateStr);
      row("  MVRV at price low",worst.mvrv.toFixed(3));
      row("  MVRV own trough",mvrvTrough.trough.toFixed(3)+" on "+mvrvTrough.troughDate);
      row("  MVRV recovery at price low","+"+divPct.toFixed(1)+"%");
      if(priceAtMvrvTrough)row("  Price at MVRV trough","$"+Math.round(priceAtMvrvTrough).toLocaleString());
      if(furtherDownside!==null)row("  Further downside after MVRV troughed",furtherDownside.toFixed(0)+"%");
      row("  Lead/lag",daysDiff>0?"Price bottomed "+daysDiff+"d AFTER MVRV":daysDiff<0?"Price bottomed "+Math.abs(daysDiff)+"d BEFORE MVRV":"Same day");
    });
    if(allBotDaysDiffs.length){
      lines.push("");
      row("  Median lead-lag (all cycles)",xmedFn(allBotDaysDiffs)+"d");
      if(allFurtherDownsides.length)row("  Median further downside after MVRV troughed",xmedFn(allFurtherDownsides).toFixed(0)+"%");
    }
  }

  hr("REGRESSION PROJECTIONS — Cycle peak & trough MVRV");
  for(var ri=1;ri<=s.nextCycle+1;ri++){
    var logP=Math.max(0,s.logR.slope*Math.log(ri)+s.logR.intercept);
    var linP=Math.max(0,s.linR.slope*ri+s.linR.intercept);
    var logT=Math.max(0,s.troughLogR.slope*Math.log(ri)+s.troughLogR.intercept);
    var linT=Math.max(0,s.troughLinR.slope*ri+s.troughLinR.intercept);
    row("  C"+ri+" peak (log/linear)",logP.toFixed(3)+" / "+linP.toFixed(3));
    row("  C"+ri+" bottom (log/linear)",logT.toFixed(3)+" / "+linT.toFixed(3));
  }

  if(hasPriceData){
    hr("PRICE PROJECTIONS — Ceiling & Floor consensus (current cycle)");
    // Use runBacktest() as the single source of truth — same logic as the Backtest tab
    var btData=runBacktest();
    var curResult=btData.allResults.find(function(r){return r.isCurrent;});
    function xoutlier(val,arr){if(arr.length<4)return false;var so=arr.slice().sort(function(a,b){return a-b});var q1=so[Math.floor(so.length*0.25)];var q3=so[Math.floor(so.length*0.75)];var iqr=q3-q1;return val<q1-1.5*iqr||val>q3+1.5*iqr;}
    function xmed(arr){if(!arr.length)return null;var sorted=arr.slice().sort(function(a,b){return a-b});var mid=Math.floor(sorted.length/2);return sorted.length%2?sorted[mid]:(sorted[mid-1]+sorted[mid])/2;}
    if(curResult){
      var curHP=curResult.halvingPrice;
      lines.push("");
      lines.push("  --- CEILING MODELS ---");
      var ceilModels=[
        {name:"MVRV Upside",price:curResult.m1},
        {name:"Halving Multiplier",price:curResult.m2},
        {name:"ATH Multiplier",price:curResult.m3},
        {name:"MVRV x Realized Cap",price:curResult.m4}
      ];
      var validCeil=ceilModels.filter(function(m){return m.price!=null}).map(function(m){return m.price;});
      ceilModels.forEach(function(m){
        if(m.price==null)return;
        row("  "+m.name,"$"+Math.round(m.price).toLocaleString()+(xoutlier(m.price,validCeil)?" [outlier — excluded]":" [included]"));
      });
      lines.push("");
      var cleanCeil=validCeil.filter(function(v){return!xoutlier(v,validCeil);});
      if(cleanCeil.length){
        row("  Ceiling consensus midpoint","$"+Math.round(xmed(cleanCeil)).toLocaleString());
        row("  Ceiling consensus range","$"+Math.round(Math.min.apply(null,cleanCeil)).toLocaleString()+" – $"+Math.round(Math.max.apply(null,cleanCeil)).toLocaleString());
      }
      lines.push("");
      lines.push("  --- FLOOR MODELS ---");
      var floorModels=[
        {name:"MVRV Downside",price:curResult.bm1},
        {name:"Halving Floor Ratio",price:curResult.bm2},
        {name:"Bottom Multiplier",price:curResult.bm3}
      ];
      var validFloor=floorModels.filter(function(m){return m.price!=null}).map(function(m){return m.price;});
      floorModels.forEach(function(m){
        if(m.price==null)return;
        row("  "+m.name,"$"+Math.round(m.price).toLocaleString()+(xoutlier(m.price,validFloor)?" [outlier — excluded]":" [included]"));
      });
      lines.push("");
      var cleanFloor=validFloor.filter(function(v){return!xoutlier(v,validFloor);});
      if(cleanFloor.length){
        row("  Floor consensus midpoint","$"+Math.round(xmed(cleanFloor)).toLocaleString());
        row("  Floor consensus range","$"+Math.round(Math.min.apply(null,cleanFloor)).toLocaleString()+" – $"+Math.round(Math.max.apply(null,cleanFloor)).toLocaleString());
      }
      if(curHP){ lines.push(""); row("  BTC price at current cycle halving","$"+Math.round(curHP).toLocaleString()); }
    } else {
      lines.push("  No current cycle data available.");
    }
    lines.push("  * Outliers excluded via IQR. Not financial advice.");

    // ---- Backtest accuracy section ----
    hr("BACKTEST — Ceiling & Floor model accuracy on past cycles");
    lines.push("Each model is re-run using ONLY data available before each cycle began — no lookahead.");
    lines.push("Error = (predicted − actual) / actual × 100.");
    lines.push("  Positive = overshot  |  Negative = undershot  |  Within ±20% = good · ±40% = ok · >40% = poor");
    lines.push("");

    var ceilKeys=[
      {key:"m1",label:"MVRV Upside",desc:"Price at MVRV peak x median remaining upside from prior cycles"},
      {key:"m2",label:"Halving Multiplier",desc:"Price at halving x log-decay multiplier fitted on prior cycles"},
      {key:"m3",label:"ATH Multiplier",desc:"Previous cycle ATH x log-decay ATH ratio from prior cycles"},
      {key:"m4",label:"MVRV x Realized Cap",desc:"Cycle-start price / MVRV x log-projected peak MVRV from prior cycles"},
      {key:"consensus",label:"Ceiling Consensus",desc:"IQR midpoint of ceiling models"}
    ];
    var floorKeys=[
      {key:"bm1",label:"MVRV Downside",desc:"Price at MVRV trough x median further downside from prior cycles"},
      {key:"bm2",label:"Halving Floor Ratio",desc:"Price at halving x log-decay floor ratio from prior cycles"},
      {key:"bm3",label:"Bottom Multiplier",desc:"Previous cycle bottom x log-decay multiplier from prior cycles"},
      {key:"consensusBot",label:"Floor Consensus",desc:"IQR midpoint of floor models"}
    ];

    function modelAccuracyBlock(keys, actualKey, sectionLabel){
      lines.push("--- "+sectionLabel+" (completed cycles only) ---");
      lines.push("");
      keys.forEach(function(mk){
        var errs=btData.completedResults.map(function(r){
          var pred=r[mk.key], actual=r[actualKey];
          return pred&&actual?((pred-actual)/actual*100):null;
        }).filter(function(x){return x!==null;});
        if(!errs.length){ row("  "+mk.label,"not enough data"); lines.push("    "+mk.desc); lines.push(""); return; }
        var avgE=errs.reduce(function(a,b){return a+b;},0)/errs.length;
        var absAvgE=errs.map(Math.abs).reduce(function(a,b){return a+b;},0)/errs.length;
        var quality=absAvgE<20?"good":absAvgE<40?"ok":"poor";
        row("  "+mk.label,(avgE>0?"+":"")+avgE.toFixed(1)+"% avg error · "+absAvgE.toFixed(1)+"% avg absolute · "+quality);
        lines.push("    "+mk.desc);
        lines.push("");
      });
    }

    modelAccuracyBlock(ceilKeys,"actualATH","CEILING model accuracy");
    modelAccuracyBlock(floorKeys,"actualBottom","FLOOR model accuracy");

    // Per-cycle breakdown
    lines.push("--- Per-cycle breakdown ---");
    lines.push("");
    btData.allResults.forEach(function(r){
      lines.push("  C"+r.cycle+(r.isCurrent?" (current — open)":"")+":");
      if(r.halvingPrice)row("    Price at halving","$"+Math.round(r.halvingPrice).toLocaleString());
      lines.push("");
      lines.push("    CEILING:");
      row("      "+(r.isCurrent?"ATH so far":"Actual ATH"),r.actualATH?"$"+Math.round(r.actualATH).toLocaleString():"—");
      ceilKeys.forEach(function(mk){
        var pred=r[mk.key]; if(pred==null){lines.push("      "+mk.label+": — (insufficient prior data)");return;}
        var err=r.actualATH?((pred-r.actualATH)/r.actualATH*100):null;
        var tag=err!==null?(Math.abs(err)<20?" v":Math.abs(err)<40?" ~":" x"):"";
        lines.push("      "+mk.label+": $"+Math.round(pred).toLocaleString()+(err!==null?" · "+(err>0?"+":"")+err.toFixed(1)+"%"+tag+(r.isCurrent?" (live)":""):""));
      });
      lines.push("");
      lines.push("    FLOOR:");
      row("      "+(r.isCurrent?"Low so far":"Actual low"),r.actualBottom?"$"+Math.round(r.actualBottom).toLocaleString():"—");
      floorKeys.forEach(function(mk){
        var pred=r[mk.key]; if(pred==null){lines.push("      "+mk.label+": — (insufficient prior data)");return;}
        var err=r.actualBottom?((pred-r.actualBottom)/r.actualBottom*100):null;
        var tag=err!==null?(Math.abs(err)<20?" v":Math.abs(err)<40?" ~":" x"):"";
        lines.push("      "+mk.label+": $"+Math.round(pred).toLocaleString()+(err!==null?" · "+(err>0?"+":"")+err.toFixed(1)+"%"+tag+(r.isCurrent?" (live)":""):""));
      });
      lines.push("");
    });

    lines.push("  * No lookahead — only prior cycle data used per projection.");
    lines.push("  * Current cycle errors measured against ATH/low seen so far, not the final confirmed value.");
  }
  hr("HALVING DATES");
  var now=new Date();
  HALVINGS.forEach(function(h,i){
    var nextH=HALVINGS[i+1];
    var isPast=h<now&&(!nextH||nextH<now);
    var isCurrent=h<=now&&nextH&&nextH>now;
    var status=isPast?"completed":isCurrent?"current cycle":"upcoming";
    var extra="";
    if(isCurrent){var pct=Math.min(100,((now-h)/(nextH-h))*100);extra=" · "+pct.toFixed(0)+"% elapsed";}
    else if(!isPast){var daysAway=Math.round((h-now)/(1000*60*60*24));extra=" · "+daysAway.toLocaleString()+"d away";}
    row("  C"+(i+1)+" halving",h.toISOString().slice(0,10)+" ["+status+extra+"]");
  });

  lines.push("");lines.push("=".repeat(60));
  lines.push("Built by Sirapob Dangpad — a numbers-obsessed nerd who finds");
  lines.push("beauty in price patterns and on-chain data. Still learning,");
  lines.push("still experimenting. This dashboard is a passion project, not");
  lines.push("professional financial analysis.");
  lines.push("");lines.push("NOT FINANCIAL ADVICE. Do your own research.");
  lines.push("=".repeat(60));
  lines.push("Generated: "+new Date().toISOString().slice(0,10));
  lines.push("Tip: paste this file into any AI assistant to ask questions");
  lines.push("about Bitcoin MVRV cycles and what the data might mean.");

  var blob=new Blob([lines.join("\n")],{type:"text/plain"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download = "mvrv_summary_" + new Date().toISOString().slice(0, 10) + ".txt";
  a.click();
  URL.revokeObjectURL(a.href);
}

function buildProjections(){
  var s=STATS, l=s.last;
  var curCycle=l.cycle;
  var models=[];

  // --- Shared helpers ---
  function med(arr){
    if(!arr.length)return null;
    var sorted=arr.slice().sort(function(a,b){return a-b});
    var mid=Math.floor(sorted.length/2);
    return sorted.length%2?sorted[mid]:(sorted[mid-1]+sorted[mid])/2;
  }
  function iqrOutlier(val,arr){
    if(arr.length<4)return false;
    var sorted=arr.slice().sort(function(a,b){return a-b});
    var q1=sorted[Math.floor(sorted.length*0.25)];
    var q3=sorted[Math.floor(sorted.length*0.75)];
    var iqr=q3-q1;
    return val<q1-1.5*iqr||val>q3+1.5*iqr;
  }

  // Collect completed cycle price peaks
  var cyclePeakPrices={};
  var cyclePeakMVRV={};
  s.availCycles.forEach(function(c){
    var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.price});
    if(sub.length){
      var best=sub.reduce(function(a,b){return b.price>a.price?b:a});
      cyclePeakPrices[c]=best.price;
    }
    var cd=s.cycleData.find(function(x){return x.cycle===c});
    if(cd)cyclePeakMVRV[c]=cd.peak;
  });

  // --- Model 1: MVRV upside ---
  // Price at MVRV peak × median remaining upside %
  var curMvrvPeak=s.cycleData.find(function(c){return c.cycle===curCycle});
  var curMvrvPeakPrice=curMvrvPeak?PRICE_MAP[curMvrvPeak.peakDate]:null;
  var remainingUpsides=s.availCycles.map(function(c){
    var cd=s.cycleData.find(function(x){return x.cycle===c});
    if(!cd)return null;
    var peakP=PRICE_MAP[cd.peakDate];
    var ath=cyclePeakPrices[c];
    if(!peakP||!ath)return null;
    return(ath-peakP)/peakP*100;
  }).filter(function(x){return x!==null});
  var cleanUp=remainingUpsides.filter(function(v){return!iqrOutlier(v,remainingUpsides)});
  var medUp=med(cleanUp);
  var m1=curMvrvPeakPrice&&medUp!==null?curMvrvPeakPrice*(1+medUp/100):null;
  models.push({
    name:"MVRV Upside",
    price:m1,
    basis:"Price at MVRV peak × median remaining upside ("+( medUp?medUp.toFixed(0):"-")+"%) across cycles",
    confidence:m1?"Medium — depends on MVRV peak being confirmed":"Low — MVRV peak not yet in",
    color:CC.green,
    available:!!m1
  });

  // --- Model 2: Halving multiplier decay ---
  var halvData=s.availCycles.map(function(c){
    var halvingDate=HALVINGS[c-1];
    if(!halvingDate)return null;
    var hPrice=priceAtHalving(halvingDate);
    var ath=cyclePeakPrices[c];
    if(!hPrice||!ath)return null;
    return{cycle:c,mult:ath/hPrice,halvingPrice:hPrice,price:ath};
  }).filter(Boolean);
  var halvMults=halvData.map(function(p){return p.mult});
  var cleanHalvData=halvData.filter(function(p){return!iqrOutlier(p.mult,halvMults)});
  // Use log-log regression: log(mult) ~ log(cycle) — multipliers decay as a power law
  var halvLogLogR=cleanHalvData.length>=2?linReg(cleanHalvData.map(function(p){return Math.log(p.cycle)}),cleanHalvData.map(function(p){return Math.log(p.mult)})):null;
  var curHalvPrice=HALVINGS[curCycle-1]?priceAtHalving(HALVINGS[curCycle-1]):null;
  var projMult=halvLogLogR?Math.exp(halvLogLogR.slope*Math.log(curCycle)+halvLogLogR.intercept):med(cleanHalvData.map(function(p){return p.mult}));
  var m2=curHalvPrice&&projMult?curHalvPrice*projMult:null;
  models.push({
    name:"Halving Multiplier",
    price:m2,
    basis:"Price on halving date ("+( curHalvPrice?"$"+Math.round(curHalvPrice).toLocaleString():"-")+") × log-decay projected multiplier (×"+(projMult?projMult.toFixed(1):"-")+")",
    confidence:"Medium — multiplier shrinks each cycle, log regression captures this",
    color:CC.teal,
    available:!!m2
  });

  // --- Model 3: ATH multiplier decay ---
  var athMults=[];
  var cycleList=s.availCycles;
  for(var i=1;i<cycleList.length;i++){
    var c=cycleList[i], prev=cycleList[i-1];
    if(cyclePeakPrices[c]&&cyclePeakPrices[prev]){
      athMults.push({cycle:c,mult:cyclePeakPrices[c]/cyclePeakPrices[prev]});
    }
  }
  var athMultVals=athMults.map(function(p){return p.mult});
  var cleanAth=athMults.filter(function(p){return!iqrOutlier(p.mult,athMultVals)});
  var athLogLogR2=cleanAth.length>=2?linReg(cleanAth.map(function(p){return Math.log(p.cycle)}),cleanAth.map(function(p){return Math.log(p.mult)})):null;
  var prevATH=cyclePeakPrices[cycleList[cycleList.length-2]]||null;
  var projAthMult=athLogLogR2?Math.exp(athLogLogR2.slope*Math.log(curCycle)+athLogLogR2.intercept):med(cleanAth.map(function(p){return p.mult}));
  var m3=prevATH&&projAthMult?prevATH*projAthMult:null;
  models.push({
    name:"ATH Multiplier",
    price:m3,
    basis:"Previous cycle ATH ($"+(prevATH?Math.round(prevATH).toLocaleString():"-")+") × log-decay projected multiplier (×"+(projAthMult?projAthMult.toFixed(2):"-")+")",
    confidence:"Medium — fewest data points, sensitive to outliers",
    color:CC.amber,
    available:!!m3
  });

  // --- Model 4: MVRV peak regression × realized cap ---
  // Projected MVRV peak → implied market cap → implied price
  // market cap = MVRV × realized cap, realized cap ≈ market cap / MVRV
  // Estimate realized cap from current data: realizedCap = marketCap / MVRV
  // BTC supply ~19.8M coins at ~$60k avg realized price ≈ realized cap
  // We can approximate: if MVRV = mktCap/realizedCap, then price = MVRV_proj × (currentPrice / currentMVRV) × (realizedCap_growth)
  // Simpler: price_proj = currentPrice × (mvrvProj / currentMVRV)
  var mvrvProj=s.nextLogPeak; // log regression projected peak for next cycle above current
  // But for current cycle, use current cycle log projection
  var curCycleLogPeakMVRV=Math.max(0,s.logR.slope*Math.log(curCycle)+s.logR.intercept);
  var m4=l.price&&l.mvrv&&curCycleLogPeakMVRV?(l.price/l.mvrv)*curCycleLogPeakMVRV:null;
  models.push({
    name:"MVRV × Realized Cap",
    price:m4,
    basis:"Current price ÷ current MVRV × projected cycle peak MVRV ("+curCycleLogPeakMVRV.toFixed(2)+"). Assumes realized cap stays constant — conservative.",
    confidence:"Low-Medium — realized cap grows over time, so this tends to underestimate",
    color:CC.accent,
    available:!!m4
  });

  // --- Consensus ---
  var validPrices=models.filter(function(m){return m.available}).map(function(m){return m.price});
  var cleanPrices=validPrices.filter(function(v){return!iqrOutlier(v,validPrices)});
  var consensusMin=cleanPrices.length?Math.min.apply(null,cleanPrices):null;
  var consensusMax=cleanPrices.length?Math.max.apply(null,cleanPrices):null;
  var consensusMid=med(cleanPrices);
  var excluded=validPrices.length-cleanPrices.length;

  // --- Build HTML ---
  var consensusHtml='<div style="background:#2c2840;border:1px solid #3c3754;border-radius:16px;padding:24px 28px;margin-bottom:0">'
    +'<div style="font-size:0.8rem;letter-spacing:.1em;text-transform:uppercase;color:#a89fc4;margin-bottom:8px">Consensus Range · C'+curCycle+(excluded?' · '+excluded+' outlier model'+(excluded>1?'s':'')+" excluded":"")+'</div>'
    +(consensusMid?
      '<div style="font-size:2.4rem;font-weight:700;color:'+CC.accent+';letter-spacing:-.02em">$'+Math.round(consensusMid).toLocaleString()+'</div>'
      +'<div style="font-size:1rem;color:'+CC.muted+';margin-top:4px">midpoint · range $'+Math.round(consensusMin).toLocaleString()+' – $'+Math.round(consensusMax).toLocaleString()+'</div>'
      :'<div style="font-size:1.5rem;color:#a89fc4">Insufficient data</div>')
    +'<div style="font-size:0.85rem;color:#a89fc4;margin-top:10px">Based on '+cleanPrices.length+' model'+(cleanPrices.length!==1?'s':'')+' · not financial advice</div>'
    +'</div>';

  var modelCards=models.map(function(m){
    if(!m.available)return statCard(m.name,"—","No data yet",CC.muted);
    var isOutl=iqrOutlier(m.price,validPrices);
    return statCard(m.name+(isOutl?" ⚠":""),"$"+Math.round(m.price).toLocaleString(),isOutl?"outlier — excluded from consensus":m.confidence.split("—")[0].trim(),isOutl?CC.muted:m.color);
  }).join("");

  var methodRows=models.map(function(m){
    return'<tr>'
      +'<td style="color:'+m.color+';font-weight:600">'+m.name+'</td>'
      +'<td>'+(m.available?"$"+Math.round(m.price).toLocaleString():"—")+'</td>'
      +'<td style="font-size:0.85rem">'+m.basis+'</td>'
      +'<td style="font-size:0.85rem;white-space:normal;min-width:200px;color:'+(m.confidence.startsWith("High")?CC.green:m.confidence.startsWith("Medium")?CC.amber:CC.red)+'">'+m.confidence+'</td>'
      +'</tr>';
  }).join("");

  // --- Multiplier history table (moved from Price Peaks) ---
  var multRows=halvData.map(function(p){
    var athMult=athMults.find(function(a){return a.cycle===p.cycle});
    var hOutlier=iqrOutlier(p.mult,halvMults);
    var aOutlier=athMult&&iqrOutlier(athMult.mult,athMults.map(function(x){return x.mult}));
    return'<tr><td style="color:'+(CYCLE_COLORS[p.cycle]||CC.muted)+';font-weight:600">C'+p.cycle+'</td>'
      +'<td>$'+Math.round(p.halvingPrice).toLocaleString()+'</td>'
      +'<td>$'+Math.round(p.price).toLocaleString()+'</td>'
      +'<td style="color:'+CC.teal+'">×'+p.mult.toFixed(1)+(hOutlier?" ⚠":"")+'</td>'
      +'<td style="color:'+CC.amber+'">'+(athMult?"×"+athMult.mult.toFixed(2)+(aOutlier?" ⚠":""):"—")+'</td>'
      +'</tr>';
  }).join("");

  // ---- FLOOR MODELS ----
  var floorModels=[];
  var cycleBotPrices={};
  s.availCycles.forEach(function(c){
    var sub=(BY_CYCLE[c]||[]).filter(function(d){return d.price;});
    if(sub.length){var worst=sub.reduce(function(a,b){return b.price<a.price?b:a});cycleBotPrices[c]=worst.price;}
  });
  // Floor M1: MVRV further downside
  var curMvrvTrough2=s.cycleData.find(function(c){return c.cycle===curCycle;});
  var curMvrvTroughPrice2=curMvrvTrough2?PRICE_MAP[curMvrvTrough2.troughDate]:null;
  var furtherDownsides=s.availCycles.map(function(c){
    var cd=s.cycleData.find(function(x){return x.cycle===c;});
    if(!cd)return null;
    var troughP=PRICE_MAP[cd.troughDate];var bot=cycleBotPrices[c];
    if(!troughP||!bot)return null;
    return(bot-troughP)/troughP*100;
  }).filter(function(x){return x!==null;});
  var cleanFD=furtherDownsides.filter(function(v){return!iqrOutlier(v,furtherDownsides);});
  var medFD=med(cleanFD);
  var fm1=curMvrvTroughPrice2&&medFD!==null?curMvrvTroughPrice2*(1+medFD/100):null;
  floorModels.push({name:"MVRV Downside",price:fm1,basis:"Price at MVRV trough × median further downside ("+(medFD?medFD.toFixed(0):"\u2014")+"%) across cycles",confidence:"Medium — depends on MVRV trough being confirmed",color:CC.teal,available:!!fm1});
  // Floor M2: Halving floor ratio
  var halvFloorData=s.availCycles.map(function(c){
    var halvingDate=HALVINGS[c-1];if(!halvingDate)return null;
    var hPrice=priceAtHalving(halvingDate);var bot=cycleBotPrices[c];
    if(!hPrice||!bot)return null;
    return{cycle:c,ratio:bot/hPrice};
  }).filter(Boolean);
  var halvFloorRatios=halvFloorData.map(function(p){return p.ratio;});
  var cleanHFD=halvFloorData.filter(function(p){return!iqrOutlier(p.ratio,halvFloorRatios);});
  var halvFloorLogR=cleanHFD.length>=2?linReg(cleanHFD.map(function(p){return Math.log(p.cycle);}),cleanHFD.map(function(p){return Math.log(p.ratio);})):null;
  var projFloorRatio=halvFloorLogR?Math.exp(halvFloorLogR.slope*Math.log(curCycle)+halvFloorLogR.intercept):med(cleanHFD.map(function(p){return p.ratio;}));
  var fm2=curHalvPrice&&projFloorRatio?curHalvPrice*projFloorRatio:null;
  floorModels.push({name:"Halving Floor Ratio",price:fm2,basis:"Price on halving date ("+(curHalvPrice?"$"+Math.round(curHalvPrice).toLocaleString():"\u2014")+") × log-decay floor ratio (×"+(projFloorRatio?projFloorRatio.toFixed(2):"\u2014")+")",confidence:"Medium — ratio rises each cycle",color:CC.amber,available:!!fm2});
  // Floor M3: Previous bottom multiplier
  var botMults2=[];
  for(var bi=1;bi<cycleList.length;bi++){
    var bc=cycleList[bi],bprev=cycleList[bi-1];
    if(cycleBotPrices[bc]&&cycleBotPrices[bprev])botMults2.push({cycle:bc,mult:cycleBotPrices[bc]/cycleBotPrices[bprev]});
  }
  var botMultVals=botMults2.map(function(p){return p.mult;});
  var cleanBotMult=botMults2.filter(function(p){return!iqrOutlier(p.mult,botMultVals);});
  var botMultLogR=cleanBotMult.length>=2?linReg(cleanBotMult.map(function(p){return Math.log(p.cycle);}),cleanBotMult.map(function(p){return Math.log(p.mult);})):null;
  var prevBotPrice=cycleBotPrices[cycleList[cycleList.length-2]]||null;
  var projBotMult=botMultLogR?Math.exp(botMultLogR.slope*Math.log(curCycle)+botMultLogR.intercept):med(cleanBotMult.map(function(p){return p.mult;}));
  var fm3=prevBotPrice&&projBotMult?prevBotPrice*projBotMult:null;
  floorModels.push({name:"Bottom Multiplier",price:fm3,basis:"Previous cycle bottom ($"+(prevBotPrice?Math.round(prevBotPrice).toLocaleString():"\u2014")+") × log-decay projected mult. (×"+(projBotMult?projBotMult.toFixed(2):"\u2014")+")",confidence:"Medium — fewest data points",color:CC.red,available:!!fm3});
  // Floor M4: MVRV trough x realized cap
  var curCycleLogTroughMVRV=Math.max(0,s.troughLogR.slope*Math.log(curCycle)+s.troughLogR.intercept);
  var fm4bot=l.price&&l.mvrv&&curCycleLogTroughMVRV?(l.price/l.mvrv)*curCycleLogTroughMVRV:null;
  floorModels.push({name:"MVRV Trough × RC",price:fm4bot,basis:"Current price ÷ current MVRV × projected cycle trough MVRV ("+curCycleLogTroughMVRV.toFixed(3)+"). Realized cap assumed constant.",confidence:"Low-Medium — tends to overestimate floor",color:CC.accent,available:!!fm4bot});
  // Floor consensus
  var validFloors=floorModels.filter(function(m){return m.available;}).map(function(m){return m.price;});
  var cleanFloors=validFloors.filter(function(v){return!iqrOutlier(v,validFloors);});
  var floorMin=cleanFloors.length?Math.min.apply(null,cleanFloors):null;
  var floorMax=cleanFloors.length?Math.max.apply(null,cleanFloors):null;
  var floorMid=med(cleanFloors);
  var floorExcluded=validFloors.length-cleanFloors.length;
  var floorConsensusHtml='<div style="background:#2c2840;border:1px solid #3c3754;border-radius:16px;padding:24px 28px;margin-bottom:0">'
    +'<div style="font-size:0.8rem;letter-spacing:.1em;text-transform:uppercase;color:#a89fc4;margin-bottom:8px">Floor Range · C'+curCycle+(floorExcluded?' · '+floorExcluded+' outlier model'+(floorExcluded>1?'s':'')+' excluded':'')+'</div>'
    +(floorMid?
      '<div style="font-size:2.4rem;font-weight:700;color:'+CC.teal+';letter-spacing:-.02em">$'+Math.round(floorMid).toLocaleString()+'</div>'
      +'<div style="font-size:1rem;color:'+CC.muted+';margin-top:4px">midpoint · range $'+Math.round(floorMin).toLocaleString()+' – $'+Math.round(floorMax).toLocaleString()+'</div>'
      :'<div style="font-size:1.5rem;color:#a89fc4">Insufficient data</div>')
    +'<div style="font-size:0.85rem;color:#a89fc4;margin-top:10px">Based on '+cleanFloors.length+' model'+(cleanFloors.length!==1?'s':'')+' · not financial advice</div>'
    +'</div>';
  var floorModelCards=floorModels.map(function(m){
    if(!m.available)return statCard(m.name,"\u2014","No data yet",CC.muted);
    var isOutl=iqrOutlier(m.price,validFloors);
    return statCard(m.name+(isOutl?" ⚠":""),"$"+Math.round(m.price).toLocaleString(),isOutl?"outlier — excluded from consensus":m.confidence.split("\u2014")[0].trim(),isOutl?CC.muted:m.color);
  }).join("");
  var floorMethodRows=floorModels.map(function(m){

    '<div class="tbl-wrap"><table><thead><tr><th>Model</th><th>Ceiling</th><th>Basis</th><th>Confidence</th></tr></thead><tbody>'+methodRows+'</tbody></table></div>'+
    '<div style="font-size:0.85rem;font-weight:600;color:'+CC.teal+';margin:24px 0 8px;letter-spacing:.08em;text-transform:uppercase">▼ Floor — How Low</div>'+
    floorConsensusHtml+
    '<div class="g4" style="margin-top:0">'+floorModelCards+'</div>'+
    '<div class="chart-card"><div class="chart-title">Floor model comparison · C'+curCycle+' price floor estimates</div>'+makeCanvas("c9b_floor",260)+'</div>'+
    '<div class="tbl-wrap"><table><thead><tr><th>Model</th><th>Floor</th><th>Basis</th><th>Confidence</th></tr></thead><tbody>'+floorMethodRows+'</tbody></table></div>'+
    '<div class="tbl-wrap"><div class="chart-title" style="padding:16px 0 10px">Historical multipliers — data behind the models</div><table><thead><tr><th>Cycle</th><th>Price @ halving</th><th>ATH</th><th>Halving mult.</th><th>ATH mult. (vs prev)</th></tr></thead><tbody>'+multRows+'</tbody></table></div>'+
    '<div class="info">⚠ = statistical outlier excluded from log-log regression. Ceiling: Halving mult. = ATH ÷ halving price. ATH mult. = this ATH ÷ previous ATH. Floor: Halving Floor Ratio = bottom ÷ halving price. Bottom Multiplier = this bottom ÷ previous bottom. All decay as power laws. Projections update automatically as new cycles are added.</div>';

  destroyChart("c9a");

  var barData=models.filter(function(m){return m.available});
  var consensusMidVal=consensusMid;
  CHARTS.c9a=new Chart(document.getElementById("c9a"),{
    type:"bar",
    data:{
      labels:barData.map(function(m){return m.name}),
      datasets:[
        {label:"Price projection",data:barData.map(function(m){return m.price}),backgroundColor:barData.map(function(m){return iqrOutlier(m.price,validPrices)?"#a89fc4":m.color+"cc"}),borderRadius:8},
        {label:"Consensus midpoint",data:barData.map(function(){return consensusMidVal}),borderColor:"#a89fc4",borderWidth:2,borderDash:[6,3],pointRadius:0,type:"line",fill:false}

        {label:"Floor consensus midpoint",data:floorBarData.map(function(){return floorMidVal;}),borderColor:"#a89fc4",borderWidth:2,borderDash:[6,3],pointRadius:0,type:"line",fill:false}

          if(ctx.dataset.type==="line")return"Floor consensus: $"+Math.round(ctx.parsed.y).toLocaleString();
          var m=floorBarData[ctx.dataIndex];
          return[m.name+": $"+Math.round(m.price).toLocaleString(),iqrOutlier(m.price,validFloors)?"⚠ outlier — excluded":m.confidence];
